version: '3.8'

services:
  dawarich:
    image: docker.io/freikin/dawarich:latest
    container_name: dawarich
    hostname: dawarich
    ports:
      - "${DAWARICH_PORT:-8080}:8080"
    volumes:
      - dawarich_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dawarich_data:
    name: dawarich_data
