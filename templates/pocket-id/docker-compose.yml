version: '3.8'

services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:latest
    container_name: pocket-id
    hostname: pocket-id
    ports:
      - "${POCKET_ID_PORT:-8080}:8080"
    volumes:
      - pocket-id_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pocket-id_data:
    name: pocket-id_data
