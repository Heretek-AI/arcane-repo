version: '3.8'

services:
  chantools:
    image: docker.io/guggero/chantools:latest
    container_name: chantools
    hostname: chantools
    ports:
      - "${CHANTOOLS_PORT:-8080}:8080"
    volumes:
      - chantools_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chantools_data:
    name: chantools_data
