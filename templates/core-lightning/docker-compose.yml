version: '3.8'

services:
  core-lightning:
    image: docker.io/1maa/core-lightning:latest
    container_name: core-lightning
    hostname: core-lightning
    ports:
      - "${CORE_LIGHTNING_PORT:-8080}:8080"
    volumes:
      - core-lightning_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  core-lightning_data:
    name: core-lightning_data
