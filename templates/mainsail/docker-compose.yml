version: '3.8'

services:
  mainsail:
    image: docker.io/dimalo/mainsail:latest
    container_name: mainsail
    hostname: mainsail
    ports:
      - "${MAINSAIL_PORT:-8080}:8080"
    volumes:
      - mainsail_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mainsail_data:
    name: mainsail_data
