version: '3.8'

services:
  bitcoin-knots:
    image: ghcr.io/linuxserver/bitcoin-knots:latest
    container_name: bitcoin-knots
    hostname: bitcoin-knots
    ports:
      - "${BITCOIN_KNOTS_PORT:-8080}:8080"
    volumes:
      - bitcoin-knots_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bitcoin-knots_data:
    name: bitcoin-knots_data
