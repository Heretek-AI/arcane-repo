version: '3.8'

services:
  plex:
    image: ghcr.io/linuxserver/plex:latest
    container_name: plex
    hostname: plex
    ports:
      - "${PLEX_PORT:-32400}:32400"
    volumes:
      - plex_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:32400/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  plex_data:
    name: plex_data
