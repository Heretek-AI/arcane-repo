version: '3.8'

services:
  ittools:
    image: docker.io/bordercolli/ittools:latest
    container_name: ittools
    hostname: ittools
    ports:
      - "${ITTOOLS_PORT:-8080}:8080"
    volumes:
      - ittools_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ittools_data:
    name: ittools_data
