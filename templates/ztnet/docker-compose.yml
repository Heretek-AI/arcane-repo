version: '3.8'

services:
  ztnet:
    image: docker.io/sinamics/ztnet:latest
    container_name: ztnet
    hostname: ztnet
    ports:
      - "${ZTNET_PORT:-8080}:8080"
    volumes:
      - ztnet_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ztnet_data:
    name: ztnet_data
