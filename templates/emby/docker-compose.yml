version: '3.8'

services:
  emby:
    image: ghcr.io/linuxserver/emby:latest
    container_name: emby
    hostname: emby
    ports:
      - "${EMBY_PORT:-8096}:8096"
    volumes:
      - emby_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8096/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  emby_data:
    name: emby_data
