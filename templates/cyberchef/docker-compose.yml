version: '3.8'

services:
  cyberchef:
    image: docker.io/mpepping/cyberchef:latest
    container_name: cyberchef
    hostname: cyberchef
    ports:
      - "${CYBERCHEF_PORT:-8080}:8080"
    volumes:
      - cyberchef_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cyberchef_data:
    name: cyberchef_data
