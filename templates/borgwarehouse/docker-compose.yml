version: '3.8'

services:
  borgwarehouse:
    image: docker.io/borgwarehouse/borgwarehouse:latest
    container_name: borgwarehouse
    hostname: borgwarehouse
    ports:
      - "${BORGWAREHOUSE_PORT:-8080}:8080"
    volumes:
      - borgwarehouse_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  borgwarehouse_data:
    name: borgwarehouse_data
