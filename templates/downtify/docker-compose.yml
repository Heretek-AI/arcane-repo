version: '3.8'

services:
  downtify:
    image: ghcr.io/henriquesebastiao/downtify:latest
    container_name: downtify
    hostname: downtify
    ports:
      - "${DOWNTIFY_PORT:-8080}:8080"
    volumes:
      - downtify_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  downtify_data:
    name: downtify_data
