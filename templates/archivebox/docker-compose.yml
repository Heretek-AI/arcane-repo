version: '3.8'

services:
  archivebox:
    image: ghcr.io/archivebox/archivebox:latest
    container_name: archivebox
    hostname: archivebox
    ports:
      - "${ARCHIVEBOX_PORT:-8080}:8080"
    volumes:
      - archivebox_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  archivebox_data:
    name: archivebox_data
