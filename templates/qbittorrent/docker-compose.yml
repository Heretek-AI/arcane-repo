version: '3.8'

services:
  qbittorrent:
    image: ghcr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    hostname: qbittorrent
    ports:
      - "${QBITTORRENT_PORT:-8080}:8080"
    volumes:
      - qbittorrent_data:/data
    restart: unless-stopped

volumes:
  qbittorrent_data:
    name: qbittorrent_data
