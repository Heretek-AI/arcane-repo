version: '3.8'

services:
  dokos:
    image: docker.io/numadis/dokos:latest
    container_name: dokos
    hostname: dokos
    ports:
      - "${DOKOS_PORT:-8080}:8080"
    volumes:
      - dokos_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dokos_data:
    name: dokos_data
