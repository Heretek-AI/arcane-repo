version: '3.8'

services:
  dumbdo:
    image: docker.io/dumbwareio/dumbdo:latest
    container_name: dumbdo
    hostname: dumbdo
    ports:
      - "${DUMBDO_PORT:-8080}:8080"
    volumes:
      - dumbdo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dumbdo_data:
    name: dumbdo_data
