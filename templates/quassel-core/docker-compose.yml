version: '3.8'

services:
  quassel-core:
    image: ghcr.io/linuxserver/quassel-core:latest
    container_name: quassel-core
    hostname: quassel-core
    ports:
      - "${QUASSEL_CORE_PORT:-8080}:8080"
    volumes:
      - quassel-core_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  quassel-core_data:
    name: quassel-core_data
