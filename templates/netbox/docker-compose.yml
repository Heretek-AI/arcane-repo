version: '3.8'

services:
  netbox:
    image: docker.io/netboxcommunity/netbox:latest
    container_name: netbox
    hostname: netbox
    ports:
      - "${NETBOX_PORT:-8080}:8080"
    volumes:
      - netbox_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  netbox_data:
    name: netbox_data
