version: '3.8'

services:
  node-exporter:
    image: docker.io/prom/node-exporter:latest
    container_name: node-exporter
    hostname: node-exporter
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    restart: unless-stopped
    volumes:
      - node-exporter_data:/data

volumes:
  node-exporter_data:
    name: node-exporter_data
