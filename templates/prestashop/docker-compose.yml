version: '3.8'

services:
  prestashop:
    image: docker.io/prestashop/prestashop:latest
    container_name: prestashop
    hostname: prestashop
    ports:
      - "${PRESTASHOP_PORT:-8080}:8080"
    volumes:
      - prestashop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  prestashop_data:
    name: prestashop_data
