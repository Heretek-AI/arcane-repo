version: '3.8'

services:
  mealie:
    image: docker.io/hkotel/mealie:latest
    container_name: mealie
    hostname: mealie
    ports:
      - "${MEALIE_PORT:-8080}:8080"
    volumes:
      - mealie_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mealie_data:
    name: mealie_data
