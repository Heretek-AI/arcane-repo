version: '3.8'

services:
  surrealdb:
    image: docker.io/surrealdb/surrealdb:latest
    container_name: surrealdb
    hostname: surrealdb
    ports:
      - "${SURREALDB_PORT:-8080}:8080"
    volumes:
      - surrealdb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  surrealdb_data:
    name: surrealdb_data
