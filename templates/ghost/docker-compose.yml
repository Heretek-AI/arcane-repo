version: '3.8'

services:
  ghost:
    image: docker.io/library/ghost:latest
    container_name: ghost
    hostname: ghost
    ports:
      - "${GHOST_PORT:-8080}:8080"
    volumes:
      - ghost_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ghost_data:
    name: ghost_data
