version: '3.8'

services:
  crabfit:
    image: docker.io/ds4dampsoft/crabfit:latest
    container_name: crabfit
    hostname: crabfit
    ports:
      - "${CRABFIT_PORT:-8080}:8080"
    volumes:
      - crabfit_data:/data
    restart: unless-stopped

volumes:
  crabfit_data:
    name: crabfit_data
