version: '3.8'

services:
  homeassistant:
    image: ghcr.io/linuxserver/homeassistant:latest
    container_name: homeassistant
    hostname: homeassistant
    ports:
      - "${HOMEASSISTANT_PORT:-8123}:8123"
    volumes:
      - homeassistant_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  homeassistant_data:
    name: homeassistant_data
