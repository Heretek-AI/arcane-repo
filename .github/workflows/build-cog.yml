name: Build Cog

on:
  push:
    paths:
      - 'scripts/dockerfiles/cog/**'
      - 'templates/cog/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: cog
    secrets: inherit
