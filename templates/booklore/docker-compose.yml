version: '3.8'

services:
  booklore:
    image: docker.io/balazsszucs/booklore:latest
    container_name: booklore
    hostname: booklore
    ports:
      - "${BOOKLORE_PORT:-8080}:8080"
    volumes:
      - booklore_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  booklore_data:
    name: booklore_data
