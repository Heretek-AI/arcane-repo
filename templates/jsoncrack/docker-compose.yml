version: '3.8'

services:
  jsoncrack:
    image: docker.io/shokohsc/jsoncrack:latest
    container_name: jsoncrack
    hostname: jsoncrack
    ports:
      - "${JSONCRACK_PORT:-8080}:8080"
    volumes:
      - jsoncrack_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jsoncrack_data:
    name: jsoncrack_data
