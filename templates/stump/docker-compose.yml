version: '3.8'

services:
  stump:
    image: docker.io/aaronleopold/stump:latest
    container_name: stump
    hostname: stump
    ports:
      - "${STUMP_PORT:-8080}:8080"
    volumes:
      - stump_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  stump_data:
    name: stump_data
