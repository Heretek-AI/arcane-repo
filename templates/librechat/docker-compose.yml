version: '3.8'

services:
  librechat:
    image: docker.io/librechat/librechat:latest
    container_name: librechat
    hostname: librechat
    ports:
      - "${LIBRECHAT_PORT:-8080}:8080"
    volumes:
      - librechat_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  librechat_data:
    name: librechat_data
