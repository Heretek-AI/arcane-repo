version: '3.8'

services:
  synapse-admin:
    image: docker.io/awesometechnologies/synapse-admin:latest
    container_name: synapse-admin
    hostname: synapse-admin
    ports:
      - "${SYNAPSE_ADMIN_PORT:-8008}:8008"
    volumes:
      - synapse-admin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8008/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  synapse-admin_data:
    name: synapse-admin_data
