version: '3.8'

services:
  zoraxy:
    image: docker.io/zoraxydocker/zoraxy:latest
    container_name: zoraxy
    hostname: zoraxy
    ports:
      - "${ZORAXY_PORT:-8080}:8080"
    volumes:
      - zoraxy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  zoraxy_data:
    name: zoraxy_data
