version: '3.8'

services:
  proxitok:
    image: docker.io/idocker1688/proxitok:latest
    container_name: proxitok
    hostname: proxitok
    ports:
      - "${PROXITOK_PORT:-8080}:8080"
    volumes:
      - proxitok_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  proxitok_data:
    name: proxitok_data
