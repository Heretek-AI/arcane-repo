version: '3.8'

services:
  yamtrack:
    image: docker.io/dmintz37/yamtrack:latest
    container_name: yamtrack
    hostname: yamtrack
    ports:
      - "${YAMTRACK_PORT:-8080}:8080"
    volumes:
      - yamtrack_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yamtrack_data:
    name: yamtrack_data
