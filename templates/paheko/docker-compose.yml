version: '3.8'

services:
  paheko:
    image: docker.io/paheko/paheko:latest
    container_name: paheko
    hostname: paheko
    ports:
      - "${PAHEKO_PORT:-8080}:8080"
    volumes:
      - paheko_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  paheko_data:
    name: paheko_data
