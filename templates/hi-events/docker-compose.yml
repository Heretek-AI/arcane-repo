version: '3.8'

services:
  hi-events:
    image: docker.io/dciangot/hi.events:latest
    container_name: hi-events
    hostname: hi-events
    ports:
      - "${HI_EVENTS_PORT:-8080}:8080"
    volumes:
      - hi-events_data:/data
    restart: unless-stopped

volumes:
  hi-events_data:
    name: hi-events_data
