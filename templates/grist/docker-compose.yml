version: '3.8'

services:
  grist:
    image: docker.io/gristlabs/grist:latest
    container_name: grist
    hostname: grist
    ports:
      - "${GRIST_PORT:-8080}:8080"
    volumes:
      - grist_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  grist_data:
    name: grist_data
