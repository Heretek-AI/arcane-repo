version: '3.8'

services:
  komga:
    image: ghcr.io/gotson/komga:latest
    container_name: komga
    hostname: komga
    ports:
      - "${KOMGA_PORT:-8080}:8080"
    volumes:
      - komga_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  komga_data:
    name: komga_data
