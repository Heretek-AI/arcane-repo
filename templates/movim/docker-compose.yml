version: '3.8'

services:
  movim:
    image: docker.io/movim/movim:latest
    container_name: movim
    hostname: movim
    ports:
      - "${MOVIM_PORT:-8080}:8080"
    volumes:
      - movim_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  movim_data:
    name: movim_data
