version: '3.8'

services:
  redash:
    image: docker.io/redash/redash:latest
    container_name: redash
    hostname: redash
    ports:
      - "${REDASH_PORT:-8080}:8080"
    volumes:
      - redash_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redash_data:
    name: redash_data
