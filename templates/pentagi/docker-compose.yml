version: "3.8"

services:
  pentagi:
    image: vxcontrol/pentagi:latest
    container_name: pentagi
    hostname: pentagi
    ports:
      - "${PENTAGI_PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      - PENTAGI_PORT=${PENTAGI_PORT:-8080}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

