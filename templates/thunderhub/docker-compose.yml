version: '3.8'

services:
  thunderhub:
    image: docker.io/apotdevin/thunderhub:latest
    container_name: thunderhub
    hostname: thunderhub
    ports:
      - "${THUNDERHUB_PORT:-8080}:8080"
    volumes:
      - thunderhub_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  thunderhub_data:
    name: thunderhub_data
