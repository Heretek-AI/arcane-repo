version: '3.8'

services:
  dashmachine:
    image: docker.io/rmountjoy/dashmachine:latest
    container_name: dashmachine
    hostname: dashmachine
    ports:
      - "${DASHMACHINE_PORT:-8080}:8080"
    volumes:
      - dashmachine_data:/data
    restart: unless-stopped

volumes:
  dashmachine_data:
    name: dashmachine_data
