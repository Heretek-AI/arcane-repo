version: '3.8'

services:
  gotosocial:
    image: docker.io/superseriousbusiness/gotosocial:latest
    container_name: gotosocial
    hostname: gotosocial
    ports:
      - "${GOTOSOCIAL_PORT:-8080}:8080"
    volumes:
      - gotosocial_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gotosocial_data:
    name: gotosocial_data
