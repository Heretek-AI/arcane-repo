version: '3.8'

services:
  phpmyadmin:
    image: docker.io/library/phpmyadmin:latest
    container_name: phpmyadmin
    hostname: phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8080}:8080"
    volumes:
      - phpmyadmin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  phpmyadmin_data:
    name: phpmyadmin_data
