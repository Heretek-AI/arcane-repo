version: '3.8'

services:
  caddy:
    image: docker.io/caddy/caddy:latest
    container_name: caddy
    hostname: caddy
    ports:
      - "${CADDY_PORT:-8080}:8080"
    volumes:
      - caddy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
    name: caddy_data
