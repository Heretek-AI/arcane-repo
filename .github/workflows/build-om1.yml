name: Build OM1

on:
  push:
    paths:
      - 'scripts/dockerfiles/om1/**'
      - 'templates/om1/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: om1
    secrets: inherit
