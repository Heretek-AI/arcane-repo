version: '3.8'

services:
  cronmaster:
    image: ghcr.io/fccview/cronmaster:latest
    container_name: cronmaster
    hostname: cronmaster
    ports:
      - "${CRONMASTER_PORT:-8080}:8080"
    volumes:
      - cronmaster_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cronmaster_data:
    name: cronmaster_data
