version: '3.8'

services:
  smokeping:
    image: ghcr.io/linuxserver/smokeping:latest
    container_name: smokeping
    hostname: smokeping
    ports:
      - "${SMOKEPING_PORT:-8080}:8080"
    volumes:
      - smokeping_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  smokeping_data:
    name: smokeping_data
