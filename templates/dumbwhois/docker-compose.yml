version: '3.8'

services:
  dumbwhois:
    image: docker.io/dumbwareio/dumbwhois:latest
    container_name: dumbwhois
    hostname: dumbwhois
    ports:
      - "${DUMBWHOIS_PORT:-8080}:8080"
    volumes:
      - dumbwhois_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dumbwhois_data:
    name: dumbwhois_data
