version: '3.8'

services:
  tabby:
    image: ghcr.io/tabbyml/tabby:latest
    container_name: tabby
    hostname: tabby
    ports:
      - "${TABBY_PORT:-8080}:8080"
    volumes:
      - tabby_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tabby_data:
    name: tabby_data
