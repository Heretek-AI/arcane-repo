version: '3.8'

services:
  tasks-md:
    image: docker.io/baldissaramatheus/tasks.md:latest
    container_name: tasks-md
    hostname: tasks-md
    ports:
      - "${TASKS_MD_PORT:-8080}:8080"
    volumes:
      - tasks-md_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tasks-md_data:
    name: tasks-md_data
