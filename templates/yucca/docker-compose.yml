version: '3.8'

services:
  yucca:
    image: docker.io/yuccastream/yucca:latest
    container_name: yucca
    hostname: yucca
    ports:
      - "${YUCCA_PORT:-8080}:8080"
    volumes:
      - yucca_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yucca_data:
    name: yucca_data
