version: '3.8'

services:
  fireshare:
    image: docker.io/shaneisrael/fireshare:latest
    container_name: fireshare
    hostname: fireshare
    ports:
      - "${FIRESHARE_PORT:-8080}:8080"
    volumes:
      - fireshare_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fireshare_data:
    name: fireshare_data
