version: '3.8'

services:
  nzbget:
    image: ghcr.io/linuxserver/nzbget:latest
    container_name: nzbget
    hostname: nzbget
    ports:
      - "${NZBGET_PORT:-8080}:8080"
    volumes:
      - nzbget_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nzbget_data:
    name: nzbget_data
