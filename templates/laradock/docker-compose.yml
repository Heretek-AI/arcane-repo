version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: laradock-nginx
    hostname: laradock-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    restart: unless-stopped
    volumes:
      - laradock_app:/var/www/html
    depends_on:
      php-fpm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  php-fpm:
    image: php:8.3-fpm-alpine
    container_name: laradock-php-fpm
    hostname: laradock-php-fpm
    restart: unless-stopped
    volumes:
      - laradock_app:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-laradock}
      - DB_USERNAME=${MYSQL_USER:-laradock}
      - DB_PASSWORD=${MYSQL_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: laradock-mysql
    hostname: laradock-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-laradock}
      - MYSQL_USER=${MYSQL_USER:-laradock}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-secret}
    volumes:
      - laradock_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: laradock-redis
    hostname: laradock-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    volumes:
      - laradock_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  laradock_app:
    driver: local
  laradock_mysql_data:
    driver: local
  laradock_redis_data:
    driver: local
