version: '3.8'

services:
  mqttx-web:
    image: docker.io/emqx/mqttx-web:latest
    container_name: mqttx-web
    hostname: mqttx-web
    ports:
      - "${MQTTX_WEB_PORT:-8080}:8080"
    volumes:
      - mqttx-web_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mqttx-web_data:
    name: mqttx-web_data
