version: '3.8'

services:
  cinny:
    image: docker.io/ajbura/cinny:latest
    container_name: cinny
    hostname: cinny
    ports:
      - "${CINNY_PORT:-8080}:8080"
    volumes:
      - cinny_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cinny_data:
    name: cinny_data
