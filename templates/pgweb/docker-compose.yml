version: '3.8'

services:
  pgweb:
    image: ghcr.io/sosedoff/pgweb:latest
    container_name: pgweb
    hostname: pgweb
    ports:
      - "${PGWEB_PORT:-8080}:8080"
    volumes:
      - pgweb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgweb_data:
    name: pgweb_data
