version: '3.8'

services:
  lnbits:
    image: docker.io/lnbits/lnbits:latest
    container_name: lnbits
    hostname: lnbits
    ports:
      - "${LNBITS_PORT:-8080}:8080"
    volumes:
      - lnbits_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lnbits_data:
    name: lnbits_data
