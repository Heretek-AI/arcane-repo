version: '3.8'

services:
  ghostfolio:
    image: docker.io/ghostfolio/ghostfolio:latest
    container_name: ghostfolio
    hostname: ghostfolio
    ports:
      - "${GHOSTFOLIO_PORT:-8080}:8080"
    volumes:
      - ghostfolio_data:/data
    restart: unless-stopped

volumes:
  ghostfolio_data:
    name: ghostfolio_data
