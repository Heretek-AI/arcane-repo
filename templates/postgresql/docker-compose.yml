version: '3.8'

services:
  postgresql:
    image: docker.io/bitnami/postgresql:latest
    container_name: postgresql
    hostname: postgresql
    ports:
      - "${POSTGRESQL_PORT:-8080}:8080"
    volumes:
      - postgresql_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-app}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgresql_data:
    name: postgresql_data
