version: '3.8'

services:
  seaweedfs:
    image: ghcr.io/seaweedfs/seaweedfs:latest
    container_name: seaweedfs
    hostname: seaweedfs
    ports:
      - "${SEAWEEDFS_PORT:-8080}:8080"
    volumes:
      - seaweedfs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  seaweedfs_data:
    name: seaweedfs_data
