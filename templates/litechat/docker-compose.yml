version: '3.8'

services:
  litechat:
    image: docker.io/dimitrigilbert/litechat:latest
    container_name: litechat
    hostname: litechat
    ports:
      - "${LITECHAT_PORT:-8080}:8080"
    volumes:
      - litechat_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  litechat_data:
    name: litechat_data
