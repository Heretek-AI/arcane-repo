version: '3.8'

services:
  picsur:
    image: ghcr.io/caramelfur/picsur:latest
    container_name: picsur
    hostname: picsur
    ports:
      - "${PICSUR_PORT:-8080}:8080"
    volumes:
      - picsur_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  picsur_data:
    name: picsur_data
