version: '3.8'

services:
  homechart:
    image: ghcr.io/candiddev/homechart:latest
    container_name: homechart
    hostname: homechart
    ports:
      - "${HOMECHART_PORT:-8080}:8080"
    volumes:
      - homechart_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  homechart_data:
    name: homechart_data
