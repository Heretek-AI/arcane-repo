version: '3.8'

services:
  grav:
    image: ghcr.io/linuxserver/grav:latest
    container_name: grav
    hostname: grav
    ports:
      - "${GRAV_PORT:-8080}:8080"
    volumes:
      - grav_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  grav_data:
    name: grav_data
