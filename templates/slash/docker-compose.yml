version: '3.8'

services:
  slash:
    image: docker.io/yourselfhosted/slash:latest
    container_name: slash
    hostname: slash
    ports:
      - "${SLASH_PORT:-8080}:8080"
    volumes:
      - slash_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  slash_data:
    name: slash_data
