name: Build MLflow

on:
  push:
    paths:
      - 'scripts/dockerfiles/mlflow/**'
      - 'templates/mlflow/**'
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: mlflow
    secrets: inherit
