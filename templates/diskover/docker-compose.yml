version: '3.8'

services:
  diskover:
    image: ghcr.io/linuxserver/diskover:latest
    container_name: diskover
    hostname: diskover
    ports:
      - "${DISKOVER_PORT:-8080}:8080"
    volumes:
      - diskover_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  diskover_data:
    name: diskover_data
