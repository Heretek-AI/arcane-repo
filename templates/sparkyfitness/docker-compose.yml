version: '3.8'

services:
  sparkyfitness:
    image: docker.io/codewithcj/sparkyfitness:latest
    container_name: sparkyfitness
    hostname: sparkyfitness
    ports:
      - "${SPARKYFITNESS_PORT:-8080}:8080"
    volumes:
      - sparkyfitness_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sparkyfitness_data:
    name: sparkyfitness_data
