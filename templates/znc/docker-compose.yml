version: '3.8'

services:
  znc:
    image: docker.io/library/znc:latest
    container_name: znc
    hostname: znc
    ports:
      - "${ZNC_PORT:-8080}:8080"
    volumes:
      - znc_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  znc_data:
    name: znc_data
