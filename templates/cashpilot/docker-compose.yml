version: '3.8'

services:
  cashpilot:
    image: docker.io/drumsergio/cashpilot:latest
    container_name: cashpilot
    hostname: cashpilot
    ports:
      - "${CASHPILOT_PORT:-8080}:8080"
    volumes:
      - cashpilot_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cashpilot_data:
    name: cashpilot_data
