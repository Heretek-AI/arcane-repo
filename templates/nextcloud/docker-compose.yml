version: '3.8'

services:
  nextcloud:
    image: docker.io/library/nextcloud:latest
    container_name: nextcloud
    hostname: nextcloud
    ports:
      - "${NEXTCLOUD_PORT:-80}:80"
    volumes:
      - nextcloud_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  nextcloud_data:
    name: nextcloud_data
