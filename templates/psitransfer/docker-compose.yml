version: '3.8'

services:
  psitransfer:
    image: docker.io/psitrax/psitransfer:latest
    container_name: psitransfer
    hostname: psitransfer
    ports:
      - "${PSITRANSFER_PORT:-8080}:8080"
    volumes:
      - psitransfer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  psitransfer_data:
    name: psitransfer_data
