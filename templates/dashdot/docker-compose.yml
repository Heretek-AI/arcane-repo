version: '3.8'

services:
  dashdot:
    image: ghcr.io/mauricenino/dashdot:latest
    container_name: dashdot
    hostname: dashdot
    ports:
      - "${DASHDOT_PORT:-8080}:8080"
    volumes:
      - dashdot_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dashdot_data:
    name: dashdot_data
