version: '3.8'

services:
  facilmap:
    image: docker.io/facilmap/facilmap:latest
    container_name: facilmap
    hostname: facilmap
    ports:
      - "${FACILMAP_PORT:-8080}:8080"
    volumes:
      - facilmap_data:/data
    restart: unless-stopped

volumes:
  facilmap_data:
    name: facilmap_data
