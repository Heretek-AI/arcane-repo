version: '3.8'

services:
  chibisafe:
    image: ghcr.io/chibisafe/chibisafe:latest
    container_name: chibisafe
    hostname: chibisafe
    ports:
      - "${CHIBISAFE_PORT:-8080}:8080"
    volumes:
      - chibisafe_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chibisafe_data:
    name: chibisafe_data
