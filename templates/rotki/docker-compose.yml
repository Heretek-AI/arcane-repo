version: '3.8'

services:
  rotki:
    image: docker.io/rotki/rotki:latest
    container_name: rotki
    hostname: rotki
    ports:
      - "${ROTKI_PORT:-8080}:8080"
    volumes:
      - rotki_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rotki_data:
    name: rotki_data
