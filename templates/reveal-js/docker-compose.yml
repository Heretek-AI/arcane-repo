version: '3.8'

services:
  reveal-js:
    image: ghcr.io/cloudogu/reveal.js:latest
    container_name: reveal-js
    hostname: reveal-js
    ports:
      - "${REVEAL_JS_PORT:-8080}:8080"
    volumes:
      - reveal-js_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  reveal-js_data:
    name: reveal-js_data
