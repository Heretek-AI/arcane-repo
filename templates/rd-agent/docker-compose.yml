version: '3.8'

services:
  rd-agent:
    image: ghcr.io/arcane-repo/rd-agent:latest
    container_name: rd-agent
    hostname: rd-agent
    ports:
      - "${RDAGENT_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - rdagent_workspace:/workspace
    environment:
      - RDAGENT_PORT=${RDAGENT_PORT:-8000}
      # ── LLM Provider ─────────────────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required — see .env.example}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      # ── CLI Environment ──────────────────────────────────────────────
      - PYTHONUNBUFFERED=1

volumes:
  rdagent_workspace:
