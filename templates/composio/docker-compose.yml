version: '3.8'

services:
  composio:
    image: docker.io/angrybayblade/composio:latest
    container_name: composio
    hostname: composio
    ports:
      - "${COMPOSIO_PORT:-8080}:8080"
    restart: unless-stopped
    volumes:
      - composio_data:/data

volumes:
  composio_data:
    name: composio_data
