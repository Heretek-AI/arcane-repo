version: '3.8'

services:
  workout-cool:
    image: docker.io/xiaogblw/workout-cool:latest
    container_name: workout-cool
    hostname: workout-cool
    ports:
      - "${WORKOUT_COOL_PORT:-8080}:8080"
    volumes:
      - workout-cool_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  workout-cool_data:
    name: workout-cool_data
