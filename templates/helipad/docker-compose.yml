version: '3.8'

services:
  helipad:
    image: ghcr.io/ericpp/helipad:latest
    container_name: helipad
    hostname: helipad
    ports:
      - "${HELIPAD_PORT:-8080}:8080"
    volumes:
      - helipad_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  helipad_data:
    name: helipad_data
