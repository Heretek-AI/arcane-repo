name: Build OpenFang

on:
  push:
    paths:
      - 'scripts/dockerfiles/openfang/**'
      - 'templates/openfang/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: openfang
    secrets: inherit
