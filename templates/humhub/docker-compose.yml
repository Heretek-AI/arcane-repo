version: '3.8'

services:
  humhub:
    image: docker.io/humhub/humhub:latest
    container_name: humhub
    hostname: humhub
    ports:
      - "${HUMHUB_PORT:-8080}:8080"
    volumes:
      - humhub_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  humhub_data:
    name: humhub_data
