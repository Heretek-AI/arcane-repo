version: '3.8'

services:
  opensearch:
    image: docker.io/opensearchproject/opensearch:latest
    container_name: opensearch
    hostname: opensearch
    ports:
      - "${OPENSEARCH_PORT:-8080}:8080"
    volumes:
      - opensearch_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  opensearch_data:
    name: opensearch_data
