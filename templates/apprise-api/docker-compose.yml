version: '3.8'

services:
  apprise-api:
    image: ghcr.io/linuxserver/apprise-api:latest
    container_name: apprise-api
    hostname: apprise-api
    ports:
      - "${APPRISE_API_PORT:-8080}:8080"
    volumes:
      - apprise-api_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  apprise-api_data:
    name: apprise-api_data
