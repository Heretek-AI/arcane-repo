version: '3.8'

services:
  hermes-agent:
    image: docker.io/nousresearch/hermes-agent:latest
    container_name: hermes-agent
    hostname: hermes-agent
    ports:
      - "${HERMES_AGENT_PORT:-8080}:8080"
    volumes:
      - hermes-agent_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  hermes-agent_data:
    name: hermes-agent_data
