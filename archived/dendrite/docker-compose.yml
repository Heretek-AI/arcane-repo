version: '3.8'

services:
  dendrite:
    image: docker.io/aditsachde/dendrite:latest
    container_name: dendrite
    hostname: dendrite
    ports:
      - "${DENDRITE_PORT:-8080}:8080"
    volumes:
      - dendrite_data:/data
    restart: unless-stopped

volumes:
  dendrite_data:
    name: dendrite_data
