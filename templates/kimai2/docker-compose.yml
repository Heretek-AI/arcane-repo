version: '3.8'

services:
  kimai2:
    image: docker.io/kimai/kimai2:latest
    container_name: kimai2
    hostname: kimai2
    ports:
      - "${KIMAI2_PORT:-8080}:8080"
    volumes:
      - kimai2_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kimai2_data:
    name: kimai2_data
