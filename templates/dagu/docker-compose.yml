version: '3.8'

services:
  dagu:
    image: docker.io/coralhl/dagu:latest
    container_name: dagu
    hostname: dagu
    ports:
      - "${DAGU_PORT:-8080}:8080"
    volumes:
      - dagu_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dagu_data:
    name: dagu_data
