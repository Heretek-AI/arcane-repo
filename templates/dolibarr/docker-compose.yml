version: '3.8'

services:
  dolibarr:
    image: docker.io/dolibarr/dolibarr:latest
    container_name: dolibarr
    hostname: dolibarr
    ports:
      - "${DOLIBARR_PORT:-8080}:8080"
    volumes:
      - dolibarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dolibarr_data:
    name: dolibarr_data
