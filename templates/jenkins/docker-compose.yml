version: '3.8'

services:
  jenkins:
    image: docker.io/jenkins/jenkins:latest
    container_name: jenkins
    hostname: jenkins
    ports:
      - "${JENKINS_PORT:-8080}:8080"
    volumes:
      - jenkins_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jenkins_data:
    name: jenkins_data
