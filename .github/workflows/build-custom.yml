name: Build Custom Template

on:
  workflow_call:
    inputs:
      template-name:
        description: 'Name of the template to build (e.g. plexe, trading-agents)'
        required: true
        type: string
      dockerfile-path:
        description: 'Path to the Dockerfile (defaults to scripts/dockerfiles/<template-name>/Dockerfile)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERFILE: ${{ inputs.dockerfile-path || format('scripts/dockerfiles/{0}/Dockerfile', inputs.template-name) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ inputs.template-name }}
        run: |
          IMAGE="ghcr.io/heretek-ai/arcane-repo/${{ inputs.template-name }}:latest"
          echo "Building $IMAGE from ${{ env.DOCKERFILE }}..."
          docker build -t "$IMAGE" -f "${{ env.DOCKERFILE }}" .
          docker push "$IMAGE"
          echo "Published: $IMAGE"
