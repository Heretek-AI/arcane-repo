version: '3.8'

services:
  cops:
    image: ghcr.io/linuxserver/cops:latest
    container_name: cops
    hostname: cops
    ports:
      - "${COPS_PORT:-8080}:8080"
    volumes:
      - cops_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cops_data:
    name: cops_data
