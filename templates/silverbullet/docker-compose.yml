version: '3.8'

services:
  silverbullet:
    image: docker.io/zefhemel/silverbullet:latest
    container_name: silverbullet
    hostname: silverbullet
    ports:
      - "${SILVERBULLET_PORT:-8080}:8080"
    volumes:
      - silverbullet_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  silverbullet_data:
    name: silverbullet_data
