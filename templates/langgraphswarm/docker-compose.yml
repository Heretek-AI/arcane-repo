version: "3.8"

services:
  langgraphswarm:
    image: python:3.12-slim
    container_name: langgraphswarm
    hostname: langgraphswarm
    ports:
      - "${LANGGRAPH-SWARM_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - LANGRAPH_SWARM_PORT=${LANGRAPH_SWARM_PORT:-8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}

