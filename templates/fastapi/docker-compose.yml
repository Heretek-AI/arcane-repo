version: '3.8'

services:
  fastapi:
    image: docker.io/demisto/fastapi:latest
    container_name: fastapi
    hostname: fastapi
    ports:
      - "${FASTAPI_PORT:-8080}:8080"
    volumes:
      - fastapi_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fastapi_data:
    name: fastapi_data
