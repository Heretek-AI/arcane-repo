version: '3.8'

services:
  misago:
    image: docker.io/raliang/misago:latest
    container_name: misago
    hostname: misago
    ports:
      - "${MISAGO_PORT:-8080}:8080"
    volumes:
      - misago_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  misago_data:
    name: misago_data
