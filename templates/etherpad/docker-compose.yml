version: '3.8'

services:
  etherpad:
    image: docker.io/etherpad/etherpad:latest
    container_name: etherpad
    hostname: etherpad
    ports:
      - "${ETHERPAD_PORT:-8080}:8080"
    volumes:
      - etherpad_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  etherpad_data:
    name: etherpad_data
