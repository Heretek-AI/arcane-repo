version: '3.8'

services:
  pyinventory:
    image: ghcr.io/korylprince/pyinventory:latest
    container_name: pyinventory
    hostname: pyinventory
    ports:
      - "${PYINVENTORY_PORT:-8080}:8080"
    volumes:
      - pyinventory_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pyinventory_data:
    name: pyinventory_data
