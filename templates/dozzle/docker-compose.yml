version: '3.8'

services:
  dozzle:
    image: ghcr.io/amir20/dozzle:latest
    container_name: dozzle
    hostname: dozzle
    ports:
      - "${DOZZLE_PORT:-8080}:8080"
    volumes:
      - dozzle_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dozzle_data:
    name: dozzle_data
