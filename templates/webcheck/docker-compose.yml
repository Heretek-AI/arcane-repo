version: '3.8'

services:
  webcheck:
    image: docker.io/aolifu/webcheck:latest
    container_name: webcheck
    hostname: webcheck
    ports:
      - "${WEBCHECK_PORT:-8080}:8080"
    volumes:
      - webcheck_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  webcheck_data:
    name: webcheck_data
