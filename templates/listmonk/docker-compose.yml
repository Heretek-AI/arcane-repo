version: '3.8'

services:
  listmonk:
    image: docker.io/listmonk/listmonk:latest
    container_name: listmonk
    hostname: listmonk
    ports:
      - "${LISTMONK_PORT:-8080}:8080"
    volumes:
      - listmonk_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  listmonk_data:
    name: listmonk_data
