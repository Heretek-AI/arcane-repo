version: '3.8'

services:
  misskey:
    image: docker.io/misskey/misskey:latest
    container_name: misskey
    hostname: misskey
    ports:
      - "${MISSKEY_PORT:-8080}:8080"
    volumes:
      - misskey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  misskey_data:
    name: misskey_data
