version: '3.8'

services:
  booklogr:
    image: docker.io/mozzo/booklogr:latest
    container_name: booklogr
    hostname: booklogr
    ports:
      - "${BOOKLOGR_PORT:-8080}:8080"
    volumes:
      - booklogr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  booklogr_data:
    name: booklogr_data
