version: '3.8'

services:
  gomft:
    image: ghcr.io/starfleetcptn/gomft:latest
    container_name: gomft
    hostname: gomft
    ports:
      - "${GOMFT_PORT:-8080}:8080"
    volumes:
      - gomft_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gomft_data:
    name: gomft_data
