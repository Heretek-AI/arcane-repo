version: '3.8'

services:
  inkheart:
    image: docker.io/nobbe/inkheart:latest
    container_name: inkheart
    hostname: inkheart
    ports:
      - "${INKHEART_PORT:-8080}:8080"
    volumes:
      - inkheart_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  inkheart_data:
    name: inkheart_data
