version: '3.8'

services:
  lesma:
    image: ghcr.io/ogarcia/lesma:latest
    container_name: lesma
    hostname: lesma
    ports:
      - "${LESMA_PORT:-8080}:8080"
    volumes:
      - lesma_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lesma_data:
    name: lesma_data
