version: '3.8'

services:
  pydio:
    image: ghcr.io/linuxserver/pydio:latest
    container_name: pydio
    hostname: pydio
    ports:
      - "${PYDIO_PORT:-8080}:8080"
    volumes:
      - pydio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pydio_data:
    name: pydio_data
