name: Build Streamer-Sales

on:
  push:
    paths:
      - 'scripts/dockerfiles/streamer-sales/**'
      - 'templates/streamer-sales/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: streamer-sales
    secrets: inherit
