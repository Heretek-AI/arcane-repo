version: '3.8'

services:
  jellyfin:
    image: ghcr.io/jellyfin/jellyfin:latest
    container_name: jellyfin
    hostname: jellyfin
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - jellyfin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8096/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jellyfin_data:
    name: jellyfin_data
