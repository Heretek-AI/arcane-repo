version: '3.8'

services:
  readur:
    image: ghcr.io/readur/readur:latest
    container_name: readur
    hostname: readur
    ports:
      - "${READUR_PORT:-8080}:8080"
    volumes:
      - readur_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  readur_data:
    name: readur_data
