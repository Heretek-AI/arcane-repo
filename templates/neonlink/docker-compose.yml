version: '3.8'

services:
  neonlink:
    image: docker.io/alexscifier/neonlink:latest
    container_name: neonlink
    hostname: neonlink
    ports:
      - "${NEONLINK_PORT:-8080}:8080"
    volumes:
      - neonlink_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  neonlink_data:
    name: neonlink_data
