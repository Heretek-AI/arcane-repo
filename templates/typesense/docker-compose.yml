version: '3.8'

services:
  typesense:
    image: typesense/typesense:latest
    container_name: typesense
    hostname: typesense
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - typesense_data:/data
    restart: unless-stopped
    environment:
      # ── API Key (Required) ──────────────────────────────────────────
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:?TYPESENSE_API_KEY is required — see .env.example}
      # ── Data Directory ──────────────────────────────────────────────
      - TYPESENSE_DATA_DIR=/data
      # ── Enable CORS ─────────────────────────────────────────────────
      - TYPESENSE_ENABLE_CORS=${TYPESENSE_ENABLE_CORS:-true}
      # ── API Address ─────────────────────────────────────────────────
      - TYPESENSE_API_ADDRESS=0.0.0.0

volumes:
  typesense_data:
    name: typesense_data
