version: '3.8'

services:
  conduit:
    image: docker.io/freedom4iran/conduit:latest
    container_name: conduit
    hostname: conduit
    ports:
      - "${CONDUIT_PORT:-8080}:8080"
    volumes:
      - conduit_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  conduit_data:
    name: conduit_data
