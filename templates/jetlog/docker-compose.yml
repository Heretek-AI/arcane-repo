version: '3.8'

services:
  jetlog:
    image: docker.io/pbogre/jetlog:latest
    container_name: jetlog
    hostname: jetlog
    ports:
      - "${JETLOG_PORT:-8080}:8080"
    volumes:
      - jetlog_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jetlog_data:
    name: jetlog_data
