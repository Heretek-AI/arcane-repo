version: '3.8'

services:
  webtrees:
    image: docker.io/dtjs48jkt/webtrees:latest
    container_name: webtrees
    hostname: webtrees
    ports:
      - "${WEBTREES_PORT:-8080}:8080"
    volumes:
      - webtrees_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  webtrees_data:
    name: webtrees_data
