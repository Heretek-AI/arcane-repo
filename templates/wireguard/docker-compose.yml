version: '3.8'

services:
  wireguard:
    image: ghcr.io/linuxserver/wireguard:latest
    container_name: wireguard
    hostname: wireguard
    ports:
      - "${WIREGUARD_PORT:-8080}:8080"
    volumes:
      - wireguard_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wireguard_data:
    name: wireguard_data
