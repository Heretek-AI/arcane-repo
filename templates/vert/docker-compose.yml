version: '3.8'

services:
  vert:
    image: docker.io/shant1010/vert:latest
    container_name: vert
    hostname: vert
    ports:
      - "${VERT_PORT:-8080}:8080"
    volumes:
      - vert_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  vert_data:
    name: vert_data
