version: '3.8'

services:
  gitlab:
    image: docker.io/mcp/gitlab:latest
    container_name: gitlab
    hostname: gitlab
    ports:
      - "${GITLAB_PORT:-80}:80"
    volumes:
      - gitlab_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gitlab_data:
    name: gitlab_data
