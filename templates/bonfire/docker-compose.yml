version: '3.8'

services:
  bonfire:
    image: docker.io/bonfirenetworks/bonfire:latest
    container_name: bonfire
    hostname: bonfire
    ports:
      - "${BONFIRE_PORT:-8080}:8080"
    volumes:
      - bonfire_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bonfire_data:
    name: bonfire_data
