version: '3.8'

services:
  agenta:
    image: docker.io/intelligentlogistics/agenta:latest
    container_name: agenta
    hostname: agenta
    ports:
      - "${AGENTA_PORT:-8080}:8080"
    volumes:
      - agenta_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  agenta_data:
    name: agenta_data
