version: '3.8'

services:
  silverstripe:
    image: docker.io/bbpdev/silverstripe:latest
    container_name: silverstripe
    hostname: silverstripe
    ports:
      - "${SILVERSTRIPE_PORT:-8080}:8080"
    volumes:
      - silverstripe_data:/data
    restart: unless-stopped

volumes:
  silverstripe_data:
    name: silverstripe_data
