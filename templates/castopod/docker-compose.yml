version: '3.8'

services:
  castopod:
    image: docker.io/castopod/castopod:latest
    container_name: castopod
    hostname: castopod
    ports:
      - "${CASTOPOD_PORT:-8080}:8080"
    volumes:
      - castopod_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  castopod_data:
    name: castopod_data
