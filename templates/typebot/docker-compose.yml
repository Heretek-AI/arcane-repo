version: '3.8'

services:
  typebot:
    image: docker.io/samuellopes123/typebot:latest
    container_name: typebot
    hostname: typebot
    ports:
      - "${TYPEBOT_PORT:-8080}:8080"
    volumes:
      - typebot_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  typebot_data:
    name: typebot_data
