version: '3.8'

services:
  minimal-git-server:
    image: ghcr.io/mcarbonne/minimal-git-server:latest
    container_name: minimal-git-server
    hostname: minimal-git-server
    ports:
      - "${MINIMAL_GIT_SERVER_PORT:-8080}:8080"
    volumes:
      - minimal-git-server_data:/data
    restart: unless-stopped

volumes:
  minimal-git-server_data:
    name: minimal-git-server_data
