version: '3.8'

services:
  lxd-dashboard:
    image: docker.io/peterpan404/lxd-dashboard:latest
    container_name: lxd-dashboard
    hostname: lxd-dashboard
    ports:
      - "${LXD_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - lxd-dashboard_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lxd-dashboard_data:
    name: lxd-dashboard_data
