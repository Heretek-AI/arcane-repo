version: '3.8'

services:
  microbin:
    image: docker.io/danielszabo99/microbin:latest
    container_name: microbin
    hostname: microbin
    ports:
      - "${MICROBIN_PORT:-8080}:8080"
    volumes:
      - microbin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  microbin_data:
    name: microbin_data
