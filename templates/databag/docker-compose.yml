version: '3.8'

services:
  databag:
    image: docker.io/balzack/databag:latest
    container_name: databag
    hostname: databag
    ports:
      - "${DATABAG_PORT:-8080}:8080"
    volumes:
      - databag_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  databag_data:
    name: databag_data
