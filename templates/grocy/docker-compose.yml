version: '3.8'

services:
  grocy:
    image: ghcr.io/linuxserver/grocy:latest
    container_name: grocy
    hostname: grocy
    ports:
      - "${GROCY_PORT:-80}:80"
    volumes:
      - grocy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  grocy_data:
    name: grocy_data
