version: '3.8'

services:
  ferdium:
    image: ghcr.io/linuxserver/ferdium:latest
    container_name: ferdium
    hostname: ferdium
    ports:
      - "${FERDIUM_PORT:-8080}:8080"
    volumes:
      - ferdium_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ferdium_data:
    name: ferdium_data
