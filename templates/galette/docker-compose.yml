version: '3.8'

services:
  galette:
    image: docker.io/galette/galette:latest
    container_name: galette
    hostname: galette
    ports:
      - "${GALETTE_PORT:-8080}:8080"
    volumes:
      - galette_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  galette_data:
    name: galette_data
