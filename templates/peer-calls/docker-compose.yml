version: '3.8'

services:
  peer-calls:
    image: ghcr.io/peer-calls/peer-calls:latest
    container_name: peer-calls
    hostname: peer-calls
    ports:
      - "${PEER_CALLS_PORT:-8080}:8080"
    volumes:
      - peer-calls_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  peer-calls_data:
    name: peer-calls_data
