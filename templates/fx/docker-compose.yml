version: '3.8'

services:
  fx:
    image: docker.io/rikhuijzer/fx:latest
    container_name: fx
    hostname: fx
    ports:
      - "${FX_PORT:-8080}:8080"
    volumes:
      - fx_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fx_data:
    name: fx_data
