version: '3.8'

services:
  koillection:
    image: docker.io/koillection/koillection:latest
    container_name: koillection
    hostname: koillection
    ports:
      - "${KOILLECTION_PORT:-8080}:8080"
    volumes:
      - koillection_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  koillection_data:
    name: koillection_data
