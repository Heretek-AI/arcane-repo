name: Build CC Gateway

on:
  push:
    paths:
      - 'scripts/dockerfiles/cc-gateway/**'
      - 'templates/cc-gateway/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: cc-gateway
    secrets: inherit
