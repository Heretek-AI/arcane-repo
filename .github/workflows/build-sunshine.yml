name: Build Sunshine

on:
  push:
    paths:
      - 'scripts/dockerfiles/sunshine/**'
      - 'templates/sunshine/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: sunshine
    secrets: inherit
