version: '3.8'

services:
  kavita:
    image: docker.io/jvmilazz0/kavita:latest
    container_name: kavita
    hostname: kavita
    ports:
      - "${KAVITA_PORT:-8080}:8080"
    volumes:
      - kavita_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kavita_data:
    name: kavita_data
