version: '3.8'

services:
  woodpecker:
    image: ghcr.io/daemonless/woodpecker:latest
    container_name: woodpecker
    hostname: woodpecker
    ports:
      - "${WOODPECKER_PORT:-8000}:8000"
    volumes:
      - woodpecker_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  woodpecker_data:
    name: woodpecker_data
