version: '3.8'

services:
  rybbit:
    image: docker.io/allocateengineering/rybbit:latest
    container_name: rybbit
    hostname: rybbit
    ports:
      - "${RYBBIT_PORT:-8080}:8080"
    volumes:
      - rybbit_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rybbit_data:
    name: rybbit_data
