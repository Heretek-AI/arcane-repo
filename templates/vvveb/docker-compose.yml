version: '3.8'

services:
  vvveb:
    image: docker.io/hamidno/vvveb:latest
    container_name: vvveb
    hostname: vvveb
    ports:
      - "${VVVEB_PORT:-8080}:8080"
    volumes:
      - vvveb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  vvveb_data:
    name: vvveb_data
