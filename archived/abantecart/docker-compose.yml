version: '3.8'

services:
  abantecart:
    image: docker.io/abantecart/abantecart:latest
    container_name: abantecart
    hostname: abantecart
    ports:
      - "${ABANTECART_PORT:-8080}:8080"
    volumes:
      - abantecart_data:/data
    restart: unless-stopped

volumes:
  abantecart_data:
    name: abantecart_data
