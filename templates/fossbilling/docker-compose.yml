version: '3.8'

services:
  fossbilling:
    image: docker.io/fossbilling/fossbilling:latest
    container_name: fossbilling
    hostname: fossbilling
    ports:
      - "${FOSSBILLING_PORT:-8080}:8080"
    volumes:
      - fossbilling_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fossbilling_data:
    name: fossbilling_data
