version: '3.8'

services:
  mantis:
    image: docker.io/sublimesec/mantis:latest
    container_name: mantis
    hostname: mantis
    ports:
      - "${MANTIS_PORT:-8080}:8080"
    volumes:
      - mantis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mantis_data:
    name: mantis_data
