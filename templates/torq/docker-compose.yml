version: '3.8'

services:
  torq:
    image: docker.io/lncapital/torq:latest
    container_name: torq
    hostname: torq
    ports:
      - "${TORQ_PORT:-8080}:8080"
    volumes:
      - torq_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  torq_data:
    name: torq_data
