name: Build AionUI

on:
  push:
    paths:
      - 'scripts/dockerfiles/aionui/**'
      - 'templates/aionui/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: aionui
    secrets: inherit
