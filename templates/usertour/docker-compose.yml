version: '3.8'

services:
  usertour:
    image: docker.io/usertour/usertour:latest
    container_name: usertour
    hostname: usertour
    ports:
      - "${USERTOUR_PORT:-8080}:8080"
    volumes:
      - usertour_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  usertour_data:
    name: usertour_data
