version: '3.8'

services:
  geeftlist:
    image: docker.io/nanawel/geeftlist:latest
    container_name: geeftlist
    hostname: geeftlist
    ports:
      - "${GEEFTLIST_PORT:-8080}:8080"
    volumes:
      - geeftlist_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  geeftlist_data:
    name: geeftlist_data
