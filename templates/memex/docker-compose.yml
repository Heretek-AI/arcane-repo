version: '3.8'

services:
  memex:
    image: docker.io/shibaobun/memex:latest
    container_name: memex
    hostname: memex
    ports:
      - "${MEMEX_PORT:-8080}:8080"
    volumes:
      - memex_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  memex_data:
    name: memex_data
