version: '3.8'

services:
  rusty-kaspad:
    image: docker.io/kaspanet/rusty-kaspad:latest
    container_name: rusty-kaspad
    hostname: rusty-kaspad
    ports:
      - "${RUSTY_KASPAD_PORT:-8080}:8080"
    volumes:
      - rusty-kaspad_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rusty-kaspad_data:
    name: rusty-kaspad_data
