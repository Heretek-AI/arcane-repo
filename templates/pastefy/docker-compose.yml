version: '3.8'

services:
  pastefy:
    image: docker.io/interaapps/pastefy:latest
    container_name: pastefy
    hostname: pastefy
    ports:
      - "${PASTEFY_PORT:-8080}:8080"
    volumes:
      - pastefy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pastefy_data:
    name: pastefy_data
