version: '3.8'

services:
  filerun:
    image: docker.io/filerun/filerun:latest
    container_name: filerun
    hostname: filerun
    ports:
      - "${FILERUN_PORT:-8080}:8080"
    volumes:
      - filerun_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  filerun_data:
    name: filerun_data
