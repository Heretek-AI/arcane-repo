version: '3.8'

services:
  mollysocket:
    image: ghcr.io/mollysocket/mollysocket:latest
    container_name: mollysocket
    hostname: mollysocket
    ports:
      - "${MOLLYSOCKET_PORT:-8080}:8080"
    volumes:
      - mollysocket_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mollysocket_data:
    name: mollysocket_data
