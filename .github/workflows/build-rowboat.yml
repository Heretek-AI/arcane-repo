name: Build Rowboat

on:
  push:
    paths:
      - 'scripts/dockerfiles/rowboat/**'
      - 'templates/rowboat/**'
      - '.github/workflows/build-rowboat.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: rowboat
    secrets: inherit
