version: '3.8'

services:
  admidio:
    image: docker.io/admidio/admidio:latest
    container_name: admidio
    hostname: admidio
    ports:
      - "${ADMIDIO_PORT:-8080}:8080"
    volumes:
      - admidio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  admidio_data:
    name: admidio_data
