version: '3.8'

services:
  vpnclient:
    image: docker.io/softethervpn/vpnclient:latest
    container_name: vpnclient
    hostname: vpnclient
    ports:
      - "${VPNCLIENT_PORT:-8080}:8080"
    volumes:
      - vpnclient_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  vpnclient_data:
    name: vpnclient_data
