version: '3.8'

services:
  elasticsearch8:
    image: docker.io/danielberteaud/elasticsearch8:latest
    container_name: elasticsearch8
    hostname: elasticsearch8
    ports:
      - "${ELASTICSEARCH8_PORT:-9200}:9200"
    volumes:
      - elasticsearch8_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  elasticsearch8_data:
    name: elasticsearch8_data
