version: '3.8'

services:
  lychee:
    image: ghcr.io/linuxserver/lychee:latest
    container_name: lychee
    hostname: lychee
    ports:
      - "${LYCHEE_PORT:-8080}:8080"
    volumes:
      - lychee_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lychee_data:
    name: lychee_data
