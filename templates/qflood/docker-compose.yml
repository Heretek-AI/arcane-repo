version: '3.8'

services:
  qflood:
    image: ghcr.io/engels74/qflood:latest
    container_name: qflood
    hostname: qflood
    ports:
      - "${QFLOOD_PORT:-8080}:8080"
    volumes:
      - qflood_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qflood_data:
    name: qflood_data
