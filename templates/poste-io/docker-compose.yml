version: '3.8'

services:
  poste-io:
    image: docker.io/analogic/poste.io:latest
    container_name: poste-io
    hostname: poste-io
    ports:
      - "${POSTE_IO_PORT:-8080}:8080"
    volumes:
      - poste-io_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  poste-io_data:
    name: poste-io_data
