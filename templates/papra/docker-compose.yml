version: '3.8'

services:
  papra:
    image: docker.io/corentinth/papra:latest
    container_name: papra
    hostname: papra
    ports:
      - "${PAPRA_PORT:-8080}:8080"
    volumes:
      - papra_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  papra_data:
    name: papra_data
