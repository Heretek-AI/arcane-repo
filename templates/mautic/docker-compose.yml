version: '3.8'

services:
  mautic:
    image: docker.io/mautic/mautic:latest
    container_name: mautic
    hostname: mautic
    ports:
      - "${MAUTIC_PORT:-8080}:8080"
    volumes:
      - mautic_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mautic_data:
    name: mautic_data
