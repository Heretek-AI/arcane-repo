version: '3.8'

services:
  processwire:
    image: docker.io/poljpocket/processwire:latest
    container_name: processwire
    hostname: processwire
    ports:
      - "${PROCESSWIRE_PORT:-8080}:8080"
    volumes:
      - processwire_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  processwire_data:
    name: processwire_data
