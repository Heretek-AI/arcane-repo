version: '3.8'

services:
  rsshub:
    image: ghcr.io/diygod/rsshub:latest
    container_name: rsshub
    hostname: rsshub
    ports:
      - "${RSSHUB_PORT:-8080}:8080"
    volumes:
      - rsshub_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rsshub_data:
    name: rsshub_data
