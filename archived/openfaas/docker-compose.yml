version: '3.8'

services:
  openfaas:
    image: docker.io/jackt72xp/openfaas:latest
    container_name: openfaas
    hostname: openfaas
    ports:
      - "${OPENFAAS_PORT:-8080}:8080"
    volumes:
      - openfaas_data:/data
    restart: unless-stopped

volumes:
  openfaas_data:
    name: openfaas_data
