version: '3.8'

services:
  wordpress:
    image: docker.io/library/wordpress:latest
    container_name: wordpress
    hostname: wordpress
    ports:
      - "${WORDPRESS_PORT:-8080}:8080"
    volumes:
      - wordpress_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wordpress_data:
    name: wordpress_data
