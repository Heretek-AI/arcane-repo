name: Build Clawith

on:
  push:
    paths:
      - 'scripts/dockerfiles/clawith/**'
      - 'templates/clawith/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: clawith
    secrets: inherit
