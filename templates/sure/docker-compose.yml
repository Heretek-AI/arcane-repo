version: '3.8'

services:
  sure:
    image: ghcr.io/we-promise/sure:latest
    container_name: sure
    hostname: sure
    ports:
      - "${SURE_PORT:-8080}:8080"
    volumes:
      - sure_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sure_data:
    name: sure_data
