version: '3.8'

services:
  backdrop:
    image: docker.io/library/backdrop:latest
    container_name: backdrop
    hostname: backdrop
    ports:
      - "${BACKDROP_PORT:-8080}:8080"
    volumes:
      - backdrop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  backdrop_data:
    name: backdrop_data
