version: '3.8'

services:
  commandbox:
    image: docker.io/ortussolutions/commandbox:latest
    container_name: commandbox
    hostname: commandbox
    ports:
      - "${COMMANDBOX_PORT:-8080}:8080"
    volumes:
      - commandbox_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  commandbox_data:
    name: commandbox_data
