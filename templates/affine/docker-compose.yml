version: '3.8'

services:
  affine:
    image: docker.io/affinefoundation/affine:latest
    container_name: affine
    hostname: affine
    ports:
      - "${AFFINE_PORT:-8080}:8080"
    volumes:
      - affine_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  affine_data:
    name: affine_data
