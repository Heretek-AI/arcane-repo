version: '3.8'

services:
  facilmap:
    image: docker.io/facilmap/facilmap:latest
    container_name: facilmap
    hostname: facilmap
    ports:
      - "${FACILMAP_PORT:-8080}:8080"
    volumes:
      - facilmap_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  facilmap_data:
    name: facilmap_data
