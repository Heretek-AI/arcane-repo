version: '3.8'

services:
  discourse:
    image: docker.io/discourse/discourse:latest
    container_name: discourse
    hostname: discourse
    ports:
      - "${DISCOURSE_PORT:-8080}:8080"
    volumes:
      - discourse_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  discourse_data:
    name: discourse_data
