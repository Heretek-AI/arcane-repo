version: '3.8'

services:
  olivetin:
    image: ghcr.io/olivetin/olivetin:latest
    container_name: olivetin
    hostname: olivetin
    ports:
      - "${OLIVETIN_PORT:-8080}:8080"
    volumes:
      - olivetin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  olivetin_data:
    name: olivetin_data
