version: '3.8'

services:
  eleventy:
    image: docker.io/femtopixel/eleventy:latest
    container_name: eleventy
    hostname: eleventy
    ports:
      - "${ELEVENTY_PORT:-8080}:8080"
    volumes:
      - eleventy_data:/data
    restart: unless-stopped

volumes:
  eleventy_data:
    name: eleventy_data
