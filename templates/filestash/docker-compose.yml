version: '3.8'

services:
  filestash:
    image: docker.io/machines/filestash:latest
    container_name: filestash
    hostname: filestash
    ports:
      - "${FILESTASH_PORT:-8080}:8080"
    volumes:
      - filestash_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  filestash_data:
    name: filestash_data
