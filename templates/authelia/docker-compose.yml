version: '3.8'

services:
  authelia:
    image: ghcr.io/authelia/authelia:latest
    container_name: authelia
    hostname: authelia
    ports:
      - "${AUTHELIA_PORT:-9091}:9091"
    volumes:
      - authelia_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  authelia_data:
    name: authelia_data
