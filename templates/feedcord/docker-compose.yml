version: '3.8'

services:
  feedcord:
    image: docker.io/qolors/feedcord:latest
    container_name: feedcord
    hostname: feedcord
    ports:
      - "${FEEDCORD_PORT:-8080}:8080"
    volumes:
      - feedcord_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  feedcord_data:
    name: feedcord_data
