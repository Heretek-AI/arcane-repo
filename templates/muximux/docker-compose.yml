version: '3.8'

services:
  muximux:
    image: ghcr.io/linuxserver/muximux:latest
    container_name: muximux
    hostname: muximux
    ports:
      - "${MUXIMUX_PORT:-8080}:8080"
    volumes:
      - muximux_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  muximux_data:
    name: muximux_data
