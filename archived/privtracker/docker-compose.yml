version: '3.8'

services:
  privtracker:
    image: docker.io/meehow/privtracker:latest
    container_name: privtracker
    hostname: privtracker
    ports:
      - "${PRIVTRACKER_PORT:-8080}:8080"
    volumes:
      - privtracker_data:/data
    restart: unless-stopped

volumes:
  privtracker_data:
    name: privtracker_data
