name: Build Plexe

on:
  push:
    paths:
      - 'scripts/dockerfiles/plexe/**'
      - 'templates/plexe/**'
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: plexe
    secrets: inherit
