version: '3.8'

services:
  rosariosis:
    image: docker.io/rosariosis/rosariosis:latest
    container_name: rosariosis
    hostname: rosariosis
    ports:
      - "${ROSARIOSIS_PORT:-8080}:8080"
    volumes:
      - rosariosis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rosariosis_data:
    name: rosariosis_data
