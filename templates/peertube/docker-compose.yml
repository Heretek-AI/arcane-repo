version: '3.8'

services:
  peertube:
    image: docker.io/chocobozzz/peertube:latest
    container_name: peertube
    hostname: peertube
    ports:
      - "${PEERTUBE_PORT:-9000}:9000"
    volumes:
      - peertube_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  peertube_data:
    name: peertube_data
