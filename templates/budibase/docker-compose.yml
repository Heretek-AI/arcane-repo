version: '3.8'

services:
  budibase:
    image: docker.io/budibase/budibase:latest
    container_name: budibase
    hostname: budibase
    ports:
      - "${BUDIBASE_PORT:-8080}:8080"
    volumes:
      - budibase_data:/data
    restart: unless-stopped

volumes:
  budibase_data:
    name: budibase_data
