version: '3.8'

services:
  reiverr:
    image: docker.io/t0bis/reiverr:latest
    container_name: reiverr
    hostname: reiverr
    ports:
      - "${REIVERR_PORT:-8080}:8080"
    volumes:
      - reiverr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  reiverr_data:
    name: reiverr_data
