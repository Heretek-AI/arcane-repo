version: '3.8'

services:
  watchdog:
    image: ghcr.io/mailcow/watchdog:latest
    container_name: watchdog
    hostname: watchdog
    ports:
      - "${WATCHDOG_PORT:-8080}:8080"
    volumes:
      - watchdog_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  watchdog_data:
    name: watchdog_data
