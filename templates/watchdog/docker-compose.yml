version: '3.8'

services:
  watchdog:
    image: ghcr.io/mailcow/watchdog:latest
    container_name: watchdog
    hostname: watchdog
    ports:
      - "${WATCHDOG_PORT:-8080}:8080"
    volumes:
      - watchdog_data:/data
    restart: unless-stopped

volumes:
  watchdog_data:
    name: watchdog_data
