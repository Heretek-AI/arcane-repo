version: '3.8'

services:
  invoice-ninja:
    image: docker.io/invoiceninja/invoiceninja:latest
    container_name: invoice-ninja
    hostname: invoice-ninja
    ports:
      - "${INVOICE_NINJA_PORT:-80}:80"
    restart: unless-stopped
    volumes:
      - invoice-ninja_data:/data

volumes:
  invoice-ninja_data:
    name: invoice-ninja_data
