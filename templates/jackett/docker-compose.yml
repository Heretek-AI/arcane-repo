version: '3.8'

services:
  jackett:
    image: ghcr.io/linuxserver/jackett:latest
    container_name: jackett
    hostname: jackett
    ports:
      - "${JACKETT_PORT:-8080}:8080"
    volumes:
      - jackett_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jackett_data:
    name: jackett_data
