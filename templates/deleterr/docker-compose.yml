version: '3.8'

services:
  deleterr:
    image: ghcr.io/rfsbraz/deleterr:latest
    container_name: deleterr
    hostname: deleterr
    ports:
      - "${DELETERR_PORT:-8080}:8080"
    volumes:
      - deleterr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  deleterr_data:
    name: deleterr_data
