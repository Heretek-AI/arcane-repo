version: '3.8'

services:
  sickchill:
    image: ghcr.io/sickchill/sickchill:latest
    container_name: sickchill
    hostname: sickchill
    ports:
      - "${SICKCHILL_PORT:-8080}:8080"
    volumes:
      - sickchill_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sickchill_data:
    name: sickchill_data
