version: '3.8'

services:
  tensorzero:
    image: tensorzero/gateway:latest
    container_name: tensorzero
    hostname: tensorzero
    ports:
      - "${TENSORZERO_PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      # ── Inference Providers ──────────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      # ── Local Inference ──────────────────────────────────────────────
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # ── Observability ────────────────────────────────────────────────
      - TENSORZERO_CLICKHOUSE_URL=${TENSORZERO_CLICKHOUSE_URL:-}
      # ── Gateway Config ───────────────────────────────────────────────
      - TENSORZERO_CONFIG_FILE=${TENSORZERO_CONFIG_FILE:-/app/config/tensorzero.toml}
    volumes:
      - ./config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
