version: '3.8'

services:
  libretranslate:
    image: docker.io/libretranslate/libretranslate:latest
    container_name: libretranslate
    hostname: libretranslate
    ports:
      - "${LIBRETRANSLATE_PORT:-8080}:8080"
    volumes:
      - libretranslate_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  libretranslate_data:
    name: libretranslate_data
