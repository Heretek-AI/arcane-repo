version: '3.8'

services:
  phanpy:
    image: docker.io/ganeshlab/phanpy:latest
    container_name: phanpy
    hostname: phanpy
    ports:
      - "${PHANPY_PORT:-8080}:8080"
    volumes:
      - phanpy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  phanpy_data:
    name: phanpy_data
