version: '3.8'

services:
  qui:
    image: docker.io/fvboegeld/qui:latest
    container_name: qui
    hostname: qui
    ports:
      - "${QUI_PORT:-8080}:8080"
    volumes:
      - qui_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qui_data:
    name: qui_data
