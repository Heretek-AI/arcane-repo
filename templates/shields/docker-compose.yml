version: '3.8'

services:
  shields:
    image: docker.io/shieldsio/shields:latest
    container_name: shields
    hostname: shields
    ports:
      - "${SHIELDS_PORT:-8080}:8080"
    volumes:
      - shields_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shields_data:
    name: shields_data
