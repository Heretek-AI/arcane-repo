version: '3.8'

services:
  manyfold:
    image: ghcr.io/linuxserver/manyfold:latest
    container_name: manyfold
    hostname: manyfold
    ports:
      - "${MANYFOLD_PORT:-8080}:8080"
    volumes:
      - manyfold_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  manyfold_data:
    name: manyfold_data
