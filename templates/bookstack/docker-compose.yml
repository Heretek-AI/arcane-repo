version: '3.8'

services:
  bookstack:
    image: ghcr.io/linuxserver/bookstack:latest
    container_name: bookstack
    hostname: bookstack
    ports:
      - "${BOOKSTACK_PORT:-8080}:8080"
    volumes:
      - bookstack_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bookstack_data:
    name: bookstack_data
