version: '3.8'

services:
  gitingest:
    image: docker.io/elestio/gitingest:latest
    container_name: gitingest
    hostname: gitingest
    ports:
      - "${GITINGEST_PORT:-8080}:8080"
    volumes:
      - gitingest_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gitingest_data:
    name: gitingest_data
