version: '3.8'

services:
  drop:
    image: docker.io/clinicalgenomics/drop:latest
    container_name: drop
    hostname: drop
    ports:
      - "${DROP_PORT:-8080}:8080"
    volumes:
      - drop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  drop_data:
    name: drop_data
