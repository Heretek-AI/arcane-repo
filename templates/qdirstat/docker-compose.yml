version: '3.8'

services:
  qdirstat:
    image: ghcr.io/jlesage/qdirstat:latest
    container_name: qdirstat
    hostname: qdirstat
    ports:
      - "${QDIRSTAT_PORT:-8080}:8080"
    volumes:
      - qdirstat_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qdirstat_data:
    name: qdirstat_data
