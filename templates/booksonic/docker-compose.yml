version: '3.8'

services:
  booksonic:
    image: ghcr.io/linuxserver/booksonic:latest
    container_name: booksonic
    hostname: booksonic
    ports:
      - "${BOOKSONIC_PORT:-8080}:8080"
    volumes:
      - booksonic_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  booksonic_data:
    name: booksonic_data
