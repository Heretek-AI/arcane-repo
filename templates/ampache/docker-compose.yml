version: '3.8'

services:
  ampache:
    image: docker.io/ampache/ampache:latest
    container_name: ampache
    hostname: ampache
    ports:
      - "${AMPACHE_PORT:-8080}:8080"
    volumes:
      - ampache_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ampache_data:
    name: ampache_data
