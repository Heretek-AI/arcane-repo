version: '3.8'

services:
  authentik:
    image: ghcr.io/beryju/authentik:latest
    container_name: authentik
    hostname: authentik
    ports:
      - "${AUTHENTIK_PORT:-9000}:9000"
    volumes:
      - authentik_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  authentik_data:
    name: authentik_data
