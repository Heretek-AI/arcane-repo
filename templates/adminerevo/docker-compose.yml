version: '3.8'

services:
  adminerevo:
    image: ghcr.io/shyim/adminerevo:latest
    container_name: adminerevo
    hostname: adminerevo
    ports:
      - "${ADMINEREVO_PORT:-8080}:8080"
    volumes:
      - adminerevo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  adminerevo_data:
    name: adminerevo_data
