version: '3.8'

services:
  checkcle:
    image: docker.io/operacle/checkcle:latest
    container_name: checkcle
    hostname: checkcle
    ports:
      - "${CHECKCLE_PORT:-8080}:8080"
    volumes:
      - checkcle_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  checkcle_data:
    name: checkcle_data
