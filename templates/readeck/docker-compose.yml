version: '3.8'

services:
  readeck:
    image: docker.io/pan93412/readeck:latest
    container_name: readeck
    hostname: readeck
    ports:
      - "${READECK_PORT:-8080}:8080"
    volumes:
      - readeck_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  readeck_data:
    name: readeck_data
