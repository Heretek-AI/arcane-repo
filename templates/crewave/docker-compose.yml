version: "3.8"

services:
  crewai:
    image: python:3.12-slim
    container_name: crewai
    hostname: crewai
    ports:
      - "${CREWAI_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - CREWAI_PORT=${CREWAI_PORT:-8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
    command: >
      sh -c "
      pip install --no-cache-dir -q crewai uvicorn fastapi &&
      cat > /app/server.py << 'PYEOF'
import os
from fastapi import FastAPI

app = FastAPI(title='CrewAI', version='1.0.0', description='CrewAI Agent Orchestration Framework')

@app.get('/health')
async def health():
    return {'status': 'ok', 'framework': 'CrewAI'}

if __name__ == '__main__':
    import uvicorn
    uvicorn.run(app, host='0.0.0.0', port=int(os.environ.get('CREWAI_PORT', '8000')))
PYEOF
      uvicorn server:app --host 0.0.0.0 --port ${CREWAI_PORT:-8000}
      "
