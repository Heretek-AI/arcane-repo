version: '3.8'

services:
  freshrss:
    image: ghcr.io/linuxserver/freshrss:latest
    container_name: freshrss
    hostname: freshrss
    ports:
      - "${FRESHRSS_PORT:-80}:80"
    volumes:
      - freshrss_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  freshrss_data:
    name: freshrss_data
