version: '3.8'

services:
  glances:
    image: docker.io/nicolargo/glances:latest
    container_name: glances
    hostname: glances
    ports:
      - "${GLANCES_PORT:-8080}:8080"
    volumes:
      - glances_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  glances_data:
    name: glances_data
