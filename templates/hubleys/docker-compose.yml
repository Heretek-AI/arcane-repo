version: '3.8'

services:
  hubleys:
    image: ghcr.io/knrdl/hubleys-dashboard:latest
    container_name: hubleys
    hostname: hubleys
    ports:
      - "${HUBLEYS_PORT:-8080}:8080"
    volumes:
      - hubleys_data:/data
    restart: unless-stopped

volumes:
  hubleys_data:
    name: hubleys_data
