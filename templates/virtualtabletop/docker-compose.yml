version: '3.8'

services:
  virtualtabletop:
    image: docker.io/arnoldsmith86/virtualtabletop:latest
    container_name: virtualtabletop
    hostname: virtualtabletop
    ports:
      - "${VIRTUALTABLETOP_PORT:-8080}:8080"
    volumes:
      - virtualtabletop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  virtualtabletop_data:
    name: virtualtabletop_data
