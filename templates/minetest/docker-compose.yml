version: '3.8'

services:
  minetest:
    image: ghcr.io/linuxserver/minetest:latest
    container_name: minetest
    hostname: minetest
    ports:
      - "${MINETEST_PORT:-8080}:8080"
    volumes:
      - minetest_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  minetest_data:
    name: minetest_data
