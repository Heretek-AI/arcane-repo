version: '3.8'

services:
  scanservjs:
    image: docker.io/sbs20/scanservjs:latest
    container_name: scanservjs
    hostname: scanservjs
    ports:
      - "${SCANSERVJS_PORT:-8080}:8080"
    volumes:
      - scanservjs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  scanservjs_data:
    name: scanservjs_data
