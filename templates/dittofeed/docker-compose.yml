version: '3.8'

services:
  dittofeed:
    image: docker.io/sefiroed/dittofeed:latest
    container_name: dittofeed
    hostname: dittofeed
    ports:
      - "${DITTOFEED_PORT:-8080}:8080"
    volumes:
      - dittofeed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dittofeed_data:
    name: dittofeed_data
