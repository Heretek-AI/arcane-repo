version: '3.8'

services:
  libre-relay:
    image: docker.io/levinster82/libre-relay:latest
    container_name: libre-relay
    hostname: libre-relay
    ports:
      - "${LIBRE_RELAY_PORT:-8080}:8080"
    volumes:
      - libre-relay_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  libre-relay_data:
    name: libre-relay_data
