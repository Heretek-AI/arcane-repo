version: '3.8'

services:
  tooljet:
    image: docker.io/tooljet/tooljet:latest
    container_name: tooljet
    hostname: tooljet
    ports:
      - "${TOOLJET_PORT:-8080}:8080"
    volumes:
      - tooljet_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tooljet_data:
    name: tooljet_data
