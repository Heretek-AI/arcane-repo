version: '3.8'

services:
  memos:
    image: docker.io/neosmemo/memos:latest
    container_name: memos
    hostname: memos
    ports:
      - "${MEMOS_PORT:-8080}:8080"
    volumes:
      - memos_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  memos_data:
    name: memos_data
