version: '3.8'

services:
  davos:
    image: ghcr.io/linuxserver/davos:latest
    container_name: davos
    hostname: davos
    ports:
      - "${DAVOS_PORT:-8080}:8080"
    volumes:
      - davos_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  davos_data:
    name: davos_data
