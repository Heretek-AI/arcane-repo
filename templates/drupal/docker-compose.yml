version: '3.8'

services:
  drupal:
    image: docker.io/bitnami/drupal:latest
    container_name: drupal
    hostname: drupal
    ports:
      - "${DRUPAL_PORT:-8080}:8080"
    volumes:
      - drupal_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  drupal_data:
    name: drupal_data
