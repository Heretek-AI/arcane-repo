version: '3.8'

services:
  sheetable:
    image: ghcr.io/sheetable/sheetable:latest
    container_name: sheetable
    hostname: sheetable
    ports:
      - "${SHEETABLE_PORT:-8080}:8080"
    volumes:
      - sheetable_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sheetable_data:
    name: sheetable_data
