version: '3.8'

services:
  keila:
    image: docker.io/pentacent/keila:latest
    container_name: keila
    hostname: keila
    ports:
      - "${KEILA_PORT:-8080}:8080"
    volumes:
      - keila_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  keila_data:
    name: keila_data
