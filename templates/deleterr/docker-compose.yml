version: '3.8'

services:
  deleterr:
    image: ghcr.io/rfsbraz/deleterr:latest
    container_name: deleterr
    hostname: deleterr
    ports:
      - "${DELETERR_PORT:-8080}:8080"
    volumes:
      - deleterr_data:/data
    restart: unless-stopped

volumes:
  deleterr_data:
    name: deleterr_data
