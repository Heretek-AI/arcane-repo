version: '3.8'

services:
  pumperly:
    image: docker.io/drumsergio/pumperly:latest
    container_name: pumperly
    hostname: pumperly
    ports:
      - "${PUMPERLY_PORT:-8080}:8080"
    volumes:
      - pumperly_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pumperly_data:
    name: pumperly_data
