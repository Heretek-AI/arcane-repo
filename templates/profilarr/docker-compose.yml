version: '3.8'

services:
  profilarr:
    image: docker.io/santiagosayshey/profilarr:latest
    container_name: profilarr
    hostname: profilarr
    ports:
      - "${PROFILARR_PORT:-8080}:8080"
    volumes:
      - profilarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  profilarr_data:
    name: profilarr_data
