version: '3.8'

services:
  airtrail:
    image: docker.io/johly/airtrail:latest
    container_name: airtrail
    hostname: airtrail
    ports:
      - "${AIRTRAIL_PORT:-8080}:8080"
    volumes:
      - airtrail_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  airtrail_data:
    name: airtrail_data
