version: '3.8'

services:
  jellyfin-vue:
    image: ghcr.io/jellyfin/jellyfin-vue:latest
    container_name: jellyfin-vue
    hostname: jellyfin-vue
    ports:
      - "${JELLYFIN_VUE_PORT:-8096}:8096"
    volumes:
      - jellyfin-vue_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8096/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jellyfin-vue_data:
    name: jellyfin-vue_data
