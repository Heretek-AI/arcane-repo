version: '3.8'

services:
  fider:
    image: docker.io/getfider/fider:latest
    container_name: fider
    hostname: fider
    ports:
      - "${FIDER_PORT:-8080}:8080"
    volumes:
      - fider_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fider_data:
    name: fider_data
