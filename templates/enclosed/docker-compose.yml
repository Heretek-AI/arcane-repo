version: '3.8'

services:
  enclosed:
    image: ghcr.io/corentinth/enclosed:latest
    container_name: enclosed
    hostname: enclosed
    ports:
      - "${ENCLOSED_PORT:-8080}:8080"
    volumes:
      - enclosed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  enclosed_data:
    name: enclosed_data
