version: '3.8'

services:
  kanboard:
    image: ghcr.io/kanboard/kanboard:latest
    container_name: kanboard
    hostname: kanboard
    ports:
      - "${KANBOARD_PORT:-8080}:8080"
    volumes:
      - kanboard_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kanboard_data:
    name: kanboard_data
