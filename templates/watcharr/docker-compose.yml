version: '3.8'

services:
  watcharr:
    image: ghcr.io/sbondco/watcharr:latest
    container_name: watcharr
    hostname: watcharr
    ports:
      - "${WATCHARR_PORT:-8080}:8080"
    volumes:
      - watcharr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  watcharr_data:
    name: watcharr_data
