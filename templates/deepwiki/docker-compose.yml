version: '3.8'

services:
  deepwiki:
    image: ghcr.io/asyncfuncai/deepwiki-open:latest
    container_name: deepwiki
    hostname: deepwiki
    ports:
      - "${DEEPWIKI_API_PORT:-8001}:8001"
      - "${DEEPWIKI_UI_PORT:-3000}:3000"
    volumes:
      - deepwiki_data:/root/.adalflow
      - deepwiki_logs:/app/api/logs
    restart: unless-stopped
    environment:
      # ── API Server ──────────────────────────────────────────────────
      - PORT=${DEEPWIKI_API_PORT:-8001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${DEEPWIKI_API_PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # ── LLM Configuration ───────────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # ── Embedding Model ─────────────────────────────────────────────
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
    # Resource limits
    mem_limit: 6g
    mem_reservation: 2g

volumes:
  deepwiki_data:
    name: deepwiki_data
  deepwiki_logs:
    name: deepwiki_logs
