version: '3.8'

services:
  headphones:
    image: ghcr.io/linuxserver/headphones:latest
    container_name: headphones
    hostname: headphones
    ports:
      - "${HEADPHONES_PORT:-8080}:8080"
    volumes:
      - headphones_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  headphones_data:
    name: headphones_data
