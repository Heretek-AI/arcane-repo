version: '3.8'

services:
  pyload-ng:
    image: ghcr.io/linuxserver/pyload-ng:latest
    container_name: pyload-ng
    hostname: pyload-ng
    ports:
      - "${PYLOAD_NG_PORT:-8080}:8080"
    volumes:
      - pyload-ng_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pyload-ng_data:
    name: pyload-ng_data
