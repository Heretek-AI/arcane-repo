version: '3.8'

services:
  wavelog:
    image: ghcr.io/wavelog/wavelog:latest
    container_name: wavelog
    hostname: wavelog
    ports:
      - "${WAVELOG_PORT:-8080}:8080"
    volumes:
      - wavelog_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wavelog_data:
    name: wavelog_data
