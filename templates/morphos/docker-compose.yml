version: '3.8'

services:
  morphos:
    image: docker.io/wapmorgan/morphos:latest
    container_name: morphos
    hostname: morphos
    ports:
      - "${MORPHOS_PORT:-8080}:8080"
    volumes:
      - morphos_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  morphos_data:
    name: morphos_data
