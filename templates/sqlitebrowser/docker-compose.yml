version: '3.8'

services:
  sqlitebrowser:
    image: ghcr.io/linuxserver/sqlitebrowser:latest
    container_name: sqlitebrowser
    hostname: sqlitebrowser
    ports:
      - "${SQLITEBROWSER_PORT:-8080}:8080"
    volumes:
      - sqlitebrowser_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sqlitebrowser_data:
    name: sqlitebrowser_data
