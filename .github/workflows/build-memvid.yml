name: Build MemVid

on:
  push:
    paths:
      - 'scripts/dockerfiles/memvid/**'
      - 'templates/memvid/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: memvid
    secrets: inherit
