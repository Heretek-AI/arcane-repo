version: '3.8'

services:
  gathio:
    image: docker.io/pheezer/gathio:latest
    container_name: gathio
    hostname: gathio
    ports:
      - "${GATHIO_PORT:-8080}:8080"
    volumes:
      - gathio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gathio_data:
    name: gathio_data
