version: '3.8'

services:
  wikijs:
    image: ghcr.io/linuxserver/wikijs:latest
    container_name: wikijs
    hostname: wikijs
    ports:
      - "${WIKIJS_PORT:-80}:80"
    volumes:
      - wikijs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wikijs_data:
    name: wikijs_data
