version: '3.8'

services:
  firefly-iii:
    image: ghcr.io/supersandro2000/firefly-iii:latest
    container_name: firefly-iii
    hostname: firefly-iii
    ports:
      - "${FIREFLY_III_PORT:-8080}:8080"
    volumes:
      - firefly-iii_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  firefly-iii_data:
    name: firefly-iii_data
