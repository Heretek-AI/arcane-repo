version: '3.8'

services:
  meme-search:
    image: ghcr.io/neonwatty/meme-search:latest
    container_name: meme-search
    hostname: meme-search
    ports:
      - "${MEME_SEARCH_PORT:-8080}:8080"
    volumes:
      - meme-search_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  meme-search_data:
    name: meme-search_data
