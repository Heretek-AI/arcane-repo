version: '3.8'

services:
  keeweb:
    image: ghcr.io/keeweb/keeweb:latest
    container_name: keeweb
    hostname: keeweb
    ports:
      - "${KEEWEB_PORT:-8080}:8080"
    volumes:
      - keeweb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  keeweb_data:
    name: keeweb_data
