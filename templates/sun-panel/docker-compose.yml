version: "3.8"

services:
  sun-panel:
    image: hslr/sun-panel:latest
    container_name: sun-panel
    hostname: sun-panel
    ports:
      - "${SUN_PANEL_PORT:-3002}:3002"
    restart: unless-stopped
    volumes:
      - sun_panel_data:/app/data
      - sun_panel_conf:/app/conf
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sun_panel_data:
    driver: local
  sun_panel_conf:
    driver: local
