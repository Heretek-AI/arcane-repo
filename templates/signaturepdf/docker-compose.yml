version: '3.8'

services:
  signaturepdf:
    image: docker.io/xgaia/signaturepdf:latest
    container_name: signaturepdf
    hostname: signaturepdf
    ports:
      - "${SIGNATUREPDF_PORT:-8080}:8080"
    volumes:
      - signaturepdf_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  signaturepdf_data:
    name: signaturepdf_data
