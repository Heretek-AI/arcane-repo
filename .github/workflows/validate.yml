name: Validate Templates

on:
  pull_request:
    paths:
      - 'templates/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate template folders
        run: node scripts/build-registry.js --validate-only
