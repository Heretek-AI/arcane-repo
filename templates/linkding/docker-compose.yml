version: '3.8'

services:
  linkding:
    image: ghcr.io/sissbruecker/linkding:latest
    container_name: linkding
    hostname: linkding
    ports:
      - "${LINKDING_PORT:-8080}:8080"
    volumes:
      - linkding_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  linkding_data:
    name: linkding_data
