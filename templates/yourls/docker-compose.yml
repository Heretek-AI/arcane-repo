version: '3.8'

services:
  yourls:
    image: ghcr.io/yourls/yourls:latest
    container_name: yourls
    hostname: yourls
    ports:
      - "${YOURLS_PORT:-8080}:8080"
    volumes:
      - yourls_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yourls_data:
    name: yourls_data
