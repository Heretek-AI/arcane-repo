version: '3.8'

services:
  odoo:
    image: docker.io/bitnami/odoo:latest
    container_name: odoo
    hostname: odoo
    ports:
      - "${ODOO_PORT:-8080}:8080"
    volumes:
      - odoo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  odoo_data:
    name: odoo_data
