version: '3.8'

services:
  gatus:
    image: docker.io/twinproduction/gatus:latest
    container_name: gatus
    hostname: gatus
    ports:
      - "${GATUS_PORT:-8080}:8080"
    volumes:
      - gatus_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gatus_data:
    name: gatus_data
