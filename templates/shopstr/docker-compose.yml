version: '3.8'

services:
  shopstr:
    image: docker.io/calvadev/shopstr:latest
    container_name: shopstr
    hostname: shopstr
    ports:
      - "${SHOPSTR_PORT:-8080}:8080"
    volumes:
      - shopstr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shopstr_data:
    name: shopstr_data
