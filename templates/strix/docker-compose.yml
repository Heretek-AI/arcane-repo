version: '3.8'

services:
  strix:
    image: docker.io/eduard256/strix:latest
    container_name: strix
    hostname: strix
    ports:
      - "${STRIX_PORT:-8080}:8080"
    volumes:
      - strix_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  strix_data:
    name: strix_data
