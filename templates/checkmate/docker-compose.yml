version: '3.8'

services:
  checkmate:
    image: docker.io/hypothesis/checkmate:latest
    container_name: checkmate
    hostname: checkmate
    ports:
      - "${CHECKMATE_PORT:-8080}:8080"
    volumes:
      - checkmate_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  checkmate_data:
    name: checkmate_data
