version: '3.8'

services:
  mailarchiver:
    image: ghcr.io/s1t5/mailarchiver:latest
    container_name: mailarchiver
    hostname: mailarchiver
    ports:
      - "${MAILARCHIVER_PORT:-8080}:8080"
    volumes:
      - mailarchiver_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mailarchiver_data:
    name: mailarchiver_data
