version: '3.8'

services:
  ariang:
    image: docker.io/p3terx/ariang:latest
    container_name: ariang
    hostname: ariang
    ports:
      - "${ARIANG_PORT:-8080}:8080"
    volumes:
      - ariang_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ariang_data:
    name: ariang_data
