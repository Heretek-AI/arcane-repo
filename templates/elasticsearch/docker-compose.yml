version: '3.8'

services:
  elasticsearch:
    image: docker.io/bitnamicharts/elasticsearch:latest
    container_name: elasticsearch
    hostname: elasticsearch
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  elasticsearch_data:
    name: elasticsearch_data
