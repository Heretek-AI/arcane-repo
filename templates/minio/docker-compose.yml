version: '3.8'

services:
  minio:
    image: docker.io/minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  minio_data:
    name: minio_data
