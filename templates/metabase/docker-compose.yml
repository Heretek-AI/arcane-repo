version: '3.8'

services:
  metabase:
    image: docker.io/metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    ports:
      - "${METABASE_PORT:-8080}:8080"
    volumes:
      - metabase_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  metabase_data:
    name: metabase_data
