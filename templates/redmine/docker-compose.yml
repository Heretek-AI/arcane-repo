version: '3.8'

services:
  redmine:
    image: ghcr.io/sameersbn/redmine:latest
    container_name: redmine
    hostname: redmine
    ports:
      - "${REDMINE_PORT:-8080}:8080"
    volumes:
      - redmine_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redmine_data:
    name: redmine_data
