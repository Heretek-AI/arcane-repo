version: '3.8'

services:
  matomo:
    image: docker.io/library/matomo:latest
    container_name: matomo
    hostname: matomo
    ports:
      - "${MATOMO_PORT:-8080}:8080"
    volumes:
      - matomo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  matomo_data:
    name: matomo_data
