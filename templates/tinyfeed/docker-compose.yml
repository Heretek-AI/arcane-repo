version: '3.8'

services:
  tinyfeed:
    image: docker.io/thebigroomxxl/tinyfeed:latest
    container_name: tinyfeed
    hostname: tinyfeed
    ports:
      - "${TINYFEED_PORT:-8080}:8080"
    volumes:
      - tinyfeed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tinyfeed_data:
    name: tinyfeed_data
