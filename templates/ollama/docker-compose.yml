version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    hostname: ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    # ── Optional NVIDIA GPU passthrough ──────────────────────────────────
    # Uncomment the deploy block below to enable GPU acceleration on hosts
    # with NVIDIA drivers and nvidia-container-toolkit installed.
    # This block gracefully degrades on hosts without GPUs — the container
    # starts with CPU-only inference if the reservation cannot be satisfied.
    #
    # Prerequisites:
    #   1. Install NVIDIA drivers: https://www.nvidia.com/drivers
    #   2. Install nvidia-container-toolkit:
    #        sudo apt-get install nvidia-container-toolkit
    #        sudo systemctl restart docker
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
    name: ollama_data
