version: '3.8'

services:
  bludit:
    image: docker.io/sybex/bludit:latest
    container_name: bludit
    hostname: bludit
    ports:
      - "${BLUDIT_PORT:-8080}:8080"
    volumes:
      - bludit_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bludit_data:
    name: bludit_data
