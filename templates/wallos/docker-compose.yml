version: '3.8'

services:
  wallos:
    image: docker.io/bellamy/wallos:latest
    container_name: wallos
    hostname: wallos
    ports:
      - "${WALLOS_PORT:-8080}:8080"
    volumes:
      - wallos_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wallos_data:
    name: wallos_data
