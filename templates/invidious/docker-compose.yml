version: '3.8'

services:
  invidious:
    image: docker.io/invidious/invidious:latest
    container_name: invidious
    hostname: invidious
    ports:
      - "${INVIDIOUS_PORT:-8080}:8080"
    volumes:
      - invidious_data:/data
    restart: unless-stopped

volumes:
  invidious_data:
    name: invidious_data
