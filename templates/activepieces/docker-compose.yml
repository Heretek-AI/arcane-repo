version: '3.8'

services:
  activepieces:
    image: ghcr.io/activepieces/activepieces:latest
    container_name: activepieces
    hostname: activepieces
    ports:
      - "${ACTIVEPIECES_PORT:-8080}:8080"
    volumes:
      - activepieces_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  activepieces_data:
    name: activepieces_data
