version: '3.8'

services:
  kata-containers:
    image: docker.io/akoptelov/kata-containers:latest
    container_name: kata-containers
    hostname: kata-containers
    ports:
      - "${KATA_CONTAINERS_PORT:-8080}:8080"
    volumes:
      - kata-containers_data:/data
    restart: unless-stopped

volumes:
  kata-containers_data:
    name: kata-containers_data
