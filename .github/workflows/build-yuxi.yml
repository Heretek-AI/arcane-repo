name: Build Yuxi

on:
  push:
    paths:
      - 'scripts/dockerfiles/yuxi/**'
      - 'templates/yuxi/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: yuxi
    secrets: inherit
