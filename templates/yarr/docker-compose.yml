version: '3.8'

services:
  yarr:
    image: ghcr.io/arsfeld/yarr:latest
    container_name: yarr
    hostname: yarr
    ports:
      - "${YARR_PORT:-8080}:8080"
    volumes:
      - yarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yarr_data:
    name: yarr_data
