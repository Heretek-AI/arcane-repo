name: Build Vane

on:
  push:
    paths:
      - 'scripts/dockerfiles/vane/**'
      - 'templates/vane/**'
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: vane
    secrets: inherit
