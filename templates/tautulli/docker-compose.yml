version: '3.8'

services:
  tautulli:
    image: ghcr.io/tautulli/tautulli:latest
    container_name: tautulli
    hostname: tautulli
    ports:
      - "${TAUTULLI_PORT:-8080}:8080"
    volumes:
      - tautulli_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tautulli_data:
    name: tautulli_data
