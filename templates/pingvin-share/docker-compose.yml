version: '3.8'

services:
  pingvin-share:
    image: ghcr.io/stonith404/pingvin-share:latest
    container_name: pingvin-share
    hostname: pingvin-share
    ports:
      - "${PINGVIN_SHARE_PORT:-8080}:8080"
    volumes:
      - pingvin-share_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pingvin-share_data:
    name: pingvin-share_data
