version: '3.8'

services:
  nitter:
    image: docker.io/zedeus/nitter:latest
    container_name: nitter
    hostname: nitter
    ports:
      - "${NITTER_PORT:-8080}:8080"
    volumes:
      - nitter_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nitter_data:
    name: nitter_data
