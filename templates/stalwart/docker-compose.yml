version: '3.8'

services:
  stalwart:
    image: ghcr.io/stalwartlabs/stalwart:latest
    container_name: stalwart
    hostname: stalwart
    ports:
      - "${STALWART_PORT:-8080}:8080"
    volumes:
      - stalwart_data:/data
    restart: unless-stopped

volumes:
  stalwart_data:
    name: stalwart_data
