version: '3.8'

services:
  rocketchat:
    image: docker.io/rocketchat/rocketchat:latest
    container_name: rocketchat
    hostname: rocketchat
    ports:
      - "${ROCKETCHAT_PORT:-8080}:8080"
    volumes:
      - rocketchat_data:/data
    restart: unless-stopped

volumes:
  rocketchat_data:
    name: rocketchat_data
