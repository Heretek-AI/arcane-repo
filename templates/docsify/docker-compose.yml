version: '3.8'

services:
  docsify:
    image: ghcr.io/sujaykumarh/docsify:latest
    container_name: docsify
    hostname: docsify
    ports:
      - "${DOCSIFY_PORT:-8080}:8080"
    volumes:
      - docsify_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  docsify_data:
    name: docsify_data
