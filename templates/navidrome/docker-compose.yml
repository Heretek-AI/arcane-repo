version: '3.8'

services:
  navidrome:
    image: ghcr.io/navidrome/navidrome:latest
    container_name: navidrome
    hostname: navidrome
    ports:
      - "${NAVIDROME_PORT:-4533}:4533"
    volumes:
      - navidrome_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4533/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  navidrome_data:
    name: navidrome_data
