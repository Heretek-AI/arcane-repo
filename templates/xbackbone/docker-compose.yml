version: '3.8'

services:
  xbackbone:
    image: ghcr.io/linuxserver/xbackbone:latest
    container_name: xbackbone
    hostname: xbackbone
    ports:
      - "${XBACKBONE_PORT:-8080}:8080"
    volumes:
      - xbackbone_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  xbackbone_data:
    name: xbackbone_data
