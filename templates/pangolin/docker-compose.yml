version: '3.8'

services:
  pangolin:
    image: docker.io/staphb/pangolin:latest
    container_name: pangolin
    hostname: pangolin
    ports:
      - "${PANGOLIN_PORT:-8080}:8080"
    volumes:
      - pangolin_data:/data
    restart: unless-stopped

volumes:
  pangolin_data:
    name: pangolin_data
