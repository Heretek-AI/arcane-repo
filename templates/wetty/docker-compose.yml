version: '3.8'

services:
  wetty:
    image: ghcr.io/butlerx/wetty:latest
    container_name: wetty
    hostname: wetty
    ports:
      - "${WETTY_PORT:-8080}:8080"
    volumes:
      - wetty_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wetty_data:
    name: wetty_data
