version: '3.8'

services:
  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    container_name: watchtower
    hostname: watchtower
    ports:
      - "${WATCHTOWER_PORT:-8080}:8080"
    volumes:
      - watchtower_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  watchtower_data:
    name: watchtower_data
