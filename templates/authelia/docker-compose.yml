version: '3.8'

services:
  authelia:
    image: ghcr.io/authelia/authelia:latest
    container_name: authelia
    hostname: authelia
    ports:
      - "${AUTHELIA_PORT:-9091}:9091"
    volumes:
      - authelia_data:/data
    restart: unless-stopped

volumes:
  authelia_data:
    name: authelia_data
