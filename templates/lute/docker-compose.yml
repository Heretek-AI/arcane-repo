version: '3.8'

services:
  lute:
    image: docker.io/nachoalthabe/lute:latest
    container_name: lute
    hostname: lute
    ports:
      - "${LUTE_PORT:-8080}:8080"
    volumes:
      - lute_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lute_data:
    name: lute_data
