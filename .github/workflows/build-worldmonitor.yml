name: Build WorldMonitor

on:
  push:
    paths:
      - 'scripts/dockerfiles/worldmonitor/**'
      - 'templates/worldmonitor/**'
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: worldmonitor
    secrets: inherit
