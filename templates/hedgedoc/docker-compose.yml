version: '3.8'

services:
  hedgedoc:
    image: ghcr.io/linuxserver/hedgedoc:latest
    container_name: hedgedoc
    hostname: hedgedoc
    ports:
      - "${HEDGEDOC_PORT:-3000}:3000"
    volumes:
      - hedgedoc_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  hedgedoc_data:
    name: hedgedoc_data
