name: Build TrendRadar

on:
  push:
    paths:
      - 'scripts/dockerfiles/trendradar/**'
      - 'templates/trendradar/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: trendradar
    secrets: inherit
