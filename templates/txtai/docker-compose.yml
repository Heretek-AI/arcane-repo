version: "3.8"

services:
  txtai:
    image: python:3.12-slim
    container_name: txtai
    hostname: txtai
    ports:
      - "${TXTAI_PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      - TXTAI_PORT=${TXTAI_PORT:-8080}
    command: >
      sh -c "
      pip install --no-cache-dir -q txtai uvicorn &&
      python -m txtai.app --port ${TXTAI_PORT:-8080}
      "
