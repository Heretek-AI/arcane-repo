version: '3.8'

services:
  pingvin:
    image: docker.io/jasonyangee/pingvin:latest
    container_name: pingvin
    hostname: pingvin
    ports:
      - "${PINGVIN_PORT:-8080}:8080"
    volumes:
      - pingvin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pingvin_data:
    name: pingvin_data
