version: '3.8'

services:
  arcane:
    image: docker.io/arcanetracing/arcane:latest
    container_name: arcane
    hostname: arcane
    ports:
      - "${ARCANE_PORT:-8080}:8080"
    volumes:
      - arcane_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  arcane_data:
    name: arcane_data
