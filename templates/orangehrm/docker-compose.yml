version: '3.8'

services:
  orangehrm:
    image: docker.io/orangehrm/orangehrm:latest
    container_name: orangehrm
    hostname: orangehrm
    ports:
      - "${ORANGEHRM_PORT:-8080}:8080"
    volumes:
      - orangehrm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  orangehrm_data:
    name: orangehrm_data
