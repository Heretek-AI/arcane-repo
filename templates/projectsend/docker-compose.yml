version: '3.8'

services:
  projectsend:
    image: ghcr.io/linuxserver/projectsend:latest
    container_name: projectsend
    hostname: projectsend
    ports:
      - "${PROJECTSEND_PORT:-8080}:8080"
    volumes:
      - projectsend_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  projectsend_data:
    name: projectsend_data
