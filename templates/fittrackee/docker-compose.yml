version: '3.8'

services:
  fittrackee:
    image: docker.io/fittrackee/fittrackee:latest
    container_name: fittrackee
    hostname: fittrackee
    ports:
      - "${FITTRACKEE_PORT:-8080}:8080"
    volumes:
      - fittrackee_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fittrackee_data:
    name: fittrackee_data
