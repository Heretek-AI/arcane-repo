version: '3.8'

services:
  librephotos:
    image: docker.io/reallibrephotos/librephotos:latest
    container_name: librephotos
    hostname: librephotos
    ports:
      - "${LIBREPHOTOS_PORT:-8080}:8080"
    volumes:
      - librephotos_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  librephotos_data:
    name: librephotos_data
