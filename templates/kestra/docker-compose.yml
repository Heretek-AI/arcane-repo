version: '3.8'

services:
  kestra:
    image: docker.io/kestra/kestra:latest
    container_name: kestra
    hostname: kestra
    ports:
      - "${KESTRA_PORT:-8080}:8080"
    volumes:
      - kestra_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kestra_data:
    name: kestra_data
