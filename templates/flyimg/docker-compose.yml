version: '3.8'

services:
  flyimg:
    image: docker.io/flyimg/flyimg:latest
    container_name: flyimg
    hostname: flyimg
    ports:
      - "${FLYIMG_PORT:-8080}:8080"
    volumes:
      - flyimg_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  flyimg_data:
    name: flyimg_data
