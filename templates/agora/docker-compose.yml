version: '3.8'

services:
  agora:
    image: docker.io/broadinstitute/agora:latest
    container_name: agora
    hostname: agora
    ports:
      - "${AGORA_PORT:-8080}:8080"
    volumes:
      - agora_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  agora_data:
    name: agora_data
