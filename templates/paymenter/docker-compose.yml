version: '3.8'

services:
  paymenter:
    image: ghcr.io/paymenter/paymenter:latest
    container_name: paymenter
    hostname: paymenter
    ports:
      - "${PAYMENTER_PORT:-8080}:8080"
    volumes:
      - paymenter_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  paymenter_data:
    name: paymenter_data
