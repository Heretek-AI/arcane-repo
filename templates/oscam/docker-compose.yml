version: '3.8'

services:
  oscam:
    image: ghcr.io/linuxserver/oscam:latest
    container_name: oscam
    hostname: oscam
    ports:
      - "${OSCAM_PORT:-8080}:8080"
    volumes:
      - oscam_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  oscam_data:
    name: oscam_data
