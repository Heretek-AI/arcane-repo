version: '3.8'

services:
  pixel-server:
    image: docker.io/olegvorobyov90/pixel-server:latest
    container_name: pixel-server
    hostname: pixel-server
    ports:
      - "${PIXEL_SERVER_PORT:-8080}:8080"
    volumes:
      - pixel-server_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pixel-server_data:
    name: pixel-server_data
