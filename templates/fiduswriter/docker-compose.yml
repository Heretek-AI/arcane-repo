version: '3.8'

services:
  fiduswriter:
    image: docker.io/fiduswriter/fiduswriter:latest
    container_name: fiduswriter
    hostname: fiduswriter
    ports:
      - "${FIDUSWRITER_PORT:-8080}:8080"
    volumes:
      - fiduswriter_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fiduswriter_data:
    name: fiduswriter_data
