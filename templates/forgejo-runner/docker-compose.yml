version: '3.8'

services:
  forgejo-runner:
    image: docker.io/techvoyager/forgejo_runner:latest
    container_name: forgejo-runner
    hostname: forgejo-runner
    ports:
      - "${FORGEJO_RUNNER_PORT:-8080}:8080"
    volumes:
      - forgejo-runner_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  forgejo-runner_data:
    name: forgejo-runner_data
