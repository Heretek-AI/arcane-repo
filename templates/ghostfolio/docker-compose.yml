version: '3.8'

services:
  ghostfolio:
    image: docker.io/ghostfolio/ghostfolio:latest
    container_name: ghostfolio
    hostname: ghostfolio
    ports:
      - "${GHOSTFOLIO_PORT:-8080}:8080"
    volumes:
      - ghostfolio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ghostfolio_data:
    name: ghostfolio_data
