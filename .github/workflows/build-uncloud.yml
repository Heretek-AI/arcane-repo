name: Build Uncloud

on:
  push:
    paths:
      - 'scripts/dockerfiles/uncloud/**'
      - 'templates/uncloud/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: uncloud
    secrets: inherit
