version: '3.8'

services:
  argos:
    image: docker.io/soytul/argos:latest
    container_name: argos
    hostname: argos
    ports:
      - "${ARGOS_PORT:-8080}:8080"
    volumes:
      - argos_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  argos_data:
    name: argos_data
