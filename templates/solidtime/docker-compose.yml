version: '3.8'

services:
  solidtime:
    image: docker.io/solidtime/solidtime:latest
    container_name: solidtime
    hostname: solidtime
    ports:
      - "${SOLIDTIME_PORT:-8080}:8080"
    volumes:
      - solidtime_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  solidtime_data:
    name: solidtime_data
