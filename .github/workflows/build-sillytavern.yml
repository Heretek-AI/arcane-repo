name: Build SillyTavern

on:
  push:
    paths:
      - 'scripts/dockerfiles/sillytavern/**'
      - 'templates/sillytavern/**'
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: sillytavern
    secrets: inherit
