version: '3.8'

services:
  textarea:
    image: docker.io/dnlweijers/textarea:latest
    container_name: textarea
    hostname: textarea
    ports:
      - "${TEXTAREA_PORT:-8080}:8080"
    volumes:
      - textarea_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  textarea_data:
    name: textarea_data
