version: '3.8'

services:
  archisteamfarm:
    image: docker.io/justarchi/archisteamfarm:latest
    container_name: archisteamfarm
    hostname: archisteamfarm
    ports:
      - "${ARCHISTEAMFARM_PORT:-8080}:8080"
    volumes:
      - archisteamfarm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  archisteamfarm_data:
    name: archisteamfarm_data
