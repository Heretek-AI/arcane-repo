version: '3.8'

services:
  phpmyadmin:
    image: docker.io/library/phpmyadmin:latest
    container_name: phpmyadmin
    hostname: phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8080}:8080"
    volumes:
      - phpmyadmin_data:/data
    restart: unless-stopped

volumes:
  phpmyadmin_data:
    name: phpmyadmin_data
