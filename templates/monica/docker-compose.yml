version: '3.8'

services:
  monica:
    image: docker.io/library/monica:latest
    container_name: monica
    hostname: monica
    ports:
      - "${MONICA_PORT:-8080}:8080"
    volumes:
      - monica_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  monica_data:
    name: monica_data
