version: '3.8'

services:
  azuracast:
    image: ghcr.io/azuracast/azuracast:latest
    container_name: azuracast
    hostname: azuracast
    ports:
      - "${AZURACAST_PORT:-8080}:8080"
    volumes:
      - azuracast_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  azuracast_data:
    name: azuracast_data
