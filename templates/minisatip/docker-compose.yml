version: '3.8'

services:
  minisatip:
    image: ghcr.io/linuxserver/minisatip:latest
    container_name: minisatip
    hostname: minisatip
    ports:
      - "${MINISATIP_PORT:-8080}:8080"
    volumes:
      - minisatip_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  minisatip_data:
    name: minisatip_data
