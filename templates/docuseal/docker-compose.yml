version: '3.8'

services:
  docuseal:
    image: docker.io/docuseal/docuseal:latest
    container_name: docuseal
    hostname: docuseal
    ports:
      - "${DOCUSEAL_PORT:-8080}:8080"
    volumes:
      - docuseal_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  docuseal_data:
    name: docuseal_data
