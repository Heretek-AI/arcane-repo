version: '3.8'

services:
  eleventy:
    image: docker.io/femtopixel/eleventy:latest
    container_name: eleventy
    hostname: eleventy
    ports:
      - "${ELEVENTY_PORT:-8080}:8080"
    volumes:
      - eleventy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  eleventy_data:
    name: eleventy_data
