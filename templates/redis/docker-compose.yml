version: '3.8'

services:
  redis:
    image: docker.io/redislabs/redis:latest
    container_name: redis
    hostname: redis
    ports:
      - "${REDIS_PORT:-8080}:8080"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
    name: redis_data
