version: '3.8'

services:
  thelounge:
    image: ghcr.io/thelounge/thelounge:latest
    container_name: thelounge
    hostname: thelounge
    ports:
      - "${THELOUNGE_PORT:-8080}:8080"
    volumes:
      - thelounge_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  thelounge_data:
    name: thelounge_data
