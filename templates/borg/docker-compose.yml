version: '3.8'

services:
  borg:
    image: docker.io/pschiffe/borg:latest
    container_name: borg
    hostname: borg
    ports:
      - "${BORG_PORT:-8080}:8080"
    volumes:
      - borg_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  borg_data:
    name: borg_data
