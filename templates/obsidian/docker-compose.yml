version: '3.8'

services:
  obsidian:
    image: ghcr.io/linuxserver/obsidian:latest
    container_name: obsidian
    hostname: obsidian
    ports:
      - "${OBSIDIAN_PORT:-8080}:8080"
    volumes:
      - obsidian_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  obsidian_data:
    name: obsidian_data
