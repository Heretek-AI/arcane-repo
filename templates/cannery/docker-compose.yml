version: '3.8'

services:
  cannery:
    image: docker.io/shibaobun/cannery:latest
    container_name: cannery
    hostname: cannery
    ports:
      - "${CANNERY_PORT:-8080}:8080"
    volumes:
      - cannery_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cannery_data:
    name: cannery_data
