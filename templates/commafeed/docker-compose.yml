version: '3.8'

services:
  commafeed:
    image: ghcr.io/athou/commafeed:latest
    container_name: commafeed
    hostname: commafeed
    ports:
      - "${COMMAFEED_PORT:-8080}:8080"
    volumes:
      - commafeed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  commafeed_data:
    name: commafeed_data
