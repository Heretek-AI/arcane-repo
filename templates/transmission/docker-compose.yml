version: '3.8'

services:
  transmission:
    image: ghcr.io/linuxserver/transmission:latest
    container_name: transmission
    hostname: transmission
    ports:
      - "${TRANSMISSION_PORT:-9091}:9091"
    volumes:
      - transmission_data:/data
    restart: unless-stopped

volumes:
  transmission_data:
    name: transmission_data
