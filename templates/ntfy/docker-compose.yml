version: '3.8'

services:
  ntfy:
    image: docker.io/binwiederhier/ntfy:latest
    container_name: ntfy
    hostname: ntfy
    ports:
      - "${NTFY_PORT:-80}:80"
    volumes:
      - ntfy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ntfy_data:
    name: ntfy_data
