version: '3.8'

services:
  umap:
    image: docker.io/umap/umap:latest
    container_name: umap
    hostname: umap
    ports:
      - "${UMAP_PORT:-8080}:8080"
    volumes:
      - umap_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  umap_data:
    name: umap_data
