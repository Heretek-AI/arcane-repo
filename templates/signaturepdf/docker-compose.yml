version: '3.8'

services:
  signaturepdf:
    image: docker.io/xgaia/signaturepdf:latest
    container_name: signaturepdf
    hostname: signaturepdf
    ports:
      - "${SIGNATUREPDF_PORT:-8080}:8080"
    volumes:
      - signaturepdf_data:/data
    restart: unless-stopped

volumes:
  signaturepdf_data:
    name: signaturepdf_data
