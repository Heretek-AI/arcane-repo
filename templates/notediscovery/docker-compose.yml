version: '3.8'

services:
  notediscovery:
    image: python:3.12-slim
    container_name: notediscovery
    hostname: notediscovery
    ports:
      - "${NOTEDISCOVERY_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    command: |
      sh -c "
      pip install --no-cache-dir -q fastapi uvicorn &&
      cat > /app/server.py << 'PYEOF'
from fastapi import FastAPI

app = FastAPI(
    title='Notediscovery',
    version='1.0.0',
    description='Placeholder — upstream project is no longer available'
)

@app.get('/health')
async def health():
    return {'status': 'ok', 'note': 'placeholder — upstream repository removed'}

@app.get('/')
async def root():
    return {
        'service': 'notediscovery',
        'status': 'unavailable',
        'reason': 'The notediscovery upstream repository (noteed/notediscovery) has been removed from GitHub. This project is no longer maintained or accessible.',
        'suggestion': 'Consider alternative note-taking discovery tools or self-hosted bookmark managers.'
    }

@app.get('/guide')
async def guide():
    return {
        'what_was_notediscovery': 'Notediscovery was a tool for discovering and organizing notes and bookmarks.',
        'current_status': 'The upstream project has been removed. No replacement or fork has been identified.',
        'alternatives': [
            'Linkwarden — self-hosted collaborative bookmark manager',
            'Hoarder — self-hosted bookmark-everything app with AI tagging',
            'Shiori — simple self-hosted bookmarks manager',
            'Linkding — self-hosted bookmark manager with archive support'
        ]
    }

if __name__ == '__main__':
    import uvicorn
    uvicorn.run(app, host='0.0.0.0', port=8000)
PYEOF
      uvicorn server:app --host 0.0.0.0 --port 8000
      "
