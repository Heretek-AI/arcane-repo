version: '3.8'

services:
  loomio:
    image: docker.io/loomio/loomio:latest
    container_name: loomio
    hostname: loomio
    ports:
      - "${LOOMIO_PORT:-8080}:8080"
    volumes:
      - loomio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  loomio_data:
    name: loomio_data
