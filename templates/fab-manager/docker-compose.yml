version: '3.8'

services:
  fab-manager:
    image: docker.io/sleede/fab-manager:latest
    container_name: fab-manager
    hostname: fab-manager
    ports:
      - "${FAB_MANAGER_PORT:-8080}:8080"
    volumes:
      - fab-manager_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fab-manager_data:
    name: fab-manager_data
