version: '3.8'

services:
  paaster:
    image: docker.io/wardpearce/paaster:latest
    container_name: paaster
    hostname: paaster
    ports:
      - "${PAASTER_PORT:-8080}:8080"
    volumes:
      - paaster_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  paaster_data:
    name: paaster_data
