version: '3.8'

services:
  hubleys:
    image: ghcr.io/knrdl/hubleys-dashboard:latest
    container_name: hubleys
    hostname: hubleys
    ports:
      - "${HUBLEYS_PORT:-8080}:8080"
    volumes:
      - hubleys_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  hubleys_data:
    name: hubleys_data
