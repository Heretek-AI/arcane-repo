version: '3.8'

services:
  copyparty:
    image: docker.io/icewhaletech/copyparty:latest
    container_name: copyparty
    hostname: copyparty
    ports:
      - "${COPYPARTY_PORT:-8080}:8080"
    volumes:
      - copyparty_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  copyparty_data:
    name: copyparty_data
