version: '3.8'

services:
  rutorrent:
    image: ghcr.io/linuxserver/rutorrent:latest
    container_name: rutorrent
    hostname: rutorrent
    ports:
      - "${RUTORRENT_PORT:-8080}:8080"
    volumes:
      - rutorrent_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rutorrent_data:
    name: rutorrent_data
