version: '3.8'

services:
  icecast2:
    image: ghcr.io/pltnk/icecast2:latest
    container_name: icecast2
    hostname: icecast2
    ports:
      - "${ICECAST2_PORT:-8080}:8080"
    volumes:
      - icecast2_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  icecast2_data:
    name: icecast2_data
