version: '3.8'

services:
  tuwunel:
    image: docker.io/jevolk/tuwunel:latest
    container_name: tuwunel
    hostname: tuwunel
    ports:
      - "${TUWUNEL_PORT:-8080}:8080"
    volumes:
      - tuwunel_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tuwunel_data:
    name: tuwunel_data
