version: '3.8'

services:
  matterbridge:
    image: ghcr.io/42wim/matterbridge:latest
    container_name: matterbridge
    hostname: matterbridge
    ports:
      - "${MATTERBRIDGE_PORT:-8080}:8080"
    volumes:
      - matterbridge_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  matterbridge_data:
    name: matterbridge_data
