version: '3.8'

services:
  invoiceshelf:
    image: docker.io/invoiceshelf/invoiceshelf:latest
    container_name: invoiceshelf
    hostname: invoiceshelf
    ports:
      - "${INVOICESHELF_PORT:-8080}:8080"
    volumes:
      - invoiceshelf_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  invoiceshelf_data:
    name: invoiceshelf_data
