version: '3.8'

services:
  mediawiki:
    image: docker.io/library/mediawiki:latest
    container_name: mediawiki
    hostname: mediawiki
    ports:
      - "${MEDIAWIKI_PORT:-80}:80"
    volumes:
      - mediawiki_data:/data
    restart: unless-stopped

volumes:
  mediawiki_data:
    name: mediawiki_data
