version: '3.8'

services:
  limesurvey:
    image: docker.io/acspri/limesurvey:latest
    container_name: limesurvey
    hostname: limesurvey
    ports:
      - "${LIMESURVEY_PORT:-8080}:8080"
    volumes:
      - limesurvey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  limesurvey_data:
    name: limesurvey_data
