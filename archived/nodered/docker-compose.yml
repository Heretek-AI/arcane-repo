version: '3.8'

services:
  nodered:
    image: docker.io/marcelocorreia/nodered:latest
    container_name: nodered
    hostname: nodered
    ports:
      - "${NODERED_PORT:-1880}:1880"
    volumes:
      - nodered_data:/data
    restart: unless-stopped

volumes:
  nodered_data:
    name: nodered_data
