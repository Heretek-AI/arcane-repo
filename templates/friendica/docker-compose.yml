version: '3.8'

services:
  friendica:
    image: docker.io/library/friendica:latest
    container_name: friendica
    hostname: friendica
    ports:
      - "${FRIENDICA_PORT:-8080}:8080"
    volumes:
      - friendica_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  friendica_data:
    name: friendica_data
