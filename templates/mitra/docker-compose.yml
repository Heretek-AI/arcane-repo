version: '3.8'

services:
  mitra:
    image: docker.io/bleakfuture0/mitra:latest
    container_name: mitra
    hostname: mitra
    ports:
      - "${MITRA_PORT:-8080}:8080"
    volumes:
      - mitra_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mitra_data:
    name: mitra_data
