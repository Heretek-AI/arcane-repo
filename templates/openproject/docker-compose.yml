version: '3.8'

services:
  openproject:
    image: docker.io/openproject/openproject:latest
    container_name: openproject
    hostname: openproject
    ports:
      - "${OPENPROJECT_PORT:-8080}:8080"
    volumes:
      - openproject_data:/data
    restart: unless-stopped

volumes:
  openproject_data:
    name: openproject_data
