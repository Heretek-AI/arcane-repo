# ── Default Logstash Pipeline ──────────────────────────────────────
# This pipeline receives Beats input (Filebeat, Metricbeat, etc.) on port 5044,
# performs basic processing, and indexes into Elasticsearch.
#
# Customize this file for your log processing needs:
# - Add grok patterns for structured log parsing
# - Add geoip for IP geolocation enrichment
# - Add mutate filters for field manipulation
# - Add output plugins for archiving or alerting

input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  # ── Basic Processing ──────────────────────────────────────────
  # Remove Logstash internal fields from the final document
  mutate {
    remove_field => ["@version"]
  }

  # Add a processing timestamp separate from @timestamp
  ruby {
    code => "
      event.set('[@metadata][received_at]', event.get('@timestamp').to_s)
    "
  }

  # ── Custom Filters ──────────────────────────────────────────
  # Uncomment and adjust these blocks for your log formats:

  # Parse Nginx access logs:
  # grok {
  #   match => { "message" => "%{COMBINEDAPACHELOG}" }
  # }

  # Parse JSON-formatted application logs:
  # if [message] =~ /^\{.*\}$/ {
  #   json {
  #     source => "message"
  #     target => "parsed"
  #   }
  # }

  # Enrich IP addresses with geolocation data:
  # geoip {
  #   source => "client_ip"
  # }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "logs-%{+YYYY.MM.dd}"
    # Enable for better performance on high-volume pipelines:
    # manage_template => false
    # document_type => "_doc"
  }

  # Optional: write to stdout for debugging pipeline issues
  # stdout {
  #   codec => rubydebug
  # }
}
