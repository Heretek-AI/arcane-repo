version: '3.8'

services:
  shaarli:
    image: ghcr.io/shaarli/shaarli:latest
    container_name: shaarli
    hostname: shaarli
    ports:
      - "${SHAARLI_PORT:-8080}:8080"
    volumes:
      - shaarli_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shaarli_data:
    name: shaarli_data
