version: "3.8"

services:
  matrix-conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: matrix-conduit
    hostname: matrix-conduit
    ports:
      - "${MATRIX_PORT:-8448}:6167"
    restart: unless-stopped
    environment:
      - CONDUIT_SERVER_NAME=${MATRIX_SERVER_NAME:-localhost}
      - CONDUIT_DATABASE_PATH=/var/lib/conduit
      - CONDUIT_PORT=6167
      - CONDUIT_ALLOW_REGISTRATION=${MATRIX_ALLOW_REGISTRATION:-true}
      - CONDUIT_ALLOW_FEDERATION=${MATRIX_ALLOW_FEDERATION:-true}
      - CONDUIT_MAX_REQUEST_SIZE=20000000
    volumes:
      - matrix_data:/var/lib/conduit
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6167/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  matrix_data:
    driver: local
