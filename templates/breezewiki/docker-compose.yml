version: '3.8'

services:
  breezewiki:
    image: ghcr.io/fariszr/breezewiki:latest
    container_name: breezewiki
    hostname: breezewiki
    ports:
      - "${BREEZEWIKI_PORT:-80}:80"
    volumes:
      - breezewiki_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  breezewiki_data:
    name: breezewiki_data
