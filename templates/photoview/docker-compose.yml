version: '3.8'

services:
  photoview:
    image: docker.io/photoview/photoview:latest
    container_name: photoview
    hostname: photoview
    ports:
      - "${PHOTOVIEW_PORT:-8080}:8080"
    volumes:
      - photoview_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  photoview_data:
    name: photoview_data
