version: '3.8'

services:
  passed:
    image: docker.io/shokohsc/passed:latest
    container_name: passed
    hostname: passed
    ports:
      - "${PASSED_PORT:-8080}:8080"
    volumes:
      - passed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  passed_data:
    name: passed_data
