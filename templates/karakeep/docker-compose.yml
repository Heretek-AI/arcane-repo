version: '3.8'

services:
  karakeep:
    image: docker.io/cyangze/karakeep:latest
    container_name: karakeep
    hostname: karakeep
    ports:
      - "${KARAKEEP_PORT:-8080}:8080"
    volumes:
      - karakeep_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  karakeep_data:
    name: karakeep_data
