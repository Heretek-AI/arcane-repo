version: '3.8'

services:
  ryot:
    image: ghcr.io/ignisda/ryot:latest
    container_name: ryot
    hostname: ryot
    ports:
      - "${RYOT_PORT:-8080}:8080"
    volumes:
      - ryot_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ryot_data:
    name: ryot_data
