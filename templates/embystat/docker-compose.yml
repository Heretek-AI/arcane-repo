version: '3.8'

services:
  embystat:
    image: ghcr.io/linuxserver/embystat:latest
    container_name: embystat
    hostname: embystat
    ports:
      - "${EMBYSTAT_PORT:-8096}:8096"
    volumes:
      - embystat_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8096/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  embystat_data:
    name: embystat_data
