version: '3.8'

services:
  watcharr:
    image: ghcr.io/sbondco/watcharr:latest
    container_name: watcharr
    hostname: watcharr
    ports:
      - "${WATCHARR_PORT:-8080}:8080"
    volumes:
      - watcharr_data:/data
    restart: unless-stopped

volumes:
  watcharr_data:
    name: watcharr_data
