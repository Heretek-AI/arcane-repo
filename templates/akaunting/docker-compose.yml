version: '3.8'

services:
  akaunting:
    image: docker.io/akaunting/akaunting:latest
    container_name: akaunting
    hostname: akaunting
    ports:
      - "${AKAUNTING_PORT:-8080}:8080"
    volumes:
      - akaunting_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  akaunting_data:
    name: akaunting_data
