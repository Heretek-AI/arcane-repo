version: '3.8'

services:
  toshi-moto:
    image: docker.io/toshimoto821/toshi-moto:latest
    container_name: toshi-moto
    hostname: toshi-moto
    ports:
      - "${TOSHI_MOTO_PORT:-8080}:8080"
    volumes:
      - toshi-moto_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  toshi-moto_data:
    name: toshi-moto_data
