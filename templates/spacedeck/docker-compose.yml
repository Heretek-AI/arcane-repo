version: '3.8'

services:
  spacedeck:
    image: docker.io/gigaspaces/spacedeck:latest
    container_name: spacedeck
    hostname: spacedeck
    ports:
      - "${SPACEDECK_PORT:-8080}:8080"
    volumes:
      - spacedeck_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  spacedeck_data:
    name: spacedeck_data
