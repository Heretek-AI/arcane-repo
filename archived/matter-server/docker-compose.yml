version: '3.8'

services:
  matter-server:
    image: docker.io/planbnet/matter-server:latest
    container_name: matter-server
    hostname: matter-server
    ports:
      - "${MATTER_SERVER_PORT:-8080}:8080"
    volumes:
      - matter-server_data:/data
    restart: unless-stopped

volumes:
  matter-server_data:
    name: matter-server_data
