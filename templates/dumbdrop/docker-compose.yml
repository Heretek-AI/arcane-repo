version: '3.8'

services:
  dumbdrop:
    image: docker.io/dumbwareio/dumbdrop:latest
    container_name: dumbdrop
    hostname: dumbdrop
    ports:
      - "${DUMBDROP_PORT:-8080}:8080"
    volumes:
      - dumbdrop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dumbdrop_data:
    name: dumbdrop_data
