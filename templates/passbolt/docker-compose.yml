version: '3.8'

services:
  passbolt:
    image: docker.io/passbolt/passbolt:latest
    container_name: passbolt
    hostname: passbolt
    ports:
      - "${PASSBOLT_PORT:-8080}:8080"
    volumes:
      - passbolt_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  passbolt_data:
    name: passbolt_data
