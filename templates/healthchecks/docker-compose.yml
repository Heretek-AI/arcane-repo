version: '3.8'

services:
  healthchecks:
    image: docker.io/healthchecks/healthchecks:latest
    container_name: healthchecks
    hostname: healthchecks
    ports:
      - "${HEALTHCHECKS_PORT:-8080}:8080"
    volumes:
      - healthchecks_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  healthchecks_data:
    name: healthchecks_data
