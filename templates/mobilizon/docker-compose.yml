version: '3.8'

services:
  mobilizon:
    image: docker.io/mobilizon/mobilizon:latest
    container_name: mobilizon
    hostname: mobilizon
    ports:
      - "${MOBILIZON_PORT:-8080}:8080"
    volumes:
      - mobilizon_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mobilizon_data:
    name: mobilizon_data
