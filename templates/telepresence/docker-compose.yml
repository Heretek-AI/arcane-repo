version: '3.8'

services:
  telepresence:
    image: ghcr.io/telepresenceio/telepresence:latest
    container_name: telepresence
    hostname: telepresence
    ports:
      - "${TELEPRESENCE_PORT:-8080}:8080"
    volumes:
      - telepresence_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  telepresence_data:
    name: telepresence_data
