version: '3.8'

services:
  yacht:
    image: ghcr.io/selfhostedpro/yacht:latest
    container_name: yacht
    hostname: yacht
    ports:
      - "${YACHT_PORT:-8080}:8080"
    volumes:
      - yacht_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yacht_data:
    name: yacht_data
