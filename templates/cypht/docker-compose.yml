version: '3.8'

services:
  cypht:
    image: docker.io/cypht/cypht:latest
    container_name: cypht
    hostname: cypht
    ports:
      - "${CYPHT_PORT:-8080}:8080"
    volumes:
      - cypht_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cypht_data:
    name: cypht_data
