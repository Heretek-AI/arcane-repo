version: '3.8'

services:
  chibisafe:
    image: ghcr.io/chibisafe/chibisafe:latest
    container_name: chibisafe
    hostname: chibisafe
    ports:
      - "${CHIBISAFE_PORT:-8080}:8080"
    volumes:
      - chibisafe_data:/data
    restart: unless-stopped

volumes:
  chibisafe_data:
    name: chibisafe_data
