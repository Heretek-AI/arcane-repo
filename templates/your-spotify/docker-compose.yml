version: '3.8'

services:
  your-spotify:
    image: ghcr.io/linuxserver/your_spotify:latest
    container_name: your-spotify
    hostname: your-spotify
    ports:
      - "${YOUR_SPOTIFY_PORT:-8080}:8080"
    volumes:
      - your-spotify_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  your-spotify_data:
    name: your-spotify_data
