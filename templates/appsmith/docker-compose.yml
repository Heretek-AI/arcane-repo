version: '3.8'

services:
  appsmith:
    image: docker.io/bitnamicharts/appsmith:latest
    container_name: appsmith
    hostname: appsmith
    ports:
      - "${APPSMITH_PORT:-80}:80"
    volumes:
      - appsmith_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  appsmith_data:
    name: appsmith_data
