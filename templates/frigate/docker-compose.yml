version: '3.8'

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:latest
    container_name: frigate
    hostname: frigate
    ports:
      - "${FRIGATE_PORT:-8080}:8080"
    volumes:
      - frigate_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  frigate_data:
    name: frigate_data
