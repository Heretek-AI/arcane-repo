version: '3.8'

services:
  duplicacy:
    image: ghcr.io/azinchen/duplicacy:latest
    container_name: duplicacy
    hostname: duplicacy
    ports:
      - "${DUPLICACY_PORT:-8080}:8080"
    volumes:
      - duplicacy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  duplicacy_data:
    name: duplicacy_data
