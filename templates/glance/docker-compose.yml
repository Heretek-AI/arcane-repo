version: '3.8'

services:
  glance:
    image: docker.io/glanceapp/glance:latest
    container_name: glance
    hostname: glance
    ports:
      - "${GLANCE_PORT:-8080}:8080"
    volumes:
      - glance_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  glance_data:
    name: glance_data
