version: '3.8'

services:
  chatbot-ui:
    image: ghcr.io/nmfretz/chatbot-ui:latest
    container_name: chatbot-ui
    hostname: chatbot-ui
    ports:
      - "${CHATBOT_UI_PORT:-3000}:3000"
    volumes:
      - chatbot-ui_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chatbot-ui_data:
    name: chatbot-ui_data
