version: '3.8'

services:
  syncserver-rs:
    image: docker.io/kannasama/syncserver-rs:latest
    container_name: syncserver-rs
    hostname: syncserver-rs
    ports:
      - "${SYNCSERVER_RS_PORT:-8080}:8080"
    volumes:
      - syncserver-rs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  syncserver-rs_data:
    name: syncserver-rs_data
