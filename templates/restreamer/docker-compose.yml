version: '3.8'

services:
  restreamer:
    image: docker.io/datarhei/restreamer:latest
    container_name: restreamer
    hostname: restreamer
    ports:
      - "${RESTREAMER_PORT:-8080}:8080"
    volumes:
      - restreamer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  restreamer_data:
    name: restreamer_data
