version: '3.8'

services:
  chiyogami:
    image: ghcr.io/rhee876527/chiyogami:latest
    container_name: chiyogami
    hostname: chiyogami
    ports:
      - "${CHIYOGAMI_PORT:-8080}:8080"
    volumes:
      - chiyogami_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chiyogami_data:
    name: chiyogami_data
