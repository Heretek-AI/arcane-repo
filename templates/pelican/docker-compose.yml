version: '3.8'

services:
  pelican:
    image: docker.io/orthanc2/pelican:latest
    container_name: pelican
    hostname: pelican
    ports:
      - "${PELICAN_PORT:-8080}:8080"
    volumes:
      - pelican_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pelican_data:
    name: pelican_data
