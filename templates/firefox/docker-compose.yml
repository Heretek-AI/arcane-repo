version: '3.8'

services:
  firefox:
    image: ghcr.io/jlesage/firefox:latest
    container_name: firefox
    hostname: firefox
    ports:
      - "${FIREFOX_PORT:-8080}:8080"
    volumes:
      - firefox_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  firefox_data:
    name: firefox_data
