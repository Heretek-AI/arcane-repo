version: '3.8'

services:
  deluge:
    image: ghcr.io/linuxserver/deluge:latest
    container_name: deluge
    hostname: deluge
    ports:
      - "${DELUGE_PORT:-8112}:8112"
    volumes:
      - deluge_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8112/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  deluge_data:
    name: deluge_data
