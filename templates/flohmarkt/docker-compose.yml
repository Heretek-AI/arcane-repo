version: '3.8'

services:
  flohmarkt:
    image: docker.io/yonggan/flohmarkt:latest
    container_name: flohmarkt
    hostname: flohmarkt
    ports:
      - "${FLOHMARKT_PORT:-8080}:8080"
    volumes:
      - flohmarkt_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  flohmarkt_data:
    name: flohmarkt_data
