version: '3.8'

services:
  tinymediamanager:
    image: docker.io/tinymediamanager/tinymediamanager:latest
    container_name: tinymediamanager
    hostname: tinymediamanager
    ports:
      - "${TINYMEDIAMANAGER_PORT:-8080}:8080"
    volumes:
      - tinymediamanager_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tinymediamanager_data:
    name: tinymediamanager_data
