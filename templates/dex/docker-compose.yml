version: '3.8'

services:
  dex:
    image: ghcr.io/dexidp/dex:latest
    container_name: dex
    hostname: dex
    ports:
      - "${DEX_PORT:-8080}:8080"
    volumes:
      - dex_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dex_data:
    name: dex_data
