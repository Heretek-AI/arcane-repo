version: '3.8'

services:
  nodejs:
    image: docker.io/paketobuildpacks/nodejs:latest
    container_name: nodejs
    hostname: nodejs
    ports:
      - "${NODEJS_PORT:-8080}:8080"
    volumes:
      - nodejs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nodejs_data:
    name: nodejs_data
