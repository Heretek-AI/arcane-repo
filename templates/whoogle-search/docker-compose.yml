version: '3.8'

services:
  whoogle-search:
    image: ghcr.io/benbusby/whoogle-search:latest
    container_name: whoogle-search
    hostname: whoogle-search
    ports:
      - "${WHOOGLE_SEARCH_PORT:-8080}:8080"
    volumes:
      - whoogle-search_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  whoogle-search_data:
    name: whoogle-search_data
