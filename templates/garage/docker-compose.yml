version: '3.8'

services:
  garage:
    image: docker.io/dxflrs/garage:latest
    container_name: garage
    hostname: garage
    ports:
      - "${GARAGE_PORT:-8080}:8080"
    volumes:
      - garage_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  garage_data:
    name: garage_data
