version: '3.8'

services:
  lunalytics:
    image: docker.io/ksjaay/lunalytics:latest
    container_name: lunalytics
    hostname: lunalytics
    ports:
      - "${LUNALYTICS_PORT:-8080}:8080"
    volumes:
      - lunalytics_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lunalytics_data:
    name: lunalytics_data
