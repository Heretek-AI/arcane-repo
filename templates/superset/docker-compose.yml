version: '3.8'

services:
  superset:
    image: docker.io/apache/superset:latest
    container_name: superset
    hostname: superset
    ports:
      - "${SUPERSET_PORT:-8080}:8080"
    volumes:
      - superset_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  superset_data:
    name: superset_data
