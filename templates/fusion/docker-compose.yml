version: '3.8'

services:
  fusion:
    image: docker.io/builderio/fusion:latest
    container_name: fusion
    hostname: fusion
    ports:
      - "${FUSION_PORT:-8080}:8080"
    volumes:
      - fusion_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fusion_data:
    name: fusion_data
