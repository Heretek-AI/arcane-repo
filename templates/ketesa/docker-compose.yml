version: '3.8'

services:
  ketesa:
    image: ghcr.io/etkecc/ketesa:latest
    container_name: ketesa
    hostname: ketesa
    ports:
      - "${KETESA_PORT:-8080}:8080"
    volumes:
      - ketesa_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ketesa_data:
    name: ketesa_data
