version: '3.8'

services:
  remmina:
    image: docker.io/kasmweb/remmina:latest
    container_name: remmina
    hostname: remmina
    ports:
      - "${REMMINA_PORT:-8080}:8080"
    volumes:
      - remmina_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  remmina_data:
    name: remmina_data
