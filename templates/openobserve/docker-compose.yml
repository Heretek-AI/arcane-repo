version: '3.8'

services:
  openobserve:
    image: docker.io/openobserve/openobserve:latest
    container_name: openobserve
    hostname: openobserve
    ports:
      - "${OPENOBSERVE_PORT:-8080}:8080"
    volumes:
      - openobserve_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openobserve_data:
    name: openobserve_data
