version: '3.8'

services:
  webtop:
    image: ghcr.io/linuxserver/webtop:latest
    container_name: webtop
    hostname: webtop
    ports:
      - "${WEBTOP_PORT:-8080}:8080"
    volumes:
      - webtop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  webtop_data:
    name: webtop_data
