version: '3.8'

services:
  bewcloud:
    image: ghcr.io/bewcloud/bewcloud:latest
    container_name: bewcloud
    hostname: bewcloud
    ports:
      - "${BEWCLOUD_PORT:-8080}:8080"
    volumes:
      - bewcloud_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bewcloud_data:
    name: bewcloud_data
