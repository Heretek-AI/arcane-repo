version: '3.8'

services:
  synapse:
    image: docker.io/matrixdotorg/synapse:latest
    container_name: synapse
    hostname: synapse
    ports:
      - "${SYNAPSE_PORT:-8008}:8008"
    volumes:
      - synapse_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8008/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  synapse_data:
    name: synapse_data
