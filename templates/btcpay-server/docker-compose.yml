version: '3.8'

services:
  btcpay-server:
    image: docker.io/gkrizek/btcpay-server:latest
    container_name: btcpay-server
    hostname: btcpay-server
    ports:
      - "${BTCPAY_SERVER_PORT:-8080}:8080"
    volumes:
      - btcpay-server_data:/data
    restart: unless-stopped

volumes:
  btcpay-server_data:
    name: btcpay-server_data
