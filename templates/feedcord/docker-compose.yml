version: '3.8'

services:
  feedcord:
    image: docker.io/qolors/feedcord:latest
    container_name: feedcord
    hostname: feedcord
    ports:
      - "${FEEDCORD_PORT:-8080}:8080"
    volumes:
      - feedcord_data:/data
    restart: unless-stopped

volumes:
  feedcord_data:
    name: feedcord_data
