version: '3.8'

services:
  flood:
    image: ghcr.io/jesec/flood:latest
    container_name: flood
    hostname: flood
    ports:
      - "${FLOOD_PORT:-8080}:8080"
    volumes:
      - flood_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  flood_data:
    name: flood_data
