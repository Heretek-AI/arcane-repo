version: '3.8'

services:
  syncthing:
    image: ghcr.io/syncthing/syncthing:latest
    container_name: syncthing
    hostname: syncthing
    ports:
      - "${SYNCTHING_PORT:-8080}:8080"
    volumes:
      - syncthing_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  syncthing_data:
    name: syncthing_data
