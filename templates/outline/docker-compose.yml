version: '3.8'

services:
  outline:
    image: docker.io/outlinewiki/outline:latest
    container_name: outline
    hostname: outline
    ports:
      - "${OUTLINE_PORT:-3000}:3000"
    volumes:
      - outline_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  outline_data:
    name: outline_data
