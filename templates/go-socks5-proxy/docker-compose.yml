version: '3.8'

services:
  go-socks5-proxy:
    image: docker.io/serjs/go-socks5-proxy:latest
    container_name: go-socks5-proxy
    hostname: go-socks5-proxy
    ports:
      - "${GO_SOCKS5_PROXY_PORT:-8080}:8080"
    volumes:
      - go-socks5-proxy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  go-socks5-proxy_data:
    name: go-socks5-proxy_data
