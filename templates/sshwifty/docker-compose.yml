version: '3.8'

services:
  sshwifty:
    image: docker.io/niruix/sshwifty:latest
    container_name: sshwifty
    hostname: sshwifty
    ports:
      - "${SSHWIFTY_PORT:-8080}:8080"
    volumes:
      - sshwifty_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sshwifty_data:
    name: sshwifty_data
