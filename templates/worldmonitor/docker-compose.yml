version: "3.8"

services:
  worldmonitor:
    image: ghcr.io/arcane-repo/worldmonitor:latest
    container_name: worldmonitor
    hostname: worldmonitor
    ports:
      - "${WORLDMONITOR_PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      - WORLDMONITOR_PORT=${WORLDMONITOR_PORT:-8080}

