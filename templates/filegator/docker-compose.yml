version: '3.8'

services:
  filegator:
    image: docker.io/filegator/filegator:latest
    container_name: filegator
    hostname: filegator
    ports:
      - "${FILEGATOR_PORT:-8080}:8080"
    volumes:
      - filegator_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  filegator_data:
    name: filegator_data
