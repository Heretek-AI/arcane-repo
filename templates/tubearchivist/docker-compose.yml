version: '3.8'

services:
  tubearchivist:
    image: docker.io/bbilly1/tubearchivist:latest
    container_name: tubearchivist
    hostname: tubearchivist
    ports:
      - "${TUBEARCHIVIST_PORT:-8080}:8080"
    volumes:
      - tubearchivist_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tubearchivist_data:
    name: tubearchivist_data
