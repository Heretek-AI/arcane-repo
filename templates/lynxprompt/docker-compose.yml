version: '3.8'

services:
  lynxprompt:
    image: docker.io/drumsergio/lynxprompt:latest
    container_name: lynxprompt
    hostname: lynxprompt
    ports:
      - "${LYNXPROMPT_PORT:-8080}:8080"
    volumes:
      - lynxprompt_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lynxprompt_data:
    name: lynxprompt_data
