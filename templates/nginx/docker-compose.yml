version: '3.8'

services:
  nginx:
    image: docker.io/library/nginx:latest
    container_name: nginx
    hostname: nginx
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - nginx_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nginx_data:
    name: nginx_data
