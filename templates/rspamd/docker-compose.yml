version: '3.8'

services:
  rspamd:
    image: docker.io/rspamd/rspamd:latest
    container_name: rspamd
    hostname: rspamd
    ports:
      - "${RSPAMD_PORT:-8080}:8080"
    volumes:
      - rspamd_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rspamd_data:
    name: rspamd_data
