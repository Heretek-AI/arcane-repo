version: '3.8'

services:
  immich:
    image: docker.io/leesonaa/immich:latest
    container_name: immich
    hostname: immich
    ports:
      - "${IMMICH_PORT:-8080}:8080"
    volumes:
      - immich_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  immich_data:
    name: immich_data
