version: '3.8'

services:
  openemr:
    image: docker.io/openemr/openemr:latest
    container_name: openemr
    hostname: openemr
    ports:
      - "${OPENEMR_PORT:-8080}:8080"
    volumes:
      - openemr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openemr_data:
    name: openemr_data
