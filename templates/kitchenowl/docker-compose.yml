version: '3.8'

services:
  kitchenowl:
    image: docker.io/tombursch/kitchenowl:latest
    container_name: kitchenowl
    hostname: kitchenowl
    ports:
      - "${KITCHENOWL_PORT:-8080}:8080"
    volumes:
      - kitchenowl_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kitchenowl_data:
    name: kitchenowl_data
