version: '3.8'

services:
  gull:
    image: ghcr.io/aeolyus/gull:latest
    container_name: gull
    hostname: gull
    ports:
      - "${GULL_PORT:-8080}:8080"
    volumes:
      - gull_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gull_data:
    name: gull_data
