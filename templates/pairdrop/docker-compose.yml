version: '3.8'

services:
  pairdrop:
    image: ghcr.io/linuxserver/pairdrop:latest
    container_name: pairdrop
    hostname: pairdrop
    ports:
      - "${PAIRDROP_PORT:-8080}:8080"
    volumes:
      - pairdrop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pairdrop_data:
    name: pairdrop_data
