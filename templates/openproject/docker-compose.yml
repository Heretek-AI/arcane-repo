version: '3.8'

services:
  openproject:
    image: docker.io/openproject/openproject:latest
    container_name: openproject
    hostname: openproject
    ports:
      - "${OPENPROJECT_PORT:-8080}:8080"
    volumes:
      - openproject_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openproject_data:
    name: openproject_data
