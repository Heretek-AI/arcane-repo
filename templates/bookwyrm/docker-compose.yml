version: '3.8'

services:
  bookwyrm:
    image: ghcr.io/contrun/bookwyrm:latest
    container_name: bookwyrm
    hostname: bookwyrm
    ports:
      - "${BOOKWYRM_PORT:-8080}:8080"
    volumes:
      - bookwyrm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bookwyrm_data:
    name: bookwyrm_data
