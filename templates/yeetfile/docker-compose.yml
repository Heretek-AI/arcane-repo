version: '3.8'

services:
  yeetfile:
    image: ghcr.io/benbusby/yeetfile:latest
    container_name: yeetfile
    hostname: yeetfile
    ports:
      - "${YEETFILE_PORT:-8080}:8080"
    volumes:
      - yeetfile_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yeetfile_data:
    name: yeetfile_data
