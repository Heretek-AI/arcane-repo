version: '3.8'

services:
  timeoff:
    image: docker.io/jimkaneshotscopecom/timeoff:latest
    container_name: timeoff
    hostname: timeoff
    ports:
      - "${TIMEOFF_PORT:-8080}:8080"
    volumes:
      - timeoff_data:/data
    restart: unless-stopped

volumes:
  timeoff_data:
    name: timeoff_data
