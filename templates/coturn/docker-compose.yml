version: '3.8'

services:
  coturn:
    image: ghcr.io/coturn/coturn:latest
    container_name: coturn
    hostname: coturn
    ports:
      - "${COTURN_PORT:-8080}:8080"
    volumes:
      - coturn_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  coturn_data:
    name: coturn_data
