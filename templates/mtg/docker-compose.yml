version: '3.8'

services:
  mtg:
    image: docker.io/nineseconds/mtg:latest
    container_name: mtg
    hostname: mtg
    ports:
      - "${MTG_PORT:-8080}:8080"
    volumes:
      - mtg_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mtg_data:
    name: mtg_data
