version: '3.8'

services:
  gancio:
    image: docker.io/cisti/gancio:latest
    container_name: gancio
    hostname: gancio
    ports:
      - "${GANCIO_PORT:-8080}:8080"
    volumes:
      - gancio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gancio_data:
    name: gancio_data
