version: '3.8'

services:
  rclone:
    image: ghcr.io/rclone/rclone:latest
    container_name: rclone
    hostname: rclone
    ports:
      - "${RCLONE_PORT:-8080}:8080"
    volumes:
      - rclone_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rclone_data:
    name: rclone_data
