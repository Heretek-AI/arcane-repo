version: '3.8'

services:
  meshcentral:
    image: docker.io/meshcentral/meshcentral:latest
    container_name: meshcentral
    hostname: meshcentral
    ports:
      - "${MESHCENTRAL_PORT:-8080}:8080"
    volumes:
      - meshcentral_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  meshcentral_data:
    name: meshcentral_data
