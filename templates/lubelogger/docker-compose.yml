version: '3.8'

services:
  lubelogger:
    image: ghcr.io/hargata/lubelogger:latest
    container_name: lubelogger
    hostname: lubelogger
    ports:
      - "${LUBELOGGER_PORT:-8080}:8080"
    volumes:
      - lubelogger_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lubelogger_data:
    name: lubelogger_data
