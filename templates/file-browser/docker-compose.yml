version: '3.8'

services:
  file-browser:
    image: docker.io/krisss/file-browser:latest
    container_name: file-browser
    hostname: file-browser
    ports:
      - "${FILE_BROWSER_PORT:-8080}:8080"
    volumes:
      - file-browser_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  file-browser_data:
    name: file-browser_data
