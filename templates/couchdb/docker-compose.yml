version: '3.8'

services:
  couchdb:
    image: docker.io/library/couchdb:latest
    container_name: couchdb
    hostname: couchdb
    ports:
      - "${COUCHDB_PORT:-8080}:8080"
    volumes:
      - couchdb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  couchdb_data:
    name: couchdb_data
