version: '3.8'

services:
  textarea:
    image: docker.io/dnlweijers/textarea:latest
    container_name: textarea
    hostname: textarea
    ports:
      - "${TEXTAREA_PORT:-8080}:8080"
    volumes:
      - textarea_data:/data
    restart: unless-stopped

volumes:
  textarea_data:
    name: textarea_data
