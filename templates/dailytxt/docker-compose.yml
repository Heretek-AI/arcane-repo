version: '3.8'

services:
  dailytxt:
    image: docker.io/phitux/dailytxt:latest
    container_name: dailytxt
    hostname: dailytxt
    ports:
      - "${DAILYTXT_PORT:-8080}:8080"
    volumes:
      - dailytxt_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dailytxt_data:
    name: dailytxt_data
