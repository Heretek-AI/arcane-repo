version: '3.8'

services:
  hotspot:
    image: docker.io/ketere/hotspot:latest
    container_name: hotspot
    hostname: hotspot
    ports:
      - "${HOTSPOT_PORT:-8080}:8080"
    volumes:
      - hotspot_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  hotspot_data:
    name: hotspot_data
