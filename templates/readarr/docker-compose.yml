version: '3.8'

services:
  readarr:
    image: ghcr.io/linuxserver/readarr:latest
    container_name: readarr
    hostname: readarr
    ports:
      - "${READARR_PORT:-8080}:8080"
    volumes:
      - readarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  readarr_data:
    name: readarr_data
