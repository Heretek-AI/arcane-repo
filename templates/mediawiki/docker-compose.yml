version: '3.8'

services:
  mediawiki:
    image: docker.io/library/mediawiki:latest
    container_name: mediawiki
    hostname: mediawiki
    ports:
      - "${MEDIAWIKI_PORT:-80}:80"
    volumes:
      - mediawiki_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mediawiki_data:
    name: mediawiki_data
