version: '3.8'

services:
  flame:
    image: docker.io/pawelmalak/flame:latest
    container_name: flame
    hostname: flame
    ports:
      - "${FLAME_PORT:-8080}:8080"
    volumes:
      - flame_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  flame_data:
    name: flame_data
