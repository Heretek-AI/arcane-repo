version: '3.8'

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.20
    container_name: milvus-etcd
    hostname: milvus-etcd
    ports:
      - "${ETCD_PORT:-2379}:2379"
      - "${ETCD_PEER_PORT:-2380}:2380"
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: |
      etcd
      --data-dir=/etcd
      --name=etcd0
      --initial-advertise-peer-urls=http://0.0.0.0:2380
      --listen-peer-urls=http://0.0.0.0:2380
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --initial-cluster=etcd0=http://etcd0:2380
      --initial-cluster-state=new

  minio:
    image: minio/minio:latest
    container_name: milvus-minio
    hostname: milvus-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/minio_data
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:latest
    container_name: milvus
    hostname: milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      # ── Common Configuration ───────────────────────────────────────────
      - ETCD_USE_EMBED=${ETCD_USE_EMBED:-false}
      # ── ETCD Connection ───────────────────────────────────────────────
      - ETCD_ENDPOINTS=${ETCD_ENDPOINTS:-milvus-etcd:2379}
      # ── MinIO (Object Storage) ────────────────────────────────────────
      - MINIO_ADDRESS=${MINIO_ADDRESS:-milvus-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      # ── Common ────────────────────────────────────────────────────────
      - COMMON_STORAGETYPE=${COMMON_STORAGETYPE:-minio}

volumes:
  etcd_data:
    name: milvus_etcd_data
  minio_data:
    name: milvus_minio_data
  milvus_data:
    name: milvus_data
