version: '3.8'

services:
  xwiki:
    image: docker.io/library/xwiki:latest
    container_name: xwiki
    hostname: xwiki
    ports:
      - "${XWIKI_PORT:-80}:80"
    volumes:
      - xwiki_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  xwiki_data:
    name: xwiki_data
