version: '3.8'

services:
  vikunja:
    image: docker.io/vikunja/vikunja:latest
    container_name: vikunja
    hostname: vikunja
    ports:
      - "${VIKUNJA_PORT:-8080}:8080"
    volumes:
      - vikunja_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  vikunja_data:
    name: vikunja_data
