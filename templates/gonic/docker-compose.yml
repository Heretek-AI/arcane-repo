version: '3.8'

services:
  gonic:
    image: ghcr.io/sentriz/gonic:latest
    container_name: gonic
    hostname: gonic
    ports:
      - "${GONIC_PORT:-8080}:8080"
    volumes:
      - gonic_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gonic_data:
    name: gonic_data
