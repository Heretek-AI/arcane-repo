version: '3.8'

services:
  what-to-cook:
    image: ghcr.io/kassner/whattocook:latest
    container_name: what-to-cook
    hostname: what-to-cook
    ports:
      - "${WHAT_TO_COOK_PORT:-8080}:8080"
    volumes:
      - what-to-cook_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  what-to-cook_data:
    name: what-to-cook_data
