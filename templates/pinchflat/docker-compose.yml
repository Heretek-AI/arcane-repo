version: '3.8'

services:
  pinchflat:
    image: docker.io/keglin/pinchflat:latest
    container_name: pinchflat
    hostname: pinchflat
    ports:
      - "${PINCHFLAT_PORT:-8080}:8080"
    volumes:
      - pinchflat_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pinchflat_data:
    name: pinchflat_data
