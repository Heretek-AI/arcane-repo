version: '3.8'

services:
  termix:
    image: docker.io/bugattiguy527/termix:latest
    container_name: termix
    hostname: termix
    ports:
      - "${TERMIX_PORT:-8080}:8080"
    volumes:
      - termix_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  termix_data:
    name: termix_data
