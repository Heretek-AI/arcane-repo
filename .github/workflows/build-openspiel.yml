name: Build OpenSpiel

on:
  push:
    paths:
      - 'scripts/dockerfiles/openspiel/**'
      - 'templates/openspiel/**'
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: openspiel
    secrets: inherit
