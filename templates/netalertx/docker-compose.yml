version: '3.8'

services:
  netalertx:
    image: ghcr.io/netalertx/netalertx:latest
    container_name: netalertx
    hostname: netalertx
    ports:
      - "${NETALERTX_PORT:-8080}:8080"
    volumes:
      - netalertx_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  netalertx_data:
    name: netalertx_data
