version: '3.8'

services:
  openhands:
    image: ghcr.io/openhands/openhands:latest
    container_name: openhands
    hostname: openhands
    ports:
      - "${OPENHANDS_PORT:-8080}:8080"
    volumes:
      - openhands_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openhands_data:
    name: openhands_data
