version: '3.8'

services:
  jirafeau:
    image: docker.io/evanhoucke/jirafeau:latest
    container_name: jirafeau
    hostname: jirafeau
    ports:
      - "${JIRAFEAU_PORT:-8080}:8080"
    volumes:
      - jirafeau_data:/data
    restart: unless-stopped

volumes:
  jirafeau_data:
    name: jirafeau_data
