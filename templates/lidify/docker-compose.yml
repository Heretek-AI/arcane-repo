version: '3.8'

services:
  lidify:
    image: docker.io/thewicklowwolf/lidify:latest
    container_name: lidify
    hostname: lidify
    ports:
      - "${LIDIFY_PORT:-3000}:3000"
    volumes:
      - lidify_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lidify_data:
    name: lidify_data
