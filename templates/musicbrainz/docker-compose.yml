version: '3.8'

services:
  musicbrainz:
    image: ghcr.io/linuxserver/musicbrainz:latest
    container_name: musicbrainz
    hostname: musicbrainz
    ports:
      - "${MUSICBRAINZ_PORT:-8080}:8080"
    volumes:
      - musicbrainz_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  musicbrainz_data:
    name: musicbrainz_data
