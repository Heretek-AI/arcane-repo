version: '3.8'

services:
  webtor:
    image: ghcr.io/webtor-io/self-hosted:latest
    container_name: webtor
    hostname: webtor
    ports:
      - "${WEBTOR_PORT:-8080}:8080"
    volumes:
      - webtor_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  webtor_data:
    name: webtor_data
