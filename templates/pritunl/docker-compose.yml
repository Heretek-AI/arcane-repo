version: '3.8'

services:
  pritunl:
    image: docker.io/jippi/pritunl:latest
    container_name: pritunl
    hostname: pritunl
    ports:
      - "${PRITUNL_PORT:-8080}:8080"
    volumes:
      - pritunl_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pritunl_data:
    name: pritunl_data
