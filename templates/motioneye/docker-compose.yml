version: '3.8'

services:
  motioneye:
    image: docker.io/ccrisan/motioneye:latest
    container_name: motioneye
    hostname: motioneye
    ports:
      - "${MOTIONEYE_PORT:-8080}:8080"
    volumes:
      - motioneye_data:/data
    restart: unless-stopped

volumes:
  motioneye_data:
    name: motioneye_data
