version: '3.8'

services:
  zwave-js-ui:
    image: docker.io/zwavejs/zwave-js-ui:latest
    container_name: zwave-js-ui
    hostname: zwave-js-ui
    ports:
      - "${ZWAVE_JS_UI_PORT:-8080}:8080"
    volumes:
      - zwave-js-ui_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  zwave-js-ui_data:
    name: zwave-js-ui_data
