version: '3.8'

services:
  yuxi:
    image: ghcr.io/heretek-ai/arcane-repo/yuxi:latest
    container_name: yuxi
    hostname: yuxi
    ports:
      - "${YUXI_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - YUXI_PORT=${YUXI_PORT:-8000}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-yuxi}
      - POSTGRES_USER=${POSTGRES_USER:-yuxi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yuxi}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: yuxi-postgres
    hostname: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-yuxi}
      - POSTGRES_USER=${POSTGRES_USER:-yuxi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yuxi}
    volumes:
      - yuxi_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yuxi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  yuxi_postgres_data:
    name: yuxi_postgres_data
