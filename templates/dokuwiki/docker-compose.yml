version: '3.8'

services:
  dokuwiki:
    image: ghcr.io/dokuwiki/dokuwiki:latest
    container_name: dokuwiki
    hostname: dokuwiki
    ports:
      - "${DOKUWIKI_PORT:-80}:80"
    volumes:
      - dokuwiki_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dokuwiki_data:
    name: dokuwiki_data
