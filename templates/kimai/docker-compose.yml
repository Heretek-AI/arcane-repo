version: '3.8'

services:
  kimai:
    image: ghcr.io/linuxserver/kimai:latest
    container_name: kimai
    hostname: kimai
    ports:
      - "${KIMAI_PORT:-8080}:8080"
    volumes:
      - kimai_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kimai_data:
    name: kimai_data
