version: '3.8'

services:
  photoshow:
    image: ghcr.io/linuxserver/photoshow:latest
    container_name: photoshow
    hostname: photoshow
    ports:
      - "${PHOTOSHOW_PORT:-8080}:8080"
    volumes:
      - photoshow_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  photoshow_data:
    name: photoshow_data
