version: '3.8'

services:
  stalwart:
    image: ghcr.io/stalwartlabs/stalwart:latest
    container_name: stalwart
    hostname: stalwart
    ports:
      - "${STALWART_PORT:-8080}:8080"
    volumes:
      - stalwart_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  stalwart_data:
    name: stalwart_data
