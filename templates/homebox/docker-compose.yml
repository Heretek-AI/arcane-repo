version: '3.8'

services:
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:la
    container_name: homebox
    hostname: homebox
    ports:
      - "${HOMEBOX_PORT:-8080}:8080"
    volumes:
      - homebox_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  homebox_data:
    name: homebox_data
