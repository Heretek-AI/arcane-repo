version: '3.8'

services:
  opencloud:
    image: docker.io/opencloudeu/opencloud:latest
    container_name: opencloud
    hostname: opencloud
    ports:
      - "${OPENCLOUD_PORT:-8080}:8080"
    volumes:
      - opencloud_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  opencloud_data:
    name: opencloud_data
