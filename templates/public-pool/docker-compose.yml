version: '3.8'

services:
  public-pool:
    image: ghcr.io/sethforprivacy/public-pool:latest
    container_name: public-pool
    hostname: public-pool
    ports:
      - "${PUBLIC_POOL_PORT:-8080}:8080"
    volumes:
      - public-pool_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  public-pool_data:
    name: public-pool_data
