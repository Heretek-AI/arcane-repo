version: '3.8'

services:
  netbird:
    image: ghcr.io/netbirdio/netbird:latest
    container_name: netbird
    hostname: netbird
    ports:
      - "${NETBIRD_PORT:-8080}:8080"
    volumes:
      - netbird_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  netbird_data:
    name: netbird_data
