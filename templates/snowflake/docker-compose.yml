version: '3.8'

services:
  snowflake:
    image: docker.io/tzuehlke/snowflake:latest
    container_name: snowflake
    hostname: snowflake
    ports:
      - "${SNOWFLAKE_PORT:-8080}:8080"
    volumes:
      - snowflake_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  snowflake_data:
    name: snowflake_data
