version: '3.8'

services:
  nexterm:
    image: docker.io/germannewsmaker/nexterm:latest
    container_name: nexterm
    hostname: nexterm
    ports:
      - "${NEXTERM_PORT:-8080}:8080"
    volumes:
      - nexterm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nexterm_data:
    name: nexterm_data
