version: '3.8'

services:
  ergo:
    image: ghcr.io/ergochat/ergo:latest
    container_name: ergo
    hostname: ergo
    ports:
      - "${ERGO_PORT:-8080}:8080"
    volumes:
      - ergo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ergo_data:
    name: ergo_data
