version: '3.8'

services:
  chevereto:
    image: ghcr.io/chevereto/chevereto:latest
    container_name: chevereto
    hostname: chevereto
    ports:
      - "${CHEVERETO_PORT:-8080}:8080"
    volumes:
      - chevereto_data:/data
    restart: unless-stopped

volumes:
  chevereto_data:
    name: chevereto_data
