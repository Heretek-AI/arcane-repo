version: '3.8'

services:
  lobe-chat:
    image: docker.io/lobehub/lobe-chat:latest
    container_name: lobe-chat
    hostname: lobe-chat
    ports:
      - "${LOBE_CHAT_PORT:-8080}:8080"
    volumes:
      - lobe-chat_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lobe-chat_data:
    name: lobe-chat_data
