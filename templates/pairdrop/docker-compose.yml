version: '3.8'

services:
  pairdrop:
    image: ghcr.io/linuxserver/pairdrop:latest
    container_name: pairdrop
    hostname: pairdrop
    ports:
      - "${PAIRDROP_PORT:-8080}:8080"
    volumes:
      - pairdrop_data:/data
    restart: unless-stopped

volumes:
  pairdrop_data:
    name: pairdrop_data
