version: '3.8'

services:
  lightning:
    image: docker.io/btcpayserver/lightning:latest
    container_name: lightning
    hostname: lightning
    ports:
      - "${LIGHTNING_PORT:-8080}:8080"
    volumes:
      - lightning_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lightning_data:
    name: lightning_data
