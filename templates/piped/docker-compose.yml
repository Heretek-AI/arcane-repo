version: '3.8'

services:
  piped:
    image: docker.io/1337kavin/piped:latest
    container_name: piped
    hostname: piped
    ports:
      - "${PIPED_PORT:-8080}:8080"
    volumes:
      - piped_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  piped_data:
    name: piped_data
