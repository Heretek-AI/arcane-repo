version: '3.8'

services:
  open-meteo:
    image: ghcr.io/open-meteo/open-meteo:latest
    container_name: open-meteo
    hostname: open-meteo
    ports:
      - "${OPEN_METEO_PORT:-8080}:8080"
    volumes:
      - open-meteo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  open-meteo_data:
    name: open-meteo_data
