version: '3.8'

services:
  clamav:
    image: docker.io/clamav/clamav:latest
    container_name: clamav
    hostname: clamav
    ports:
      - "${CLAMAV_PORT:-8080}:8080"
    volumes:
      - clamav_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  clamav_data:
    name: clamav_data
