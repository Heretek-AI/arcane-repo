version: '3.8'

services:
  snserver:
    image: docker.io/isamaya/snserver:latest
    container_name: snserver
    hostname: snserver
    ports:
      - "${SNSERVER_PORT:-8080}:8080"
    volumes:
      - snserver_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  snserver_data:
    name: snserver_data
