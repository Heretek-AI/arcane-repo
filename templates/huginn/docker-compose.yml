version: '3.8'

services:
  huginn:
    image: ghcr.io/huginn/huginn:latest
    container_name: huginn
    hostname: huginn
    ports:
      - "${HUGINN_PORT:-8080}:8080"
    volumes:
      - huginn_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  huginn_data:
    name: huginn_data
