version: '3.8'

services:
  wekan:
    image: ghcr.io/wekan/wekan:latest
    container_name: wekan
    hostname: wekan
    ports:
      - "${WEKAN_PORT:-8080}:8080"
    volumes:
      - wekan_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wekan_data:
    name: wekan_data
