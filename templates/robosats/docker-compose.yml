version: '3.8'

services:
  robosats:
    image: docker.io/recksato/robosats:latest
    container_name: robosats
    hostname: robosats
    ports:
      - "${ROBOSATS_PORT:-8080}:8080"
    volumes:
      - robosats_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  robosats_data:
    name: robosats_data
