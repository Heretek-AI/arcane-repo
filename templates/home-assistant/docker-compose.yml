version: '3.8'

services:
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    container_name: home-assistant
    hostname: home-assistant
    ports:
      - "${HOME_ASSISTANT_PORT:-8080}:8080"
    volumes:
      - home-assistant_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  home-assistant_data:
    name: home-assistant_data
