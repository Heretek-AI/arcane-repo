version: '3.8'

services:
  agenta:
    image: docker.io/intelligentlogistics/agenta:latest
    container_name: agenta
    hostname: agenta
    ports:
      - "${AGENTA_PORT:-8080}:8080"
    volumes:
      - agenta_data:/data
    restart: unless-stopped

volumes:
  agenta_data:
    name: agenta_data
