version: '3.8'

services:
  jeedom:
    image: docker.io/jeedom/jeedom:latest
    container_name: jeedom
    hostname: jeedom
    ports:
      - "${JEEDOM_PORT:-8080}:8080"
    volumes:
      - jeedom_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jeedom_data:
    name: jeedom_data
