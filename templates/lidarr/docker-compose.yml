version: '3.8'

services:
  lidarr:
    image: ghcr.io/linuxserver/lidarr:latest
    container_name: lidarr
    hostname: lidarr
    ports:
      - "${LIDARR_PORT:-8080}:8080"
    volumes:
      - lidarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lidarr_data:
    name: lidarr_data
