version: '3.8'

services:
  owncast:
    image: ghcr.io/owncast/owncast:latest
    container_name: owncast
    hostname: owncast
    ports:
      - "${OWNCAST_PORT:-8080}:8080"
    volumes:
      - owncast_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  owncast_data:
    name: owncast_data
