version: '3.8'

services:
  pgadmin:
    image: docker.io/elestio/pgadmin:latest
    container_name: pgadmin
    hostname: pgadmin
    ports:
      - "${PGADMIN_PORT:-8080}:8080"
    volumes:
      - pgadmin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgadmin_data:
    name: pgadmin_data
