version: '3.8'

services:
  homer:
    image: docker.io/b4bz/homer:latest
    container_name: homer
    hostname: homer
    ports:
      - "${HOMER_PORT:-8080}:8080"
    volumes:
      - homer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  homer_data:
    name: homer_data
