version: '3.8'

services:
  calibreweb:
    image: docker.io/fluffybacon/calibreweb:latest
    container_name: calibreweb
    hostname: calibreweb
    ports:
      - "${CALIBREWEB_PORT:-8083}:8083"
    volumes:
      - calibreweb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  calibreweb_data:
    name: calibreweb_data
