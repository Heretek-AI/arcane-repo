version: '3.8'

services:
  aurral:
    image: docker.io/gsariev/aurral:latest
    container_name: aurral
    hostname: aurral
    ports:
      - "${AURRAL_PORT:-8080}:8080"
    volumes:
      - aurral_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  aurral_data:
    name: aurral_data
