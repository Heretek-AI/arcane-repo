version: '3.8'

services:
  marreta:
    image: ghcr.io/manualdousuario/marreta:latest
    container_name: marreta
    hostname: marreta
    ports:
      - "${MARRETA_PORT:-8080}:8080"
    volumes:
      - marreta_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  marreta_data:
    name: marreta_data
