version: '3.8'

services:
  blinko:
    image: docker.io/blinkospace/blinko:latest
    container_name: blinko
    hostname: blinko
    ports:
      - "${BLINKO_PORT:-8080}:8080"
    volumes:
      - blinko_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  blinko_data:
    name: blinko_data
