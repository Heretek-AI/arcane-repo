version: '3.8'

services:
  workout-tracker:
    image: docker.io/ninjatec/workout-tracker:latest
    container_name: workout-tracker
    hostname: workout-tracker
    ports:
      - "${WORKOUT_TRACKER_PORT:-8080}:8080"
    volumes:
      - workout-tracker_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  workout-tracker_data:
    name: workout-tracker_data
