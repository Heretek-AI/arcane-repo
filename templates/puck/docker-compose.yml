version: '3.8'

services:
  puck:
    image: python:3.12-slim
    container_name: puck
    hostname: puck
    ports:
      - "${PUCK_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    command: |
      sh -c "
      pip install --no-cache-dir -q fastapi uvicorn &&
      cat > /app/server.py << 'PYEOF'
import os
from fastapi import FastAPI

app = FastAPI(
    title='Puck',
    version='1.0.0',
    description=(
        'Puck coordinates multi-agent AI workflows with configurable '
        'pipelines and event-driven execution. This template provides '
        'a minimal informational API. For the full experience, install '
        'puck directly in your Python project or use the CLI directly.'
    )
)

@app.get('/health')
async def health():
    return {
        'status': 'ok',
        'service': 'puck',
        'note': 'Informational stub — install puck via pip for full agent orchestration capabilities',
        'installation': 'pip install puck'
    }

@app.get('/guide')
async def guide():
    return {
        'installation': [
            'pip install puck',
            '# or with extras: pip install puck[openai,anthropic]'
        ],
        'cli_usage': [
            'puck run workflow.yaml',
            'puck serve --port 8080'
        ],
        'python_usage': [
            'from puck import Agent, Workflow',
            'agent = Agent(name="assistant", model="gpt-4")',
            'wf = Workflow(agent)',
            'result = wf.run("Your task here")'
        ],
        'documentation': 'https://github.com/puck-ai/puck',
        'note': 'Puck runs best as a Python library or CLI tool in your project environment.'
    }

if __name__ == '__main__':
    import uvicorn
    port = int(os.environ.get('PUCK_PORT', '8000'))
    uvicorn.run(app, host='0.0.0.0', port=port)
PYEOF
      uvicorn server:app --host 0.0.0.0 --port ${PUCK_PORT:-8000}
      "
