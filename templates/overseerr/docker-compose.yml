version: '3.8'

services:
  overseerr:
    image: docker.io/sctx/overseerr:latest
    container_name: overseerr
    hostname: overseerr
    ports:
      - "${OVERSEERR_PORT:-8080}:8080"
    volumes:
      - overseerr_data:/data
    restart: unless-stopped

volumes:
  overseerr_data:
    name: overseerr_data
