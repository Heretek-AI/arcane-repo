version: '3.8'

services:
  esphome:
    image: ghcr.io/esphome/esphome:latest
    container_name: esphome
    hostname: esphome
    ports:
      - "${ESPHOME_PORT:-8080}:8080"
    volumes:
      - esphome_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  esphome_data:
    name: esphome_data
