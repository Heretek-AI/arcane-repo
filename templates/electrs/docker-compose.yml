version: '3.8'

services:
  electrs:
    image: docker.io/getumbrel/electrs:latest
    container_name: electrs
    hostname: electrs
    ports:
      - "${ELECTRS_PORT:-8080}:8080"
    volumes:
      - electrs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  electrs_data:
    name: electrs_data
