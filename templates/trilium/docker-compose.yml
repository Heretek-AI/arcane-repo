version: '3.8'

services:
  trilium:
    image: ghcr.io/zadam/trilium:latest
    container_name: trilium
    hostname: trilium
    ports:
      - "${TRILIUM_PORT:-8080}:8080"
    volumes:
      - trilium_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  trilium_data:
    name: trilium_data
