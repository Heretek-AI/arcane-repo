version: '3.8'

services:
  piwigo:
    image: ghcr.io/piwigo/piwigo:latest
    container_name: piwigo
    hostname: piwigo
    ports:
      - "${PIWIGO_PORT:-8080}:8080"
    volumes:
      - piwigo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  piwigo_data:
    name: piwigo_data
