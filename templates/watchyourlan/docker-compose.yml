version: '3.8'

services:
  watchyourlan:
    image: ghcr.io/aceberg/watchyourlan:latest
    container_name: watchyourlan
    hostname: watchyourlan
    ports:
      - "${WATCHYOURLAN_PORT:-8080}:8080"
    volumes:
      - watchyourlan_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  watchyourlan_data:
    name: watchyourlan_data
