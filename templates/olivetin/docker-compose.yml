version: '3.8'

services:
  olivetin:
    image: ghcr.io/olivetin/olivetin:latest
    container_name: olivetin
    hostname: olivetin
    ports:
      - "${OLIVETIN_PORT:-8080}:8080"
    volumes:
      - olivetin_data:/data
    restart: unless-stopped

volumes:
  olivetin_data:
    name: olivetin_data
