name: Build Clawith

on:
  push:
    paths:
      - 'scripts/dockerfiles/clawith/**'
      - 'templates/clawith/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Clawith
        run: |
          IMAGE="ghcr.io/heretek-ai/arcane-repo/clawith:latest"
          echo "Building $IMAGE..."
          docker build -t "$IMAGE" -f scripts/dockerfiles/clawith/Dockerfile .
          docker push "$IMAGE"
          echo "Published: $IMAGE"
