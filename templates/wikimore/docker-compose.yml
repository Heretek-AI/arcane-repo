version: '3.8'

services:
  wikimore:
    image: docker.io/tlan16/wikimore:latest
    container_name: wikimore
    hostname: wikimore
    ports:
      - "${WIKIMORE_PORT:-80}:80"
    volumes:
      - wikimore_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wikimore_data:
    name: wikimore_data
