version: '3.8'

services:
  domoticz:
    image: docker.io/domoticz/domoticz:latest
    container_name: domoticz
    hostname: domoticz
    ports:
      - "${DOMOTICZ_PORT:-8080}:8080"
    volumes:
      - domoticz_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  domoticz_data:
    name: domoticz_data
