version: '3.8'

services:
  languagetool:
    image: docker.io/erikvl87/languagetool:latest
    container_name: languagetool
    hostname: languagetool
    ports:
      - "${LANGUAGETOOL_PORT:-8080}:8080"
    volumes:
      - languagetool_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  languagetool_data:
    name: languagetool_data
