version: '3.8'

services:
  ttrss:
    image: docker.io/wangqiru/ttrss:latest
    container_name: ttrss
    hostname: ttrss
    ports:
      - "${TTRSS_PORT:-80}:80"
    volumes:
      - ttrss_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ttrss_data:
    name: ttrss_data
