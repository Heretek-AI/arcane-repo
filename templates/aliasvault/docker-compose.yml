version: '3.8'

services:
  aliasvault:
    image: ghcr.io/aliasvault/aliasvault:latest
    container_name: aliasvault
    hostname: aliasvault
    ports:
      - "${ALIASVAULT_PORT:-8080}:8080"
    volumes:
      - aliasvault_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  aliasvault_data:
    name: aliasvault_data
