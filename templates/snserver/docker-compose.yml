version: '3.8'

services:
  snserver:
    image: docker.io/isamaya/snserver:latest
    container_name: snserver
    hostname: snserver
    ports:
      - "${SNSERVER_PORT:-8080}:8080"
    volumes:
      - snserver_data:/data
    restart: unless-stopped

volumes:
  snserver_data:
    name: snserver_data
