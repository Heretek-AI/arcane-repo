version: '3.8'

services:
  cryptpad:
    image: docker.io/cryptpad/cryptpad:latest
    container_name: cryptpad
    hostname: cryptpad
    ports:
      - "${CRYPTPAD_PORT:-8080}:8080"
    volumes:
      - cryptpad_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cryptpad_data:
    name: cryptpad_data
