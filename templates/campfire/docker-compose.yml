version: '3.8'

services:
  campfire:
    image: docker.io/xw134/campfire:latest
    container_name: campfire
    hostname: campfire
    ports:
      - "${CAMPFIRE_PORT:-8080}:8080"
    volumes:
      - campfire_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  campfire_data:
    name: campfire_data
