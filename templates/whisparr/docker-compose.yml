version: '3.8'

services:
  whisparr:
    image: ghcr.io/thespad/whisparr:latest
    container_name: whisparr
    hostname: whisparr
    ports:
      - "${WHISPARR_PORT:-8080}:8080"
    volumes:
      - whisparr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  whisparr_data:
    name: whisparr_data
