version: '3.8'

services:
  borgserver:
    image: ghcr.io/nold360/borgserver:latest
    container_name: borgserver
    hostname: borgserver
    ports:
      - "${BORGSERVER_PORT:-8080}:8080"
    volumes:
      - borgserver_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  borgserver_data:
    name: borgserver_data
