version: '3.8'

services:
  donetick:
    image: docker.io/donetick/donetick:latest
    container_name: donetick
    hostname: donetick
    ports:
      - "${DONETICK_PORT:-8080}:8080"
    volumes:
      - donetick_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  donetick_data:
    name: donetick_data
