version: '3.8'

services:
  many-notes:
    image: docker.io/brufdev/many-notes:latest
    container_name: many-notes
    hostname: many-notes
    ports:
      - "${MANY_NOTES_PORT:-8080}:8080"
    volumes:
      - many-notes_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  many-notes_data:
    name: many-notes_data
