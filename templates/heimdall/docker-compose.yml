version: '3.8'

services:
  heimdall:
    image: ghcr.io/linuxserver/heimdall:latest
    container_name: heimdall
    hostname: heimdall
    ports:
      - "${HEIMDALL_PORT:-8080}:8080"
    volumes:
      - heimdall_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  heimdall_data:
    name: heimdall_data
