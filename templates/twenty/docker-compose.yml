version: '3.8'

services:
  twenty:
    image: docker.io/twentycrm/twenty:latest
    container_name: twenty
    hostname: twenty
    ports:
      - "${TWENTY_PORT:-8080}:8080"
    volumes:
      - twenty_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  twenty_data:
    name: twenty_data
