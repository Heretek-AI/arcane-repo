version: '3.8'

services:
  glpi:
    image: docker.io/glpi/glpi:latest
    container_name: glpi
    hostname: glpi
    ports:
      - "${GLPI_PORT:-8080}:8080"
    volumes:
      - glpi_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  glpi_data:
    name: glpi_data
