version: '3.8'

services:
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: langfuse
    hostname: langfuse
    ports:
      - "${LANGFUSE_PORT:-8080}:8080"
    volumes:
      - langfuse_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  langfuse_data:
    name: langfuse_data
