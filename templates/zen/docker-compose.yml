version: '3.8'

services:
  zen:
    image: ghcr.io/linuxserver/zen:latest
    container_name: zen
    hostname: zen
    ports:
      - "${ZEN_PORT:-8080}:8080"
    volumes:
      - zen_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  zen_data:
    name: zen_data
