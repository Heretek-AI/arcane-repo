version: '3.8'

services:
  commafeed:
    image: ghcr.io/athou/commafeed:latest
    container_name: commafeed
    hostname: commafeed
    ports:
      - "${COMMAFEED_PORT:-8080}:8080"
    volumes:
      - commafeed_data:/data
    restart: unless-stopped

volumes:
  commafeed_data:
    name: commafeed_data
