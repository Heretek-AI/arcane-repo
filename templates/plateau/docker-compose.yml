version: '3.8'

services:
  plateau:
    image: docker.io/remykonings35/plateau:latest
    container_name: plateau
    hostname: plateau
    ports:
      - "${PLATEAU_PORT:-8080}:8080"
    volumes:
      - plateau_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  plateau_data:
    name: plateau_data
