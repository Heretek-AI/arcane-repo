version: '3.8'

services:
  spip:
    image: docker.io/ipeos/spip:latest
    container_name: spip
    hostname: spip
    ports:
      - "${SPIP_PORT:-8080}:8080"
    volumes:
      - spip_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  spip_data:
    name: spip_data
