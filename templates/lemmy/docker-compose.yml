version: '3.8'

services:
  lemmy:
    image: docker.io/dessalines/lemmy:latest
    container_name: lemmy
    hostname: lemmy
    ports:
      - "${LEMMY_PORT:-8080}:8080"
    volumes:
      - lemmy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lemmy_data:
    name: lemmy_data
