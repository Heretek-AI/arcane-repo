version: "3.8"

services:
  plexe:
    image: ghcr.io/heretek-ai/arcane-repo/plexe:latest
    build:
      context: ../..
      dockerfile: scripts/dockerfiles/plexe/Dockerfile
    container_name: plexe
    hostname: plexe
    ports:
      - "${PLEXE_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - PLEXE_PORT=${PLEXE_PORT:-8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ${PLEXE_DATA_DIR:-./data}:/data
      - ${PLEXE_WORKDIR:-./workdir}:/workdir

