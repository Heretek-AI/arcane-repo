version: '3.8'

services:
  retroarch:
    image: docker.io/kasmweb/retroarch:latest
    container_name: retroarch
    hostname: retroarch
    ports:
      - "${RETROARCH_PORT:-8080}:8080"
    volumes:
      - retroarch_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  retroarch_data:
    name: retroarch_data
