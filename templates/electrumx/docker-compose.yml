version: '3.8'

services:
  electrumx:
    image: docker.io/lukechilds/electrumx:latest
    container_name: electrumx
    hostname: electrumx
    ports:
      - "${ELECTRUMX_PORT:-8080}:8080"
    volumes:
      - electrumx_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  electrumx_data:
    name: electrumx_data
