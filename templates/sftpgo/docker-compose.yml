version: "3.8"

services:
  sftpgo:
    image: drakkan/sftpgo:latest
    container_name: sftpgo
    hostname: sftpgo
    ports:
      - "${SFTPGO_WEB_PORT:-8080}:8080"
      - "${SFTPGO_SFTP_PORT:-2022}:2022"
    restart: unless-stopped
    environment:
      - SFTPGO_HTTPD__BINDINGS__0__PORT=8080
      - SFTPGO_SFTPD__BINDINGS__0__PORT=2022
      - SFTPGO_DEFAULT_ADMIN_USERNAME=${SFTPGO_ADMIN_USER:-admin}
      - SFTPGO_DEFAULT_ADMIN_PASSWORD=${SFTPGO_ADMIN_PASSWORD:-password}
    volumes:
      - sftpgo_data:/srv/sftpgo
      - sftpgo_data:/var/lib/sftpgo
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  sftpgo_data:
    driver: local
