version: '3.8'

services:
  ziit:
    image: ghcr.io/0pandadev/ziit:latest
    container_name: ziit
    hostname: ziit
    ports:
      - "${ZIIT_PORT:-8080}:8080"
    volumes:
      - ziit_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ziit_data:
    name: ziit_data
