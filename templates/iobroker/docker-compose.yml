version: '3.8'

services:
  iobroker:
    image: docker.io/iobroker/iobroker:latest
    container_name: iobroker
    hostname: iobroker
    ports:
      - "${IOBROKER_PORT:-8080}:8080"
    volumes:
      - iobroker_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  iobroker_data:
    name: iobroker_data
