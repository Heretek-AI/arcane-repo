version: '3.8'

services:
  flowiseai:
    image: docker.io/elestio/flowiseai:latest
    container_name: flowiseai
    hostname: flowiseai
    ports:
      - "${FLOWISEAI_PORT:-3000}:3000"
    volumes:
      - flowiseai_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  flowiseai_data:
    name: flowiseai_data
