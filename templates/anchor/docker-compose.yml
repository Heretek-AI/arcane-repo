version: '3.8'

services:
  anchor:
    image: docker.io/solanafoundation/anchor:latest
    container_name: anchor
    hostname: anchor
    ports:
      - "${ANCHOR_PORT:-8080}:8080"
    volumes:
      - anchor_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  anchor_data:
    name: anchor_data
