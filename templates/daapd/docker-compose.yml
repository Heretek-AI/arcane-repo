version: '3.8'

services:
  daapd:
    image: ghcr.io/linuxserver/daapd:latest
    container_name: daapd
    hostname: daapd
    ports:
      - "${DAAPD_PORT:-8080}:8080"
    volumes:
      - daapd_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  daapd_data:
    name: daapd_data
