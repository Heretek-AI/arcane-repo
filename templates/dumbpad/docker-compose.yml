version: '3.8'

services:
  dumbpad:
    image: docker.io/dumbwareio/dumbpad:latest
    container_name: dumbpad
    hostname: dumbpad
    ports:
      - "${DUMBPAD_PORT:-8080}:8080"
    volumes:
      - dumbpad_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dumbpad_data:
    name: dumbpad_data
