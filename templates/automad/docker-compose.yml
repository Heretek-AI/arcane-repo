version: '3.8'

services:
  automad:
    image: docker.io/automad/automad:latest
    container_name: automad
    hostname: automad
    ports:
      - "${AUTOMAD_PORT:-8080}:8080"
    volumes:
      - automad_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  automad_data:
    name: automad_data
