version: '3.8'

services:
  domain-locker:
    image: ghcr.io/lissy93/domain-locker:latest
    container_name: domain-locker
    hostname: domain-locker
    ports:
      - "${DOMAIN_LOCKER_PORT:-8080}:8080"
    volumes:
      - domain-locker_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  domain-locker_data:
    name: domain-locker_data
