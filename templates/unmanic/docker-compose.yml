version: '3.8'

services:
  unmanic:
    image: ghcr.io/unmanic/unmanic:latest
    container_name: unmanic
    hostname: unmanic
    ports:
      - "${UNMANIC_PORT:-8080}:8080"
    volumes:
      - unmanic_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  unmanic_data:
    name: unmanic_data
