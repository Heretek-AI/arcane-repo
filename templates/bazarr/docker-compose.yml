version: '3.8'

services:
  bazarr:
    image: ghcr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    ports:
      - "${BAZARR_PORT:-8080}:8080"
    volumes:
      - bazarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bazarr_data:
    name: bazarr_data
