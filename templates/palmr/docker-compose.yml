version: '3.8'

services:
  palmr:
    image: docker.io/kyantech/palmr:latest
    container_name: palmr
    hostname: palmr
    ports:
      - "${PALMR_PORT:-8080}:8080"
    volumes:
      - palmr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  palmr_data:
    name: palmr_data
