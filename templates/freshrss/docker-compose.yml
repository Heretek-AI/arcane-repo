version: '3.8'

services:
  freshrss:
    image: ghcr.io/linuxserver/freshrss:latest
    container_name: freshrss
    hostname: freshrss
    ports:
      - "${FRESHRSS_PORT:-80}:80"
    volumes:
      - freshrss_data:/data
    restart: unless-stopped

volumes:
  freshrss_data:
    name: freshrss_data
