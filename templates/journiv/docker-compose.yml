version: '3.8'

services:
  journiv:
    image: docker.io/idjohnson/journiv:latest
    container_name: journiv
    hostname: journiv
    ports:
      - "${JOURNIV_PORT:-8080}:8080"
    volumes:
      - journiv_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  journiv_data:
    name: journiv_data
