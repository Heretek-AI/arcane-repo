version: '3.8'

services:
  bitcoin:
    image: docker.io/bitcoin/bitcoin:latest
    container_name: bitcoin
    hostname: bitcoin
    ports:
      - "${BITCOIN_PORT:-8080}:8080"
    volumes:
      - bitcoin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bitcoin_data:
    name: bitcoin_data
