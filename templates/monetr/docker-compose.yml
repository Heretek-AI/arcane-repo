version: '3.8'

services:
  monetr:
    image: ghcr.io/monetr/monetr:latest
    container_name: monetr
    hostname: monetr
    ports:
      - "${MONETR_PORT:-8080}:8080"
    volumes:
      - monetr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  monetr_data:
    name: monetr_data
