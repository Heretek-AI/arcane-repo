version: '3.8'

services:
  postiz:
    image: docker.io/toykitpostiz/postiz:latest
    container_name: postiz
    hostname: postiz
    ports:
      - "${POSTIZ_PORT:-8080}:8080"
    volumes:
      - postiz_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postiz_data:
    name: postiz_data
