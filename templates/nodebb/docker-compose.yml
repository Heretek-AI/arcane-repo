version: '3.8'

services:
  nodebb:
    image: ghcr.io/nodebb/nodebb:latest
    container_name: nodebb
    hostname: nodebb
    ports:
      - "${NODEBB_PORT:-8080}:8080"
    volumes:
      - nodebb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nodebb_data:
    name: nodebb_data
