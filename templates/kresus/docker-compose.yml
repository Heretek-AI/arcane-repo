version: '3.8'

services:
  kresus:
    image: docker.io/bnjbvr/kresus:latest
    container_name: kresus
    hostname: kresus
    ports:
      - "${KRESUS_PORT:-8080}:8080"
    volumes:
      - kresus_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kresus_data:
    name: kresus_data
