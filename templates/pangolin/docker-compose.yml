version: '3.8'

services:
  pangolin:
    image: docker.io/staphb/pangolin:latest
    container_name: pangolin
    hostname: pangolin
    ports:
      - "${PANGOLIN_PORT:-8080}:8080"
    volumes:
      - pangolin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pangolin_data:
    name: pangolin_data
