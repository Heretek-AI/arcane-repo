version: '3.8'

services:
  rustdesk-server:
    image: ghcr.io/rustdesk/rustdesk-server:latest
    container_name: rustdesk-server
    hostname: rustdesk-server
    ports:
      - "${RUSTDESK_SERVER_PORT:-8080}:8080"
    volumes:
      - rustdesk-server_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rustdesk-server_data:
    name: rustdesk-server_data
