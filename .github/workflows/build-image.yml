name: Build Template Images

on:
  push:
    branches: [main]
    paths:
      - 'scripts/dockerfiles/**'
      - 'templates/openspiel/**'
      - 'templates/nanobot/**'
      - 'templates/vane/**'
      - 'templates/worldmonitor/**'
  workflow_dispatch:
    inputs:
      template:
        description: 'Template to build (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - openspiel
          - nanobot
          - vane
          - worldmonitor

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: latest

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        template:
          - openspiel
          - nanobot
          - vane
          - worldmonitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if dispatch targets specific template
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.template != 'all' && inputs.template != matrix.template }}
        run: echo "Skipping ${{ matrix.template }} — dispatch targets ${{ inputs.template }}" && exit 0

      - name: Build and push ${{ matrix.template }}
        id: build
        run: |
          TEMPLATE="${{ matrix.template }}"
          DOCKERFILE="scripts/dockerfiles/$TEMPLATE/Dockerfile"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/$TEMPLATE:${{ env.IMAGE_TAG }}"

          if [ ! -f "$DOCKERFILE" ]; then
            echo "No Dockerfile for $TEMPLATE — skipping"
            exit 0
          fi

          echo "Building $IMAGE from $DOCKERFILE..."
          docker build -t "$IMAGE" -f "$DOCKERFILE" .
          docker push "$IMAGE"
          echo "Published: $IMAGE"
