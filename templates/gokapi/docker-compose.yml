version: '3.8'

services:
  gokapi:
    image: docker.io/f0rc3/gokapi:latest
    container_name: gokapi
    hostname: gokapi
    ports:
      - "${GOKAPI_PORT:-8080}:8080"
    volumes:
      - gokapi_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gokapi_data:
    name: gokapi_data
