version: '3.8'

services:
  open-web-calendar:
    image: docker.io/niccokunzmann/open-web-calendar:latest
    container_name: open-web-calendar
    hostname: open-web-calendar
    ports:
      - "${OPEN_WEB_CALENDAR_PORT:-8080}:8080"
    volumes:
      - open-web-calendar_data:/data
    restart: unless-stopped

volumes:
  open-web-calendar_data:
    name: open-web-calendar_data
