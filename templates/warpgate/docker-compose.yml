version: '3.8'

services:
  warpgate:
    image: docker.io/heywoodlh/warpgate:latest
    container_name: warpgate
    hostname: warpgate
    ports:
      - "${WARPGATE_PORT:-8080}:8080"
    volumes:
      - warpgate_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  warpgate_data:
    name: warpgate_data
