version: '3.8'

services:
  heyform:
    image: docker.io/crownshy/heyform:latest
    container_name: heyform
    hostname: heyform
    ports:
      - "${HEYFORM_PORT:-8080}:8080"
    volumes:
      - heyform_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  heyform_data:
    name: heyform_data
