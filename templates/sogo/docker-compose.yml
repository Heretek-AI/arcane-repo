version: '3.8'

services:
  sogo:
    image: ghcr.io/mailcow/sogo:latest
    container_name: sogo
    hostname: sogo
    ports:
      - "${SOGO_PORT:-8080}:8080"
    volumes:
      - sogo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sogo_data:
    name: sogo_data
