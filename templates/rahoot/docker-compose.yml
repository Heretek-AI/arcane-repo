version: '3.8'

services:
  rahoot:
    image: docker.io/ralex91/rahoot:latest
    container_name: rahoot
    hostname: rahoot
    ports:
      - "${RAHOOT_PORT:-8080}:8080"
    volumes:
      - rahoot_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rahoot_data:
    name: rahoot_data
