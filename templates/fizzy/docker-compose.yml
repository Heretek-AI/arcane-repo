version: '3.8'

services:
  fizzy:
    image: docker.io/findingfocusdev/fizzy:latest
    container_name: fizzy
    hostname: fizzy
    ports:
      - "${FIZZY_PORT:-8080}:8080"
    volumes:
      - fizzy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fizzy_data:
    name: fizzy_data
