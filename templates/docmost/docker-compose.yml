version: '3.8'

services:
  docmost:
    image: docker.io/docmost/docmost:latest
    container_name: docmost
    hostname: docmost
    ports:
      - "${DOCMOST_PORT:-8080}:8080"
    volumes:
      - docmost_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  docmost_data:
    name: docmost_data
