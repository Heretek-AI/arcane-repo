version: "3.8"

services:
  databasus:
    image: databasus/databasus:latest
    container_name: databasus
    hostname: databasus
    ports:
      - "${DATABASUS_PORT:-5433}:5433"
    restart: unless-stopped
    environment:
      - PORT=5433
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5433"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
