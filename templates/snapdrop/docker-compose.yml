version: '3.8'

services:
  snapdrop:
    image: ghcr.io/linuxserver/snapdrop:latest
    container_name: snapdrop
    hostname: snapdrop
    ports:
      - "${SNAPDROP_PORT:-8080}:8080"
    volumes:
      - snapdrop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  snapdrop_data:
    name: snapdrop_data
