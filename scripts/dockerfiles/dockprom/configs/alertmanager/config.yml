# ── Arcane dockprom: Alertmanager Configuration ───────────────────

global:
  resolve_timeout: 5m

# Root route — all alerts go to the default receiver
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'

  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      repeat_interval: 15m

# ── Receivers ─────────────────────────────────────────────────────
# Configure your notification channels below.
# Supported: email, Slack, PagerDuty, OpsGenie, Webhook, WeChat, Telegram, VictorOps, Pushover.

receivers:
  - name: 'default-receiver'
    # Uncomment and configure your preferred notification channel:
    # email_configs:
    #   - to: 'alerts@example.com'
    #     from: 'alertmanager@example.com'
    #     smarthost: 'smtp.example.com:587'
    #     auth_username: 'alertmanager@example.com'
    #     auth_password: 'your-password'

    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX'
    #     channel: '#alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

  - name: 'critical-receiver'
    # Critical alerts — configure urgently (PagerDuty, OpsGenie, etc.)
