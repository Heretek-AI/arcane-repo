version: '3.8'

services:
  nutify:
    image: docker.io/dartsteven/nutify:latest
    container_name: nutify
    hostname: nutify
    ports:
      - "${NUTIFY_PORT:-8080}:8080"
    volumes:
      - nutify_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nutify_data:
    name: nutify_data
