version: '3.8'

services:
  indico:
    image: ghcr.io/indico/indico:latest
    container_name: indico
    hostname: indico
    ports:
      - "${INDICO_PORT:-8080}:8080"
    volumes:
      - indico_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  indico_data:
    name: indico_data
