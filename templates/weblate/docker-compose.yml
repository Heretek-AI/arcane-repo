version: '3.8'

services:
  weblate:
    image: docker.io/weblate/weblate:latest
    container_name: weblate
    hostname: weblate
    ports:
      - "${WEBLATE_PORT:-8080}:8080"
    volumes:
      - weblate_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  weblate_data:
    name: weblate_data
