version: '3.8'

services:
  pingvin:
    image: docker.io/jasonyangee/pingvin:latest
    container_name: pingvin
    hostname: pingvin
    ports:
      - "${PINGVIN_PORT:-8080}:8080"
    volumes:
      - pingvin_data:/data
    restart: unless-stopped

volumes:
  pingvin_data:
    name: pingvin_data
