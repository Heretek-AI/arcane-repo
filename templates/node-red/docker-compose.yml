version: '3.8'

services:
  node-red:
    image: ghcr.io/node-red/node-red:latest
    container_name: node-red
    hostname: node-red
    ports:
      - "${NODE_RED_PORT:-8080}:8080"
    volumes:
      - node-red_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  node-red_data:
    name: node-red_data
