version: '3.8'

services:
  phpldapadmin:
    image: docker.io/phpldapadmin/phpldapadmin:latest
    container_name: phpldapadmin
    hostname: phpldapadmin
    ports:
      - "${PHPLDAPADMIN_PORT:-8080}:8080"
    volumes:
      - phpldapadmin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  phpldapadmin_data:
    name: phpldapadmin_data
