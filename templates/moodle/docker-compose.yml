version: '3.8'

services:
  moodle:
    image: docker.io/bitnami/moodle:latest
    container_name: moodle
    hostname: moodle
    ports:
      - "${MOODLE_PORT:-8080}:8080"
    volumes:
      - moodle_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  moodle_data:
    name: moodle_data
