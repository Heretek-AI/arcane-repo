version: '3.8'

services:
  homebridge:
    image: ghcr.io/homebridge/homebridge:latest
    container_name: homebridge
    hostname: homebridge
    ports:
      - "${HOMEBRIDGE_PORT:-8080}:8080"
    volumes:
      - homebridge_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  homebridge_data:
    name: homebridge_data
