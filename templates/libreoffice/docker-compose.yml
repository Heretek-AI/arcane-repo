version: '3.8'

services:
  libreoffice:
    image: docker.io/instructure/libreoffice:latest
    container_name: libreoffice
    hostname: libreoffice
    ports:
      - "${LIBREOFFICE_PORT:-8080}:8080"
    volumes:
      - libreoffice_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  libreoffice_data:
    name: libreoffice_data
