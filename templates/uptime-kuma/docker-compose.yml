version: '3.8'

services:
  uptime-kuma:
    image: ghcr.io/louislam/uptime-kuma:latest
    container_name: uptime-kuma
    hostname: uptime-kuma
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - uptime-kuma_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  uptime-kuma_data:
    name: uptime-kuma_data
