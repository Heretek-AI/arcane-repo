version: '3.8'

services:
  restic:
    image: ghcr.io/restic/restic:latest
    container_name: restic
    hostname: restic
    ports:
      - "${RESTIC_PORT:-8080}:8080"
    volumes:
      - restic_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  restic_data:
    name: restic_data
