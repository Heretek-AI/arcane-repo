version: '3.8'

services:
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    ports:
      - "${PROWLARR_PORT:-8080}:8080"
    volumes:
      - prowlarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  prowlarr_data:
    name: prowlarr_data
