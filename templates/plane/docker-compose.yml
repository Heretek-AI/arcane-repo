version: '3.8'

services:
  plane:
    image: docker.io/plane/plane:latest
    container_name: plane
    hostname: plane
    ports:
      - "${PLANE_PORT:-8000}:8000"
    volumes:
      - plane_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  plane_data:
    name: plane_data
