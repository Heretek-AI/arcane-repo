name: Build WGCloud

on:
  push:
    paths:
      - 'scripts/dockerfiles/wgcloud/**'
      - 'templates/wgcloud/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: wgcloud
    secrets: inherit
