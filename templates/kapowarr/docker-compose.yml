version: '3.8'

services:
  kapowarr:
    image: docker.io/mrcas/kapowarr:latest
    container_name: kapowarr
    hostname: kapowarr
    ports:
      - "${KAPOWARR_PORT:-8080}:8080"
    volumes:
      - kapowarr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kapowarr_data:
    name: kapowarr_data
