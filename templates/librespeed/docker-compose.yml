version: '3.8'

services:
  librespeed:
    image: ghcr.io/linuxserver/librespeed:latest
    container_name: librespeed
    hostname: librespeed
    ports:
      - "${LIBRESPEED_PORT:-80}:80"
    volumes:
      - librespeed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  librespeed_data:
    name: librespeed_data
