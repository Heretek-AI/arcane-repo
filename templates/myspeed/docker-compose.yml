version: '3.8'

services:
  myspeed:
    image: docker.io/germannewsmaker/myspeed:latest
    container_name: myspeed
    hostname: myspeed
    ports:
      - "${MYSPEED_PORT:-8080}:8080"
    volumes:
      - myspeed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  myspeed_data:
    name: myspeed_data
