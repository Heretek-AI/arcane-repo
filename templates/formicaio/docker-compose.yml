version: '3.8'

services:
  formicaio:
    image: docker.io/bochaco/formicaio:latest
    container_name: formicaio
    hostname: formicaio
    ports:
      - "${FORMICAIO_PORT:-8080}:8080"
    volumes:
      - formicaio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  formicaio_data:
    name: formicaio_data
