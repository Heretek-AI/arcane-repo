version: '3.8'

services:
  databunker:
    image: docker.io/securitybunker/databunker:latest
    container_name: databunker
    hostname: databunker
    ports:
      - "${DATABUNKER_PORT:-8080}:8080"
    volumes:
      - databunker_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  databunker_data:
    name: databunker_data
