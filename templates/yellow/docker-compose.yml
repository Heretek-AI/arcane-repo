version: '3.8'

services:
  yellow:
    image: docker.io/davidaparicio/yellow:latest
    container_name: yellow
    hostname: yellow
    ports:
      - "${YELLOW_PORT:-8080}:8080"
    volumes:
      - yellow_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yellow_data:
    name: yellow_data
