version: '3.8'

services:
  warracker:
    image: docker.io/legamy/warracker:latest
    container_name: warracker
    hostname: warracker
    ports:
      - "${WARRACKER_PORT:-8080}:8080"
    volumes:
      - warracker_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  warracker_data:
    name: warracker_data
