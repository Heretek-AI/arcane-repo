version: '3.8'

services:
  chevereto:
    image: ghcr.io/chevereto/chevereto:latest
    container_name: chevereto
    hostname: chevereto
    ports:
      - "${CHEVERETO_PORT:-8080}:8080"
    volumes:
      - chevereto_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chevereto_data:
    name: chevereto_data
