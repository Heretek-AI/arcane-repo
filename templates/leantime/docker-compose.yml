version: '3.8'

services:
  leantime:
    image: docker.io/leantime/leantime:latest
    container_name: leantime
    hostname: leantime
    ports:
      - "${LEANTIME_PORT:-8080}:8080"
    volumes:
      - leantime_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  leantime_data:
    name: leantime_data
