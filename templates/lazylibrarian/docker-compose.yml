version: '3.8'

services:
  lazylibrarian:
    image: ghcr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    hostname: lazylibrarian
    ports:
      - "${LAZYLIBRARIAN_PORT:-8080}:8080"
    volumes:
      - lazylibrarian_data:/data
    restart: unless-stopped

volumes:
  lazylibrarian_data:
    name: lazylibrarian_data
