version: '3.8'

services:
  mastodon:
    image: ghcr.io/mastodon/mastodon:latest
    container_name: mastodon
    hostname: mastodon
    ports:
      - "${MASTODON_PORT:-3000}:3000"
    volumes:
      - mastodon_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mastodon_data:
    name: mastodon_data
