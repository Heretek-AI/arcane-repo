version: '3.8'

services:
  plainpad:
    image: docker.io/alextselegidis/plainpad:latest
    container_name: plainpad
    hostname: plainpad
    ports:
      - "${PLAINPAD_PORT:-8080}:8080"
    volumes:
      - plainpad_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  plainpad_data:
    name: plainpad_data
