version: '3.8'

services:
  plesk:
    image: docker.io/plesk/plesk:latest
    container_name: plesk
    hostname: plesk
    ports:
      - "${PLESK_PORT:-8080}:8080"
    volumes:
      - plesk_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  plesk_data:
    name: plesk_data
