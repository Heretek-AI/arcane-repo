version: '3.8'

services:
  joomla:
    image: docker.io/amd64/joomla:latest
    container_name: joomla
    hostname: joomla
    ports:
      - "${JOOMLA_PORT:-8080}:8080"
    volumes:
      - joomla_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  joomla_data:
    name: joomla_data
