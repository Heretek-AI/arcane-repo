version: '3.8'

services:
  openhabittracker:
    image: docker.io/jinjinov/openhabittracker:latest
    container_name: openhabittracker
    hostname: openhabittracker
    ports:
      - "${OPENHABITTRACKER_PORT:-8080}:8080"
    volumes:
      - openhabittracker_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openhabittracker_data:
    name: openhabittracker_data
