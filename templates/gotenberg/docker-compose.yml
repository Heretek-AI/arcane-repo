version: '3.8'

services:
  gotenberg:
    image: docker.io/gotenberg/gotenberg:latest
    container_name: gotenberg
    hostname: gotenberg
    ports:
      - "${GOTENBERG_PORT:-8080}:8080"
    volumes:
      - gotenberg_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gotenberg_data:
    name: gotenberg_data
