name: Build TradingAgents

on:
  push:
    paths:
      - 'scripts/dockerfiles/tradingagents/**'
      - 'templates/tradingagents/**'
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: tradingagents
    secrets: inherit
