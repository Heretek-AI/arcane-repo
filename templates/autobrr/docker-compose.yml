version: '3.8'

services:
  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    hostname: autobrr
    ports:
      - "${AUTOBRR_PORT:-8080}:8080"
    volumes:
      - autobrr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  autobrr_data:
    name: autobrr_data
