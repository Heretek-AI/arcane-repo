version: '3.8'

services:
  chromium:
    image: docker.io/kasmweb/chromium:latest
    container_name: chromium
    hostname: chromium
    ports:
      - "${CHROMIUM_PORT:-8080}:8080"
    volumes:
      - chromium_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chromium_data:
    name: chromium_data
