version: '3.8'

services:
  bentopdf:
    image: docker.io/bentopdf/bentopdf:latest
    container_name: bentopdf
    hostname: bentopdf
    ports:
      - "${BENTOPDF_PORT:-8080}:8080"
    volumes:
      - bentopdf_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bentopdf_data:
    name: bentopdf_data
