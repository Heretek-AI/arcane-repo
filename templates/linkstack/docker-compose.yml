version: '3.8'

services:
  linkstack:
    image: ghcr.io/linkstackorg/linkstack:latest
    container_name: linkstack
    hostname: linkstack
    ports:
      - "${LINKSTACK_PORT:-8080}:8080"
    volumes:
      - linkstack_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  linkstack_data:
    name: linkstack_data
