version: '3.8'

services:
  ojs:
    image: docker.io/pkpofficial/ojs:latest
    container_name: ojs
    hostname: ojs
    ports:
      - "${OJS_PORT:-8080}:8080"
    volumes:
      - ojs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ojs_data:
    name: ojs_data
