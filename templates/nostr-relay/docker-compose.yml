version: '3.8'

services:
  nostr-relay:
    image: ghcr.io/mattn/nostr-relay:latest
    container_name: nostr-relay
    hostname: nostr-relay
    ports:
      - "${NOSTR_RELAY_PORT:-8080}:8080"
    volumes:
      - nostr-relay_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nostr-relay_data:
    name: nostr-relay_data
