version: '3.8'

services:
  teamspeak:
    image: docker.io/library/teamspeak:latest
    container_name: teamspeak
    hostname: teamspeak
    ports:
      - "${TEAMSPEAK_PORT:-8080}:8080"
    volumes:
      - teamspeak_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  teamspeak_data:
    name: teamspeak_data
