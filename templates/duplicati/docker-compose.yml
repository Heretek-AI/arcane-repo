version: '3.8'

services:
  duplicati:
    image: docker.io/duplicati/duplicati:latest
    container_name: duplicati
    hostname: duplicati
    ports:
      - "${DUPLICATI_PORT:-8080}:8080"
    volumes:
      - duplicati_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  duplicati_data:
    name: duplicati_data
