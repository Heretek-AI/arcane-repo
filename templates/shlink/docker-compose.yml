version: '3.8'

services:
  shlink:
    image: ghcr.io/shlinkio/shlink:latest
    container_name: shlink
    hostname: shlink
    ports:
      - "${SHLINK_PORT:-8080}:8080"
    volumes:
      - shlink_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shlink_data:
    name: shlink_data
