version: '3.8'

services:
  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: gitea
    hostname: gitea
    ports:
      - "${GITEA_PORT:-3000}:3000"
    volumes:
      - gitea_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gitea_data:
    name: gitea_data
