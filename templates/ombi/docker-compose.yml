version: '3.8'

services:
  ombi:
    image: ghcr.io/linuxserver/ombi:latest
    container_name: ombi
    hostname: ombi
    ports:
      - "${OMBI_PORT:-8080}:8080"
    volumes:
      - ombi_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ombi_data:
    name: ombi_data
