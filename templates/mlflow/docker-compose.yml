version: '3.8'

services:
  mlflow:
    image: ghcr.io/arcane-repo/mlflow:latest
    container_name: mlflow
    hostname: mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    restart: unless-stopped
    volumes:
      - mlflow_data:/app/mlruns
      - mlflow_artifacts:/app/mlartifacts
    environment:
      - MLFLOW_PORT=${MLFLOW_PORT:-5000}
      - MLFLOW_BACKEND_STORE_URI=${MLFLOW_BACKEND_STORE_URI:-/app/mlruns}
      - MLFLOW_ARTIFACT_ROOT=${MLFLOW_ARTIFACT_ROOT:-/app/mlartifacts}
      - MLFLOW_TRACKING_URI=http://0.0.0.0:${MLFLOW_PORT:-5000}

volumes:
  mlflow_data:
  mlflow_artifacts:
