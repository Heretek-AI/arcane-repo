version: '3.8'

services:
  otter-wiki:
    image: docker.io/redimp/otterwiki:latest
    container_name: otter-wiki
    hostname: otter-wiki
    ports:
      - "${OTTER_WIKI_PORT:-80}:80"
    volumes:
      - otter-wiki_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  otter-wiki_data:
    name: otter-wiki_data
