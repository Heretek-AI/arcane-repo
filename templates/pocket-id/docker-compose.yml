version: '3.8'

services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:latest
    container_name: pocket-id
    hostname: pocket-id
    ports:
      - "${POCKET_ID_PORT:-8080}:8080"
    volumes:
      - pocket-id_data:/data
    restart: unless-stopped

volumes:
  pocket-id_data:
    name: pocket-id_data
