version: '3.8'

services:
  faircamp:
    image: docker.io/n3wjack/faircamp:latest
    container_name: faircamp
    hostname: faircamp
    ports:
      - "${FAIRCAMP_PORT:-8080}:8080"
    volumes:
      - faircamp_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  faircamp_data:
    name: faircamp_data
