version: '3.8'

services:
  nullboard:
    image: docker.io/richardsoper/nullboard:latest
    container_name: nullboard
    hostname: nullboard
    ports:
      - "${NULLBOARD_PORT:-8080}:8080"
    volumes:
      - nullboard_data:/data
    restart: unless-stopped

volumes:
  nullboard_data:
    name: nullboard_data
