version: '3.8'

services:
  transfersh:
    image: docker.io/martinbouillaud/transfersh:latest
    container_name: transfersh
    hostname: transfersh
    ports:
      - "${TRANSFERSH_PORT:-8080}:8080"
    volumes:
      - transfersh_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  transfersh_data:
    name: transfersh_data
