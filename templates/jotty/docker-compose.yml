version: '3.8'

services:
  jotty:
    image: ghcr.io/fccview/jotty:latest
    container_name: jotty
    hostname: jotty
    ports:
      - "${JOTTY_PORT:-8080}:8080"
    volumes:
      - jotty_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jotty_data:
    name: jotty_data
