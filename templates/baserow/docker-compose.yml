version: '3.8'

services:
  baserow:
    image: docker.io/baserow/baserow:latest
    container_name: baserow
    hostname: baserow
    ports:
      - "${BASEROW_PORT:-80}:80"
    volumes:
      - baserow_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  baserow_data:
    name: baserow_data
