version: '3.8'

services:
  hermes-agent:
    image: docker.io/nousresearch/hermes-agent:latest
    container_name: hermes-agent
    hostname: hermes-agent
    ports:
      - "${HERMES_AGENT_PORT:-8080}:8080"
    volumes:
      - hermes-agent_data:/data
    restart: unless-stopped

volumes:
  hermes-agent_data:
    name: hermes-agent_data
