version: '3.8'

services:
  librespeed:
    image: ghcr.io/linuxserver/librespeed:latest
    container_name: librespeed
    hostname: librespeed
    ports:
      - "${LIBRESPEED_PORT:-80}:80"
    volumes:
      - librespeed_data:/data
    restart: unless-stopped

volumes:
  librespeed_data:
    name: librespeed_data
