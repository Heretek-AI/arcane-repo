version: '3.8'

services:
  wallabag:
    image: docker.io/wallabag/wallabag:latest
    container_name: wallabag
    hostname: wallabag
    ports:
      - "${WALLABAG_PORT:-80}:80"
    volumes:
      - wallabag_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wallabag_data:
    name: wallabag_data
