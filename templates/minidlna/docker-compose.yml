version: '3.8'

services:
  minidlna:
    image: docker.io/vladgh/minidlna:latest
    container_name: minidlna
    hostname: minidlna
    ports:
      - "${MINIDLNA_PORT:-8080}:8080"
    volumes:
      - minidlna_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  minidlna_data:
    name: minidlna_data
