version: '3.8'

services:
  tinyfilemanager:
    image: docker.io/tinyfilemanager/tinyfilemanager:latest
    container_name: tinyfilemanager
    hostname: tinyfilemanager
    ports:
      - "${TINYFILEMANAGER_PORT:-8080}:8080"
    volumes:
      - tinyfilemanager_data:/data
    restart: unless-stopped

volumes:
  tinyfilemanager_data:
    name: tinyfilemanager_data
