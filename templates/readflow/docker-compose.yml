version: '3.8'

services:
  readflow:
    image: docker.io/ncarlier/readflow:latest
    container_name: readflow
    hostname: readflow
    ports:
      - "${READFLOW_PORT:-8080}:8080"
    volumes:
      - readflow_data:/data
    restart: unless-stopped

volumes:
  readflow_data:
    name: readflow_data
