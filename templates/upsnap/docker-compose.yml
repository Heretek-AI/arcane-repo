version: '3.8'

services:
  upsnap:
    image: ghcr.io/seriousm4x/upsnap:latest
    container_name: upsnap
    hostname: upsnap
    ports:
      - "${UPSNAP_PORT:-8080}:8080"
    volumes:
      - upsnap_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  upsnap_data:
    name: upsnap_data
