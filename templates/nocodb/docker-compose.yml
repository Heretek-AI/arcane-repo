version: '3.8'

services:
  nocodb:
    image: docker.io/nocodb/nocodb:latest
    container_name: nocodb
    hostname: nocodb
    ports:
      - "${NOCODB_PORT:-8080}:8080"
    volumes:
      - nocodb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 1s
      retries: 3
      start_period: 30s

volumes:
  nocodb_data:
    name: nocodb_data
