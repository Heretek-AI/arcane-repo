version: '3.8'

services:
  text-generation-inference:
    image: ghcr.io/huggingface/text-generation-inference:latest
    container_name: text-generation-inference
    hostname: text-generation-inference
    ports:
      - "${TEXT_GENERATION_INFERENCE_PORT:-8080}:8080"
    restart: unless-stopped
    volumes:
      - text-generation-inference_data:/data

volumes:
  text-generation-inference_data:
    name: text-generation-inference_data
