version: '3.8'

services:
  whoogle-search:
    image: ghcr.io/benbusby/whoogle-search:latest
    container_name: whoogle-search
    hostname: whoogle-search
    ports:
      - "${WHOOGLE_SEARCH_PORT:-8080}:8080"
    volumes:
      - whoogle-search_data:/data
    restart: unless-stopped

volumes:
  whoogle-search_data:
    name: whoogle-search_data
