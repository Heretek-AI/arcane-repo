version: '3.8'

services:
  squeaknode:
    image: ghcr.io/squeaknode/squeaknode:latest
    container_name: squeaknode
    hostname: squeaknode
    ports:
      - "${SQUEAKNODE_PORT:-8080}:8080"
    volumes:
      - squeaknode_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  squeaknode_data:
    name: squeaknode_data
