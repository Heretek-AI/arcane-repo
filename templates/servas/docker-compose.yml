version: '3.8'

services:
  servas:
    image: docker.io/beromir/servas:latest
    container_name: servas
    hostname: servas
    ports:
      - "${SERVAS_PORT:-8080}:8080"
    volumes:
      - servas_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  servas_data:
    name: servas_data
