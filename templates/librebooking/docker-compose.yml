version: '3.8'

services:
  librebooking:
    image: docker.io/librebooking/librebooking:latest
    container_name: librebooking
    hostname: librebooking
    ports:
      - "${LIBREBOOKING_PORT:-8080}:8080"
    volumes:
      - librebooking_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  librebooking_data:
    name: librebooking_data
