version: '3.8'

services:
  cashu-me:
    image: docker.io/rstmsn/cashu-me:latest
    container_name: cashu-me
    hostname: cashu-me
    ports:
      - "${CASHU_ME_PORT:-8080}:8080"
    volumes:
      - cashu-me_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cashu-me_data:
    name: cashu-me_data
