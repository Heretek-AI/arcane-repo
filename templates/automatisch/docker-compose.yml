version: '3.8'

services:
  automatisch:
    image: ghcr.io/automatisch/automatisch:latest
    container_name: automatisch
    hostname: automatisch
    ports:
      - "${AUTOMATISCH_PORT:-8080}:8080"
    volumes:
      - automatisch_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  automatisch_data:
    name: automatisch_data
