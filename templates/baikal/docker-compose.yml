version: '3.8'

services:
  baikal:
    image: docker.io/ckulka/baikal:latest
    container_name: baikal
    hostname: baikal
    ports:
      - "${BAIKAL_PORT:-8080}:8080"
    volumes:
      - baikal_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  baikal_data:
    name: baikal_data
