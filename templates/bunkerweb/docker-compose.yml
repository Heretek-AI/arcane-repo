version: '3.8'

# в”Ђв”Ђ BunkerWeb в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# BunkerWeb is an open-source, cloud-native Web Application Firewall (WAF)
# based on NGINX. It integrates with Docker, Kubernetes, Swarm, and Linux.
#
# Features:
#   - ModSecurity WAF with OWASP Core Rule Set
#   - Automatic Let's Encrypt certificates
#   - Antibot challenges (cookie, JS, CAPTCHA, reCAPTCHA)
#   - Real-time monitoring with web UI
#   - Rate limiting, IP blocking, country-based access control
#
# Ports:
#   - 80: HTTP (redirects to HTTPS if AUTO_LETS_ENCRYPT is enabled)
#   - 443: HTTPS
#   - 7000: Web UI (optional)

services:
  bunkerweb:
    image: bunkerity/bunkerweb:latest
    container_name: bunkerweb
    hostname: bunkerweb
    ports:
      - "${BW_HTTP_PORT:-80}:8080"
      - "${BW_HTTPS_PORT:-443}:8443"
    restart: unless-stopped
    volumes:
      - bw_data:/data
    environment:
      - SERVER_NAME=${BW_SERVER_NAME:-www.example.com}
      - USE_REAL_IP=${BW_USE_REAL_IP:-yes}
      - REAL_IP_FROM=${BW_REAL_IP_FROM:-0.0.0.0/0}
      - AUTO_LETS_ENCRYPT=${BW_AUTO_LETS_ENCRYPT:-no}
      - USE_MODSECURITY=${BW_USE_MODSECURITY:-yes}
      - USE_MODSECURITY_CRS=${BW_USE_MODSECURITY_CRS:-yes}
      - USE_ANTIBOT=${BW_USE_ANTIBOT:-cookie}
      - USE_BUNKERNET=${BW_USE_BUNKERNET:-yes}
      - USE_BLACKLIST=${BW_USE_BLACKLIST:-yes}
      - USE_WHITELIST=${BW_USE_WHITELIST:-yes}
      - USE_LIMIT_REQ=${BW_USE_LIMIT_REQ:-yes}
      - LIMIT_REQ_RATE=${BW_LIMIT_REQ_RATE:-10r/s}
      - LIMIT_REQ_BURST=${BW_LIMIT_REQ_BURST:-20}
      - USE_GZIP=${BW_USE_GZIP:-yes}
      - USE_REVERSE_PROXY=${BW_USE_REVERSE_PROXY:-yes}
      - REVERSE_PROXY_URL=${BW_REVERSE_PROXY_URL:-/}
      - REVERSE_PROXY_HOST=${BW_REVERSE_PROXY_HOST:-http://app:3000}
      - LOG_LEVEL=${BW_LOG_LEVEL:-info}
      - ADMIN_USERNAME=${BW_ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${BW_ADMIN_PASSWORD:-changeme}

volumes:
  bw_data:
    name: bw_data
