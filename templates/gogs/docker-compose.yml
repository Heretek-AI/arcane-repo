version: '3.8'

services:
  gogs:
    image: ghcr.io/gogs/gogs:latest
    container_name: gogs
    hostname: gogs
    ports:
      - "${GOGS_PORT:-8080}:8080"
    volumes:
      - gogs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gogs_data:
    name: gogs_data
