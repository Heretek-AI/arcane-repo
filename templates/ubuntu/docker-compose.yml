version: '3.8'

services:
  ubuntu:
    image: docker.io/ubuntu:latest
    container_name: ubuntu
    hostname: ubuntu
    ports:
      - "${UBUNTU_PORT:-8080}:8080"
    volumes:
      - ubuntu_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ubuntu_data:
    name: ubuntu_data
