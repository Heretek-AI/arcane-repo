version: '3.8'

services:
  loki:
    image: docker.io/grafana/loki:latest
    container_name: loki
    hostname: loki
    ports:
      - "${LOKI_PORT:-3000}:3000"
    volumes:
      - loki_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  loki_data:
    name: loki_data
