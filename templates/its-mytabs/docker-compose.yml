version: '3.8'

services:
  its-mytabs:
    image: ghcr.io/louislam/its-mytabs:latest
    container_name: its-mytabs
    hostname: its-mytabs
    ports:
      - "${ITS_MYTABS_PORT:-8080}:8080"
    volumes:
      - its-mytabs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  its-mytabs_data:
    name: its-mytabs_data
