version: '3.8'

services:
  solectrus:
    image: ghcr.io/solectrus/solectrus:latest
    container_name: solectrus
    hostname: solectrus
    ports:
      - "${SOLECTRUS_PORT:-8080}:8080"
    volumes:
      - solectrus_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  solectrus_data:
    name: solectrus_data
