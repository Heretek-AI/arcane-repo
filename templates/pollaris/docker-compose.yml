version: '3.8'

services:
  pollaris:
    image: docker.io/linusll/pollaris:latest
    container_name: pollaris
    hostname: pollaris
    ports:
      - "${POLLARIS_PORT:-8080}:8080"
    volumes:
      - pollaris_data:/data
    restart: unless-stopped

volumes:
  pollaris_data:
    name: pollaris_data
