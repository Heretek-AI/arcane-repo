version: '3.8'

services:
  diaspora:
    image: docker.io/koehn/diaspora:latest
    container_name: diaspora
    hostname: diaspora
    ports:
      - "${DIASPORA_PORT:-8080}:8080"
    volumes:
      - diaspora_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  diaspora_data:
    name: diaspora_data
