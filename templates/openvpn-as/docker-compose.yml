version: '3.8'

services:
  openvpn-as:
    image: docker.io/openvpn/openvpn-as:latest
    container_name: openvpn-as
    hostname: openvpn-as
    ports:
      - "${OPENVPN_AS_PORT:-8080}:8080"
    volumes:
      - openvpn-as_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openvpn-as_data:
    name: openvpn-as_data
