version: '3.8'

services:
  komodo:
    image: docker.io/komodoofficial/komodo:latest
    container_name: komodo
    hostname: komodo
    ports:
      - "${KOMODO_PORT:-8080}:8080"
    volumes:
      - komodo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  komodo_data:
    name: komodo_data
