version: '3.8'

services:
  searxng:
    image: ghcr.io/searxng/searxng:latest
    container_name: searxng
    hostname: searxng
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - searxng_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  searxng_data:
    name: searxng_data
