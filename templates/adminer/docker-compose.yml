version: '3.8'

services:
  adminer:
    image: docker.io/library/adminer:latest
    container_name: adminer
    hostname: adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    volumes:
      - adminer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  adminer_data:
    name: adminer_data
