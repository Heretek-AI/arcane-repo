version: '3.8'

services:
  openbudgeteer:
    image: docker.io/axelander/openbudgeteer:latest
    container_name: openbudgeteer
    hostname: openbudgeteer
    ports:
      - "${OPENBUDGETEER_PORT:-8080}:8080"
    volumes:
      - openbudgeteer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openbudgeteer_data:
    name: openbudgeteer_data
