version: '3.8'

services:
  romm:
    image: ghcr.io/rommapp/romm:latest
    container_name: romm
    hostname: romm
    ports:
      - "${ROMM_PORT:-8080}:8080"
    volumes:
      - romm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  romm_data:
    name: romm_data
