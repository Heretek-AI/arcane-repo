version: '3.8'

services:
  dumbbudget:
    image: docker.io/dumbwareio/dumbbudget:latest
    container_name: dumbbudget
    hostname: dumbbudget
    ports:
      - "${DUMBBUDGET_PORT:-8080}:8080"
    volumes:
      - dumbbudget_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dumbbudget_data:
    name: dumbbudget_data
