version: '3.8'

services:
  dumbkan:
    image: docker.io/dumbwareio/dumbkan:latest
    container_name: dumbkan
    hostname: dumbkan
    ports:
      - "${DUMBKAN_PORT:-8080}:8080"
    volumes:
      - dumbkan_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dumbkan_data:
    name: dumbkan_data
