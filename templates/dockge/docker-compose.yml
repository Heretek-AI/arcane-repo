version: '3.8'

services:
  dockge:
    image: ghcr.io/louislam/dockge:latest
    container_name: dockge
    hostname: dockge
    ports:
      - "${DOCKGE_PORT:-8080}:8080"
    volumes:
      - dockge_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dockge_data:
    name: dockge_data
