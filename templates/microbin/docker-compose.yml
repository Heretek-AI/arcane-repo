version: '3.8'

services:
  microbin:
    image: docker.io/danielszabo99/microbin:latest
    container_name: microbin
    hostname: microbin
    ports:
      - "${MICROBIN_PORT:-8080}:8080"
    volumes:
      - microbin_data:/data
    restart: unless-stopped

volumes:
  microbin_data:
    name: microbin_data
