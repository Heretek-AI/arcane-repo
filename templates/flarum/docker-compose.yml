version: '3.8'

services:
  flarum:
    image: docker.io/crazymax/flarum:latest
    container_name: flarum
    hostname: flarum
    ports:
      - "${FLARUM_PORT:-8080}:8080"
    volumes:
      - flarum_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  flarum_data:
    name: flarum_data
