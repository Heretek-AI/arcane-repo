version: '3.8'

services:
  pufferpanel:
    image: ghcr.io/pufferpanel/pufferpanel:latest
    container_name: pufferpanel
    hostname: pufferpanel
    ports:
      - "${PUFFERPANEL_PORT:-8080}:8080"
    volumes:
      - pufferpanel_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pufferpanel_data:
    name: pufferpanel_data
