version: '3.8'

services:
  minisatip:
    image: ghcr.io/linuxserver/minisatip:latest
    container_name: minisatip
    hostname: minisatip
    ports:
      - "${MINISATIP_PORT:-8080}:8080"
    volumes:
      - minisatip_data:/data
    restart: unless-stopped

volumes:
  minisatip_data:
    name: minisatip_data
