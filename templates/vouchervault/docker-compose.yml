version: '3.8'

services:
  vouchervault:
    image: docker.io/l4rm4nd/vouchervault:latest
    container_name: vouchervault
    hostname: vouchervault
    ports:
      - "${VOUCHERVAULT_PORT:-8080}:8080"
    volumes:
      - vouchervault_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  vouchervault_data:
    name: vouchervault_data
