version: '3.8'

services:
  opencode:
    image: docker.io/smanx/opencode:latest
    container_name: opencode
    hostname: opencode
    ports:
      - "${OPENCODE_PORT:-8080}:8080"
    volumes:
      - opencode_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  opencode_data:
    name: opencode_data
