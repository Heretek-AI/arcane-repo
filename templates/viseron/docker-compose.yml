version: '3.8'

services:
  viseron:
    image: docker.io/roflcoopter/viseron:latest
    container_name: viseron
    hostname: viseron
    ports:
      - "${VISERON_PORT:-8080}:8080"
    volumes:
      - viseron_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  viseron_data:
    name: viseron_data
