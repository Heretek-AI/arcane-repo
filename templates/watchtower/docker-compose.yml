version: '3.8'

services:
  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    container_name: watchtower
    hostname: watchtower
    ports:
      - "${WATCHTOWER_PORT:-8080}:8080"
    volumes:
      - watchtower_data:/data
    restart: unless-stopped

volumes:
  watchtower_data:
    name: watchtower_data
