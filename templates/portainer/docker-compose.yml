version: '3.8'

services:
  portainer:
    image: docker.io/portainer/portainer:latest
    container_name: portainer
    hostname: portainer
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
    volumes:
      - portainer_data:/data
    restart: unless-stopped

volumes:
  portainer_data:
    name: portainer_data
