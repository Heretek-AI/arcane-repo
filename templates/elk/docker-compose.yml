version: '3.8'

services:
  elk:
    image: docker.io/sebp/elk:latest
    container_name: elk
    hostname: elk
    ports:
      - "${ELK_PORT:-8080}:8080"
    volumes:
      - elk_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  elk_data:
    name: elk_data
