version: '3.8'

services:
  albyhub:
    image: docker.io/netmojo/albyhub:latest
    container_name: albyhub
    hostname: albyhub
    ports:
      - "${ALBYHUB_PORT:-8080}:8080"
    volumes:
      - albyhub_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  albyhub_data:
    name: albyhub_data
