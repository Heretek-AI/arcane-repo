version: '3.8'

services:
  teampass:
    image: docker.io/teampass/teampass:latest
    container_name: teampass
    hostname: teampass
    ports:
      - "${TEAMPASS_PORT:-8080}:8080"
    volumes:
      - teampass_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  teampass_data:
    name: teampass_data
