version: '3.8'

services:
  oras:
    image: ghcr.io/oras-project/oras:latest
    container_name: oras
    hostname: oras
    ports:
      - "${ORAS_PORT:-8080}:8080"
    volumes:
      - oras_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  oras_data:
    name: oras_data
