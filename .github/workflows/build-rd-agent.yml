name: Build RD-Agent

on:
  push:
    paths:
      - 'scripts/dockerfiles/rd-agent/**'
      - 'templates/rd-agent/**'
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: rd-agent
    secrets: inherit
