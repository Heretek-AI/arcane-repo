version: '3.8'

services:
  lldap:
    image: ghcr.io/lldap/lldap:latest
    container_name: lldap
    hostname: lldap
    ports:
      - "${LLDAP_PORT:-8080}:8080"
    volumes:
      - lldap_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lldap_data:
    name: lldap_data
