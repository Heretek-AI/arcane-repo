version: '3.8'

services:
  ocular:
    image: docker.io/daksharma05/ocular:latest
    container_name: ocular
    hostname: ocular
    ports:
      - "${OCULAR_PORT:-8080}:8080"
    volumes:
      - ocular_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ocular_data:
    name: ocular_data
