version: '3.8'

services:
  mylar:
    image: ghcr.io/linuxserver/mylar:latest
    container_name: mylar
    hostname: mylar
    ports:
      - "${MYLAR_PORT:-8080}:8080"
    volumes:
      - mylar_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mylar_data:
    name: mylar_data
