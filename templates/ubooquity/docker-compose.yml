version: '3.8'

services:
  ubooquity:
    image: ghcr.io/linuxserver/ubooquity:latest
    container_name: ubooquity
    hostname: ubooquity
    ports:
      - "${UBOOQUITY_PORT:-8080}:8080"
    volumes:
      - ubooquity_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ubooquity_data:
    name: ubooquity_data
