version: '3.8'

services:
  neko:
    image: docker.io/m1k1o/neko:latest
    container_name: neko
    hostname: neko
    ports:
      - "${NEKO_PORT:-8080}:8080"
    volumes:
      - neko_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  neko_data:
    name: neko_data
