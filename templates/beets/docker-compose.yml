version: '3.8'

services:
  beets:
    image: ghcr.io/linuxserver/beets:latest
    container_name: beets
    hostname: beets
    ports:
      - "${BEETS_PORT:-8080}:8080"
    volumes:
      - beets_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  beets_data:
    name: beets_data
