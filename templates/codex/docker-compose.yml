version: '3.8'

services:
  codex:
    image: ghcr.io/ajslater/codex:latest
    container_name: codex
    hostname: codex
    ports:
      - "${CODEX_PORT:-8080}:8080"
    volumes:
      - codex_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  codex_data:
    name: codex_data
