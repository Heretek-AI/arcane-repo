version: '3.8'

services:
  cloudreve:
    image: docker.io/cloudreve/cloudreve:latest
    container_name: cloudreve
    hostname: cloudreve
    ports:
      - "${CLOUDREVE_PORT:-8080}:8080"
    volumes:
      - cloudreve_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cloudreve_data:
    name: cloudreve_data
