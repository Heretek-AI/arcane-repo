version: '3.8'

services:
  filepizza:
    image: docker.io/kern/filepizza:latest
    container_name: filepizza
    hostname: filepizza
    ports:
      - "${FILEPIZZA_PORT:-8080}:8080"
    volumes:
      - filepizza_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  filepizza_data:
    name: filepizza_data
