version: '3.8'

services:
  fossflow:
    image: docker.io/stnsmith/fossflow:latest
    container_name: fossflow
    hostname: fossflow
    ports:
      - "${FOSSFLOW_PORT:-8080}:8080"
    volumes:
      - fossflow_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fossflow_data:
    name: fossflow_data
