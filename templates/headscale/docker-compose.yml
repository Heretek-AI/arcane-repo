version: '3.8'

services:
  headscale:
    image: docker.io/headscale/headscale:latest
    container_name: headscale
    hostname: headscale
    ports:
      - "${HEADSCALE_PORT:-8080}:8080"
    volumes:
      - headscale_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  headscale_data:
    name: headscale_data
