version: '3.8'

services:
  piefed:
    image: docker.io/fedihost/piefed:latest
    container_name: piefed
    hostname: piefed
    ports:
      - "${PIEFED_PORT:-8080}:8080"
    volumes:
      - piefed_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  piefed_data:
    name: piefed_data
