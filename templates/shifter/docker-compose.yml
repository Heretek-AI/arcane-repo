version: '3.8'

services:
  shifter:
    image: ghcr.io/tobysuch/shifter:latest
    container_name: shifter
    hostname: shifter
    ports:
      - "${SHIFTER_PORT:-8080}:8080"
    volumes:
      - shifter_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shifter_data:
    name: shifter_data
