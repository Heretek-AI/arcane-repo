version: '3.8'

services:
  readflow:
    image: docker.io/ncarlier/readflow:latest
    container_name: readflow
    hostname: readflow
    ports:
      - "${READFLOW_PORT:-8080}:8080"
    volumes:
      - readflow_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  readflow_data:
    name: readflow_data
