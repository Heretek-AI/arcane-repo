version: '3.8'

services:
  scrutiny:
    image: ghcr.io/linuxserver/scrutiny:latest
    container_name: scrutiny
    hostname: scrutiny
    ports:
      - "${SCRUTINY_PORT:-8080}:8080"
    volumes:
      - scrutiny_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  scrutiny_data:
    name: scrutiny_data
