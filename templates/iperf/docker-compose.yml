version: '3.8'

services:
  iperf:
    image: docker.io/diamanti/iperf:latest
    container_name: iperf
    hostname: iperf
    ports:
      - "${IPERF_PORT:-8080}:8080"
    volumes:
      - iperf_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  iperf_data:
    name: iperf_data
