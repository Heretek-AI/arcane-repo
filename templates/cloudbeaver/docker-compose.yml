version: '3.8'

services:
  cloudbeaver:
    image: docker.io/dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    hostname: cloudbeaver
    ports:
      - "${CLOUDBEAVER_PORT:-8080}:8080"
    volumes:
      - cloudbeaver_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cloudbeaver_data:
    name: cloudbeaver_data
