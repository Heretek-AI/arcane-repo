version: '3.8'

services:
  traccar:
    image: docker.io/traccar/traccar:latest
    container_name: traccar
    hostname: traccar
    ports:
      - "${TRACCAR_PORT:-8080}:8080"
    volumes:
      - traccar_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  traccar_data:
    name: traccar_data
