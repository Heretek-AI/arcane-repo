version: '3.8'

services:
  calcom:
    image: docker.io/kaumudpa/calcom:latest
    container_name: calcom
    hostname: calcom
    ports:
      - "${CALCOM_PORT:-8080}:8080"
    volumes:
      - calcom_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  calcom_data:
    name: calcom_data
