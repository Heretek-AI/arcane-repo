version: '3.8'

services:
  codimd:
    image: ghcr.io/linuxserver/codimd:latest
    container_name: codimd
    hostname: codimd
    ports:
      - "${CODIMD_PORT:-3000}:3000"
    volumes:
      - codimd_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  codimd_data:
    name: codimd_data
