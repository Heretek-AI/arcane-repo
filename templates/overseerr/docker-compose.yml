version: '3.8'

services:
  overseerr:
    image: docker.io/sctx/overseerr:latest
    container_name: overseerr
    hostname: overseerr
    ports:
      - "${OVERSEERR_PORT:-8080}:8080"
    volumes:
      - overseerr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  overseerr_data:
    name: overseerr_data
