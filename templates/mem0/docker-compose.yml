version: "3.8"

services:
  mem0:
    image: python:3.12-slim
    container_name: mem0
    hostname: mem0
    ports:
      - "${MEM0_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - MEM0_PORT=${MEM0_PORT:-8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: >
      sh -c "
      pip install --no-cache-dir -q mem0ai uvicorn fastapi &&
      cat > /app/server.py << 'PYEOF'
import os
from fastapi import FastAPI

app = FastAPI(title='Mem0', version='1.0.0', description='Mem0 Memory Layer for AI Agents')

@app.get('/health')
async def health():
    return {'status': 'ok', 'framework': 'Mem0'}

if __name__ == '__main__':
    import uvicorn
    uvicorn.run(app, host='0.0.0.0', port=int(os.environ.get('MEM0_PORT', '8000')))
PYEOF
      uvicorn server:app --host 0.0.0.0 --port ${MEM0_PORT:-8000}
      "
