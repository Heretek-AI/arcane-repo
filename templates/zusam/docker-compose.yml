version: '3.8'

services:
  zusam:
    image: docker.io/zusam/zusam:latest
    container_name: zusam
    hostname: zusam
    ports:
      - "${ZUSAM_PORT:-8080}:8080"
    volumes:
      - zusam_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  zusam_data:
    name: zusam_data
