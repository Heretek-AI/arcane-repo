version: '3.8'

services:
  route96:
    image: docker.io/voidic/route96:latest
    container_name: route96
    hostname: route96
    ports:
      - "${ROUTE96_PORT:-8080}:8080"
    volumes:
      - route96_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  route96_data:
    name: route96_data
