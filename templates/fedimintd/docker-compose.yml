version: '3.8'

services:
  fedimintd:
    image: docker.io/fedimint/fedimintd:latest
    container_name: fedimintd
    hostname: fedimintd
    ports:
      - "${FEDIMINTD_PORT:-8080}:8080"
    volumes:
      - fedimintd_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fedimintd_data:
    name: fedimintd_data
