version: '3.8'

services:
  osticket:
    image: docker.io/osticket/osticket:latest
    container_name: osticket
    hostname: osticket
    ports:
      - "${OSTICKET_PORT:-8080}:8080"
    volumes:
      - osticket_data:/data
    restart: unless-stopped

volumes:
  osticket_data:
    name: osticket_data
