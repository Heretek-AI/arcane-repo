version: '3.8'

services:
  rallly:
    image: docker.io/lukevella/rallly:latest
    container_name: rallly
    hostname: rallly
    ports:
      - "${RALLLY_PORT:-8080}:8080"
    volumes:
      - rallly_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rallly_data:
    name: rallly_data
