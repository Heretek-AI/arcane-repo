version: '3.8'

services:
  rabbitmq:
    image: docker.io/bitnamicharts/rabbitmq:latest
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-8080}:8080"
    volumes:
      - rabbitmq_data:/data
    restart: unless-stopped

volumes:
  rabbitmq_data:
    name: rabbitmq_data
