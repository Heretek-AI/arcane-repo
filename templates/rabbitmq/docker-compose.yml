version: '3.8'

services:
  rabbitmq:
    image: docker.io/bitnamicharts/rabbitmq:latest
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-8080}:8080"
    volumes:
      - rabbitmq_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rabbitmq_data:
    name: rabbitmq_data
