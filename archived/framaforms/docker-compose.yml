version: '3.8'

services:
  framaforms:
    image: docker.io/guillaumecar/framaforms:latest
    container_name: framaforms
    hostname: framaforms
    ports:
      - "${FRAMAFORMS_PORT:-8080}:8080"
    volumes:
      - framaforms_data:/data
    restart: unless-stopped

volumes:
  framaforms_data:
    name: framaforms_data
