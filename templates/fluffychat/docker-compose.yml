version: '3.8'

services:
  fluffychat:
    image: ghcr.io/aceberg/fluffychat:latest
    container_name: fluffychat
    hostname: fluffychat
    ports:
      - "${FLUFFYCHAT_PORT:-8080}:8080"
    volumes:
      - fluffychat_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fluffychat_data:
    name: fluffychat_data
