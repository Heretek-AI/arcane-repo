version: '3.8'

services:
  gameyfin:
    image: ghcr.io/gameyfin/gameyfin:latest
    container_name: gameyfin
    hostname: gameyfin
    ports:
      - "${GAMEYFIN_PORT:-8080}:8080"
    volumes:
      - gameyfin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gameyfin_data:
    name: gameyfin_data
