version: '3.8'

services:
  plik:
    image: docker.io/rootgg/plik:latest
    container_name: plik
    hostname: plik
    ports:
      - "${PLIK_PORT:-8080}:8080"
    volumes:
      - plik_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  plik_data:
    name: plik_data
