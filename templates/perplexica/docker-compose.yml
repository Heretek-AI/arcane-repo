version: '3.8'

services:
  perplexica:
    image: docker.io/itzcrazykns1337/perplexica:latest
    container_name: perplexica
    hostname: perplexica
    ports:
      - "${PERPLEXICA_PORT:-32400}:32400"
    volumes:
      - perplexica_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:32400/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  perplexica_data:
    name: perplexica_data
