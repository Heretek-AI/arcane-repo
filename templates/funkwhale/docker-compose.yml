version: '3.8'

services:
  funkwhale:
    image: docker.io/funkwhale/funkwhale:latest
    container_name: funkwhale
    hostname: funkwhale
    ports:
      - "${FUNKWHALE_PORT:-80}:80"
    volumes:
      - funkwhale_data:/data
    restart: unless-stopped

volumes:
  funkwhale_data:
    name: funkwhale_data
