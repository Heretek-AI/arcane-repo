version: '3.8'

services:
  tvheadend:
    image: ghcr.io/tvheadend/tvheadend:latest
    container_name: tvheadend
    hostname: tvheadend
    ports:
      - "${TVHEADEND_PORT:-8080}:8080"
    volumes:
      - tvheadend_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tvheadend_data:
    name: tvheadend_data
