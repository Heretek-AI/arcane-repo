name: Build Xiaomusic

on:
  push:
    paths:
      - 'scripts/dockerfiles/xiaomusic/**'
      - 'templates/xiaomusic/**'
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-custom.yml
    with:
      template-name: xiaomusic
    secrets: inherit
