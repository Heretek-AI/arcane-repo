version: '3.8'

services:
  starbase-80:
    image: ghcr.io/notclickable-jordan/starbase-80:latest
    container_name: starbase-80
    hostname: starbase-80
    ports:
      - "${STARBASE_80_PORT:-8080}:8080"
    volumes:
      - starbase-80_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  starbase-80_data:
    name: starbase-80_data
