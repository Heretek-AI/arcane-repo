version: '3.8'

services:
  hubzilla:
    image: docker.io/dhitchenor/hubzilla:latest
    container_name: hubzilla
    hostname: hubzilla
    ports:
      - "${HUBZILLA_PORT:-8080}:8080"
    volumes:
      - hubzilla_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  hubzilla_data:
    name: hubzilla_data
