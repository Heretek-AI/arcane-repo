version: '3.8'

services:
  aptabase:
    image: ghcr.io/aptabase/aptabase:latest
    container_name: aptabase
    hostname: aptabase
    ports:
      - "${APTABASE_PORT:-8080}:8080"
    volumes:
      - aptabase_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  aptabase_data:
    name: aptabase_data
