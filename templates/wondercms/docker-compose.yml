version: '3.8'

services:
  wondercms:
    image: docker.io/mablanco/wondercms:latest
    container_name: wondercms
    hostname: wondercms
    ports:
      - "${WONDERCMS_PORT:-8080}:8080"
    volumes:
      - wondercms_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wondercms_data:
    name: wondercms_data
