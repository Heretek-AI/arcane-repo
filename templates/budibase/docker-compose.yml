version: '3.8'

services:
  budibase:
    image: docker.io/budibase/budibase:latest
    container_name: budibase
    hostname: budibase
    ports:
      - "${BUDIBASE_PORT:-8080}:8080"
    volumes:
      - budibase_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  budibase_data:
    name: budibase_data
