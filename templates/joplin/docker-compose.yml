version: '3.8'

services:
  joplin:
    image: ghcr.io/linuxserver/joplin:latest
    container_name: joplin
    hostname: joplin
    ports:
      - "${JOPLIN_PORT:-8080}:8080"
    volumes:
      - joplin_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  joplin_data:
    name: joplin_data
