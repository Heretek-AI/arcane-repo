version: '3.8'

services:
  linkace:
    image: docker.io/linkace/linkace:latest
    container_name: linkace
    hostname: linkace
    ports:
      - "${LINKACE_PORT:-8080}:8080"
    volumes:
      - linkace_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  linkace_data:
    name: linkace_data
