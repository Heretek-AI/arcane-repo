version: '3.8'

services:
  bitaxe-sentry:
    image: docker.io/zachprice105/bitaxe-sentry:latest
    container_name: bitaxe-sentry
    hostname: bitaxe-sentry
    ports:
      - "${BITAXE_SENTRY_PORT:-8080}:8080"
    volumes:
      - bitaxe-sentry_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bitaxe-sentry_data:
    name: bitaxe-sentry_data
