version: '3.8'

services:
  slink:
    image: docker.io/anirdev/slink:latest
    container_name: slink
    hostname: slink
    ports:
      - "${SLINK_PORT:-8080}:8080"
    volumes:
      - slink_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  slink_data:
    name: slink_data
