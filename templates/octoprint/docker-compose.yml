version: '3.8'

services:
  octoprint:
    image: docker.io/octoprint/octoprint:latest
    container_name: octoprint
    hostname: octoprint
    ports:
      - "${OCTOPRINT_PORT:-8080}:8080"
    volumes:
      - octoprint_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  octoprint_data:
    name: octoprint_data
